<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title id="page-title">Artikel · LEXORD® Magazin</title>
<meta id="meta-desc" name="description" content="LEXORD Magazin">
<meta name="robots" content="index,follow,max-image-preview:large">
<meta name="theme-color" content="#0a0a0a">
<link id="canonical" rel="canonical" href="https://lexord.de/blog.html">
<meta id="og-title" property="og:type" content="article">
<meta id="og-title-tag" property="og:title" content="LEXORD Magazin">
<meta id="og-desc" property="og:description" content="LEXORD Magazin">
<meta id="og-image" property="og:image" content="https://lexord.de/IMG_0556.jpeg">
<meta id="og-url" property="og:url" content="https://lexord.de/blog.html">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="IMG_7023.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--neon:#00f2ff;--neon2:#bc13fe;--bg:#0a0a0a;--card:#111;--border:rgba(255,255,255,.07);--text:#fff;--muted:#888}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:var(--neon);text-decoration:none;border-bottom:1px solid rgba(0,242,255,.2);transition:.2s}
a:hover{color:#fff;border-color:var(--neon)}
header{position:sticky;top:0;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100;padding:14px 22px;display:flex;justify-content:space-between;align-items:center}
.brand{font-family:'Orbitron';font-weight:900;letter-spacing:5px;font-size:18px;color:#fff;border:none}
.brand span{color:var(--neon)}
.brand sup{font-size:9px;color:var(--neon)}
.tag{font-family:'Orbitron';font-size:8px;letter-spacing:2px;color:#000;background:linear-gradient(135deg,var(--neon),var(--neon2));padding:3px 7px;border-radius:4px;margin-left:8px}
.nav-r a{font-family:'Orbitron';font-size:10px;letter-spacing:2px;color:#aaa;margin-left:18px;border:none}
.article-wrap{max-width:780px;margin:0 auto;padding:60px 24px 80px}
.crumbs{font-family:'Orbitron';font-size:9px;letter-spacing:2px;color:#666;margin-bottom:30px}
.crumbs a{color:#888;border:none}
.crumbs a:hover{color:var(--neon)}
.art-meta{font-family:'Orbitron';font-size:9.5px;letter-spacing:2.5px;color:var(--neon);margin-bottom:18px}
.art-title{font-family:'Orbitron';font-weight:900;font-size:clamp(1.8rem,4.5vw,2.8rem);line-height:1.15;margin-bottom:18px;letter-spacing:-.5px}
.art-excerpt{font-size:18px;color:#bbb;line-height:1.6;margin-bottom:34px;padding-bottom:30px;border-bottom:1px solid var(--border)}
.art-hero-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:14px;margin-bottom:36px;background:#0a0a0a}
.art-body{font-size:16px;color:#ddd}
.art-body h2{font-family:'Orbitron';font-weight:900;font-size:22px;color:#fff;margin:36px 0 16px;letter-spacing:0;line-height:1.3}
.art-body h3{font-family:'Orbitron';font-weight:700;font-size:17px;color:#fff;margin:28px 0 12px}
.art-body p{margin-bottom:18px}
.art-body ul,.art-body ol{margin:14px 0 18px 20px;color:#ccc}
.art-body li{margin-bottom:8px;line-height:1.65}
.art-body strong{color:#fff}
.art-body blockquote{margin:24px 0;padding:18px 22px;background:rgba(0,242,255,.06);border-left:3px solid var(--neon);border-radius:0 8px 8px 0;font-style:italic;color:#bbb}
.art-body img{max-width:100%;border-radius:10px;margin:20px 0}
.tags{margin-top:40px;padding-top:24px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:8px}
.tag-chip{background:#0f0f0f;border:1px solid var(--border);border-radius:18px;padding:5px 12px;font-family:'Orbitron';font-size:9px;letter-spacing:1.5px;color:#999}
.cta-box{margin-top:50px;padding:30px;background:linear-gradient(135deg,#0e0e0e,#141414);border:1px solid rgba(0,242,255,.2);border-radius:16px;text-align:center}
.cta-box h3{font-family:'Orbitron';font-size:14px;letter-spacing:2px;color:#fff;margin-bottom:8px}
.cta-box p{color:#999;margin-bottom:18px;font-size:14px}
.cta-box a.btn{display:inline-block;background:linear-gradient(135deg,var(--neon),var(--neon2));color:#000;padding:13px 28px;border-radius:8px;font-family:'Orbitron';font-weight:900;letter-spacing:2px;font-size:11px;border:none;text-decoration:none}
.back{margin-top:30px;font-family:'Orbitron';font-size:10px;letter-spacing:2px;color:#888;border:none}
footer{border-top:1px solid var(--border);padding:40px 24px;text-align:center;color:#555;font-size:11px}
footer a{color:#888;margin:0 10px;border:none}
.loader{display:flex;justify-content:center;padding:80px;color:#444;font-family:'Orbitron';font-size:11px;letter-spacing:3px}
@media(max-width:560px){.article-wrap{padding:40px 18px 60px}.nav-r a{margin-left:10px;font-size:9px}}
</style>
</head>
<body>

<header>
  <a href="index.html" class="brand">LEX<span>O</span>RD<sup>®</sup><span class="tag">MAGAZIN</span></a>
  <div class="nav-r">
    <a href="blog.html">← MAGAZIN</a>
    <a href="index.html">SHOP</a>
  </div>
</header>

<div class="article-wrap" id="art-wrap">
  <div class="loader">LADE ARTIKEL ...</div>
</div>

<footer>
  <div>© 2026 LEXORD® Engineering · Leon Schulz · Domsühl</div>
  <div style="margin-top:8px">
    <a href="index.html">Startseite</a> ·
    <a href="agb.html">AGB</a> ·
    <a href="Datenschutz.html">Datenschutz</a> ·
    <a href="Widerrufsbelehrung.html">Widerruf</a>
  </div>
</footer>

<script>
const API = 'https://lexord-api.leonschulz1420.workers.dev';
function getSlug(){ const p = new URLSearchParams(location.search); return p.get('slug') || ''; }
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

async function load(){
  const slug = getSlug();
  if(!slug){ document.getElementById('art-wrap').innerHTML = '<div class="loader">KEIN ARTIKEL ANGEGEBEN — <a href="blog.html" style="color:#00f2ff;margin-left:8px">← ZURÜCK</a></div>'; return; }
  try{
    const r = await fetch(API + '/api/blog/' + encodeURIComponent(slug));
    if(!r.ok){ throw new Error('not found'); }
    const a = await r.json();
    render(a, slug);
    injectMeta(a, slug);
    injectJsonLd(a, slug);
  }catch(e){
    document.getElementById('art-wrap').innerHTML = '<div class="loader">ARTIKEL NICHT GEFUNDEN — <a href="blog.html" style="color:#00f2ff;margin-left:8px">← MAGAZIN</a></div>';
  }
}

function render(a, slug){
  const date = a.published_at ? new Date(a.published_at).toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'}) : '';
  const tags = (a.keywords || []).map(k=>`<span class="tag-chip">${esc(k)}</span>`).join('');
  const hero = a.image && a.image.startsWith('http') ? a.image : (a.image || '/IMG_0556.jpeg');
  document.getElementById('art-wrap').innerHTML = `
    <div class="crumbs"><a href="blog.html">MAGAZIN</a> / ${esc(a.category || 'ARTIKEL')}</div>
    <div class="art-meta">${esc((a.category || 'ARTIKEL').toUpperCase())} · ${date} · ${esc(a.author || 'LEON SCHULZ')}</div>
    <h1 class="art-title">${esc(a.title)}</h1>
    ${a.excerpt ? '<div class="art-excerpt">' + esc(a.excerpt) + '</div>' : ''}
    <img class="art-hero-img" src="${esc(hero)}" alt="${esc(a.title)}" loading="eager">
    <div class="art-body">${a.content || ''}</div>
    ${tags ? '<div class="tags">' + tags + '</div>' : ''}
    <div class="cta-box">
      <h3>BEREIT FÜR DEINEN CONTROLLER?</h3>
      <p>Konfiguriere jetzt deinen eigenen LEXORD Custom Controller — Made in Germany.</p>
      <a href="konfigurator.html" class="btn">ZUM KONFIGURATOR →</a>
    </div>
    <div style="margin-top:30px"><a href="blog.html" class="back">← ALLE ARTIKEL</a></div>`;
}

function injectMeta(a, slug){
  const url = 'https://lexord.de/blog-article.html?slug=' + encodeURIComponent(slug);
  document.getElementById('page-title').textContent = a.title + ' · LEXORD Magazin';
  document.getElementById('meta-desc').setAttribute('content', a.excerpt || a.title);
  document.getElementById('canonical').setAttribute('href', url);
  document.getElementById('og-title-tag').setAttribute('content', a.title);
  document.getElementById('og-desc').setAttribute('content', a.excerpt || a.title);
  document.getElementById('og-url').setAttribute('content', url);
  if(a.image){ document.getElementById('og-image').setAttribute('content', a.image.startsWith('http') ? a.image : 'https://lexord.de' + (a.image.startsWith('/') ? '' : '/') + a.image); }
}

function injectJsonLd(a, slug){
  const ld = {
    "@context":"https://schema.org",
    "@type":"BlogPosting",
    "headline": a.title,
    "description": a.excerpt || '',
    "image": (a.image && a.image.startsWith('http')) ? a.image : 'https://lexord.de' + (a.image && a.image.startsWith('/') ? '' : '/') + (a.image || 'IMG_0556.jpeg'),
    "datePublished": a.published_at,
    "dateModified": a.published_at,
    "author": {"@type":"Person","name": a.author || "Leon Schulz"},
    "publisher": {"@type":"Organization","name":"LEXORD Engineering","logo":{"@type":"ImageObject","url":"https://lexord.de/IMG_7023.png"}},
    "mainEntityOfPage": {"@type":"WebPage","@id":"https://lexord.de/blog-article.html?slug=" + slug},
    "keywords": (a.keywords || []).join(", "),
    "articleSection": a.category || "News",
    "inLanguage":"de-DE"
  };
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(ld);
  document.head.appendChild(s);
}

load();
</script>

</body>
</html>
