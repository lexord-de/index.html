<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title translate="no">LEXORD® | High-End Engineering</title>
    
    <script src="https://www.paypal.com/sdk/js?client-id=AZOQW-hurpyvyR5OMuYdjPTJKG5jXuY-g2sKH-RZI3cMovxiLiSOc72y1_8EgqIAwjfPw220AmzuRfhd&currency=EUR"></script>
    <link rel="icon" type="image/png" href="IMG_7023.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>

    <style>
        :root { --n-blue: #00f2ff; --bg: #000; --panel: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER - LOGO ENTFERNT, NUR TEXT */
        header { position: fixed; top: 60px; width: 100%; z-index: 10000; padding: 0 6%; display: flex; justify-content: space-between; align-items: center; }
        .brand-text { font-family: 'Orbitron'; font-weight: 900; font-size: 1.4rem; letter-spacing: 5px; color: var(--n-blue); text-shadow: 0 0 15px rgba(0,242,255,0.6); }

        /* WARENKORB & DHL PRIVATVERSAND */
        #cart-drawer { position: fixed; top: 0; right: -450px; width: 100%; max-width: 420px; height: 100%; background: #080808; z-index: 100001; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); border-left: 1px solid #111; padding: 25px; display: flex; flex-direction: column; }
        #cart-drawer.active { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100000; display: none; backdrop-filter: blur(8px); }
        
        .shipping-box { background: #111; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #222; }
        .dhl-label { font-family: 'Orbitron'; font-size: 9px; color: #ffcc00; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .cart-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; font-size: 11px; margin-bottom: 8px; border-radius: 6px; outline: none; }
        .cart-input:focus { border-color: var(--n-blue); }

        .total-line { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 11px; margin-bottom: 5px; color: #888; }
        .grand-total { font-size: 18px; color: var(--n-blue); margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }

        .submit-btn { width: 100%; padding: 18px; background: white; color: black; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background: var(--n-blue); }

        #intro-overlay { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .floating-logo { width: 230px; filter: drop-shadow(0 0 20px var(--n-blue)); animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .swiper { width: 100%; max-width: 500px; padding: 50px 0; }
        .product-card { background: #080808; border: 1px solid #111; padding: 25px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="intro-overlay"><canvas id="warp-canvas"></canvas></div>
    <div class="cart-overlay" onclick="toggleCart()"></div>

    <div id="cart-drawer">
        <h2 style="font-family:'Orbitron'; font-size: 1.2rem; border-bottom: 1px solid #222; padding-bottom: 15px;">WARENKORB</h2>
        <div id="cart-items-container" style="flex-grow:1; overflow-y:auto; padding: 15px 0;"></div>

        <div class="shipping-box" id="dhl-config" style="display:none;">
            <div class="dhl-label">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/DHL_Logo.svg" width="40">
                <span>DHL PRIVATVERSAND</span>
            </div>
            <input type="text" id="ship-name" class="cart-input" placeholder="Vor- & Nachname">
            <input type="text" id="ship-address" class="cart-input" placeholder="Straße & Hausnummer">
            <div style="display:flex; gap:5px;">
                <input type="text" id="ship-zip" class="cart-input" placeholder="PLZ" style="width:35%;">
                <input type="text" id="ship-city" class="cart-input" placeholder="Stadt" style="width:65%;">
            </div>
            <select id="ship-country" class="cart-input" onchange="updateCartUI()">
                <option value="DE">Deutschland (Privat-Paket 2kg)</option>
                <option value="EU">EU (Privat-Paket International)</option>
                <option value="World">Weltweit (Privat-Paket Premium)</option>
            </select>
        </div>

        <div style="padding-top:15px; border-top: 1px solid #222;">
            <div class="total-line"><span>Artikel:</span><span id="subtotal">0.00 €</span></div>
            <div class="total-line"><span>Versand (DHL):</span><span id="shipping-cost">0.00 €</span></div>
            <div class="total-line grand-total"><span>GESAMT:</span><span id="total-price">0.00 €</span></div>
            
            <label style="font-size:9px; color:#555; display:flex; gap:8px; margin: 15px 0; cursor:pointer;">
                <input type="checkbox" id="agree-check">
                <span>Ich akzeptiere die AGB & Widerrufsbelehrung.</span>
            </label>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <header>
        <div class="brand-text" translate="no">LEXORD®</div>
        <div class="cart-btn" onclick="toggleCart()" style="cursor:pointer; position:relative;">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span id="cart-badge" style="position:absolute; top:-8px; right:-8px; background:var(--n-blue); color:black; border-radius:50%; padding:2px 6px; font-size:10px; font-weight:bold;">0</span>
        </div>
    </header>

    <main>
        <section style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <img src="IMG_7023.png" class="floating-logo">
            <h1 style="font-family:'Orbitron'; letter-spacing:10px; margin-top:20px;">BEYOND LIMITS</h1>
        </section>

        <section class="grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px; padding:6%;">
            <div class="product-card">
                <img src="Photoroom_20260305_123705.png" style="width:100%; max-height:200px; object-fit:contain;">
                <h3 style="font-family:'Orbitron'; font-size:12px; margin-top:15px;">LXRD PERFORMANCE</h3>
                <div style="color:var(--n-blue); font-family:'Orbitron'; margin:10px 0;">247,00 €</div>
                <button class="submit-btn" onclick="addToCart('LXRD Performance', 247.00, 'Photoroom_20260305_123705.png')">WARENKORB</button>
            </div>
            <div class="product-card">
                <img src="Stickzange.PNG" style="width:100%; max-height:200px; object-fit:contain;">
                <h3 style="font-family:'Orbitron'; font-size:12px; margin-top:15px;">STICKZANGE PRO</h3>
                <div style="color:var(--n-blue); font-family:'Orbitron'; margin:10px 0;">9,95 €</div>
                <button class="submit-btn" onclick="addToCart('Stickzange Pro', 9.95, 'Stickzange.PNG')">WARENKORB</button>
            </div>
        </section>
    </main>

    <script>
        let cart = [];

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            const overlay = document.querySelector('.cart-overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function addToCart(name, price, img) {
            cart.push({ name, price, img });
            updateCartUI();
            if(!document.getElementById('cart-drawer').classList.contains('active')) toggleCart();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const subEl = document.getElementById('subtotal');
            const shipEl = document.getElementById('shipping-cost');
            const totalEl = document.getElementById('total-price');
            const badge = document.getElementById('cart-badge');
            
            container.innerHTML = '';
            let subtotal = 0;

            cart.forEach((item, index) => {
                subtotal += item.price;
                container.innerHTML += `
                    <div style="display:flex; gap:10px; margin-bottom:10px; align-items:center; background:#111; padding:10px; border-radius:8px;">
                        <img src="${item.img}" width="40">
                        <div style="flex-grow:1;"><h4 style="font-size:9px;">${item.name}</h4><p style="font-size:10px; color:var(--n-blue);">${item.price.toFixed(2)} €</p></div>
                        <span onclick="cart.splice(${index},1); updateCartUI();" style="cursor:pointer;">×</span>
                    </div>`;
            });

            // DHL PRIVATKUNDEN PREISE 2026 (Filialpreise/Standard Privat)
            const country = document.getElementById('ship-country').value;
            let shipping = 0;

            if(subtotal > 0) {
                document.getElementById('dhl-config').style.display = 'block';
                if(country === 'DE') {
                    // DHL Paket bis 2kg (Privat Deutschland)
                    shipping = 6.99; 
                } else if(country === 'EU') {
                    // DHL Paket bis 2kg (Privat EU)
                    shipping = 16.49;
                } else {
                    // DHL Paket bis 2kg (Privat Weltweit)
                    shipping = 48.99;
                }
            } else {
                document.getElementById('dhl-config').style.display = 'none';
            }

            const total = subtotal + shipping;
            subEl.innerText = subtotal.toFixed(2) + ' €';
            shipEl.innerText = shipping.toFixed(2) + ' €';
            totalEl.innerText = total.toFixed(2) + ' €';
            badge.innerText = cart.length;

            renderPayPal(total);
        }

        function renderPayPal(total) {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = '';
            if(total <= 0) return;

            paypal.Buttons({
                style: { layout: 'vertical', color: 'blue', shape: 'rect' },
                onClick: (data, actions) => {
                    const name = document.getElementById('ship-name').value;
                    const addr = document.getElementById('ship-address').value;
                    if(!name || !addr || !document.getElementById('agree-check').checked) {
                        alert("Bitte Lieferadresse eingeben und AGB akzeptieren.");
                        return actions.reject();
                    }
                },
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{
                            amount: { value: total.toFixed(2), currency_code: 'EUR' }
                        }]
                    });
                },
                onApprove: (data, actions) => {
                    return actions.order.capture().then(details => {
                        alert('Zahlung erfolgt! Danke für deine Bestellung bei LEXORD Engineering.');
                        cart = []; updateCartUI(); toggleCart();
                    });
                }
            }).render('#paypal-button-container');
        }

        // Warp Intro
        const wC = document.getElementById('warp-canvas'), wX = wC.getContext('2d');
        function rW() { wC.width = window.innerWidth; wC.height = window.innerHeight; }
        window.addEventListener('resize', rW); rW();
        let pts = []; for(let i=0; i<800; i++) pts.push({x: Math.random()*wC.width-wC.width/2, y: Math.random()*wC.height-wC.height/2, z: Math.random()*wC.width});
        function aW() { 
            wX.fillStyle = "black"; wX.fillRect(0,0,wC.width, wC.height); wX.fillStyle = "white"; 
            pts.forEach(s => { s.z -= 15; if(s.z<=0) s.z=wC.width; let ox=s.x/s.z*wC.width+wC.width/2, oy=s.y/s.z*wC.width+wC.height/2; wX.fillRect(ox,oy,2,2); }); 
            requestAnimationFrame(aW); 
        }
        aW();
        window.addEventListener('load', () => { setTimeout(() => { gsap.to("#intro-overlay", { opacity: 0, duration: 1, onComplete: () => document.getElementById('intro-overlay').style.display='none' }); }, 1200); });
    </script>
</body>
</html>
