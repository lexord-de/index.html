<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title translate="no">LEXORD® | High-End Engineering | Beste Scuf Alternative 2026</title>
    
    <link rel="icon" type="image/png" href="IMG_7023.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>

    <style>
        :root { --n-blue: #00f2ff; --n-purple: #bc13fe; --bg: #000000; --panel: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; top: 0 !important; }

        /* Warenkorb Icon & Badge */
        .cart-btn { position: relative; cursor: pointer; transition: 0.3s; display: flex; align-items: center; }
        .cart-badge { 
            position: absolute; top: -8px; right: -10px; 
            background: var(--n-blue); color: black; 
            font-family: 'Orbitron'; font-size: 10px; font-weight: 900;
            width: 18px; height: 18px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            box-shadow: 0 0 10px var(--n-blue);
        }
        .cart-vibrate { animation: vibrate 0.4s both; color: var(--n-blue); }
        @keyframes vibrate { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } }

        /* Checkout Modal */
        #cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 80000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); padding: 20px; }
        .cart-modal { background: #080808; border: 1px solid var(--n-blue); width: 100%; max-width: 450px; border-radius: 20px; padding: 30px; position: relative; }
        .cart-item-list { margin: 20px 0; max-height: 200px; overflow-y: auto; font-family: 'Inter'; font-size: 13px; }
        .checkout-input { width: 100%; padding: 12px; background: #111; border: 1px solid #222; color: white; margin-bottom: 10px; border-radius: 5px; }

        /* Layout */
        header { position: fixed; top: 80px; width: 100%; z-index: 10000; padding: 0 6%; display: flex; justify-content: space-between; align-items: center; }
        .brand-text { font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; letter-spacing: 4px; }
        
        #star-canvas { position: fixed; inset: 0; z-index: -1; background: #000; }
        #intro-overlay { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .floating-logo { width: 230px; filter: drop-shadow(0 0 20px var(--n-blue)); animation: floatLogo 4s infinite; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }

        /* Flip Cards */
        .swiper { width: 100%; max-width: 500px; padding-bottom: 50px; margin-top: 50px; }
        .swiper-slide { perspective: 1000px; height: 500px; background: transparent !important; }
        .product-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .swiper-slide:hover .product-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; background: #080808; border-radius: 25px; padding: 25px; border: 1px solid #111; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-back { transform: rotateY(180deg); border-color: var(--n-blue); }
        
        .submit-btn { width: 100%; padding: 15px; background: white; color: black; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 4px; margin-top: 15px; }
        .submit-btn:hover { background: var(--n-blue); }

        .ticker-wrapper { position: fixed; top: 0; width: 100%; z-index: 9000; font-family: 'Orbitron'; font-size: 9px; background: black; border-bottom: 1px solid #111; padding: 8px 0; }
        .ticker-move { display: inline-block; animation: ticker-scroll 35s linear infinite; white-space: nowrap; }
        @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <div id="intro-overlay"><canvas id="warp-canvas"></canvas></div>
    <canvas id="star-canvas"></canvas>

    <div class="ticker-wrapper">
        <div class="ticker-move">
            <span>VERSAND INNERHALB VON 24 STUNDEN • MADE IN GERMANY • TMR STICK TECHNOLOGY • </span>
            <span>VERSAND INNERHALB VON 24 STUNDEN • MADE IN GERMANY • TMR STICK TECHNOLOGY • </span>
        </div>
    </div>

    <header>
        <div class="brand-text">LEXORD®</div>
        <div class="cart-btn" id="main-cart-icon" onclick="openCart()">
            <div id="cart-badge" class="cart-badge">0</div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        </div>
    </header>

    <div id="cart-overlay">
        <div class="cart-modal">
            <div style="position:absolute; top:20px; right:20px; cursor:pointer;" onclick="closeCart()">✕</div>
            <h2 style="font-family:'Orbitron'; color:var(--n-blue); font-size:16px; margin-bottom:20px;">WARENKORB</h2>
            <div id="cart-items" class="cart-item-list"></div>
            <div id="cart-total" style="font-family:'Orbitron'; padding:15px 0; border-top:1px solid #222; display:flex; justify-content:space-between;">
                <span>TOTAL:</span><span id="total-val" style="color:var(--n-blue);">0,00 €</span>
            </div>
            <button class="submit-btn" style="background:var(--n-blue);" onclick="alert('Kauf-Prozess startet...')">ZUR KASSE</button>
        </div>
    </div>

    <main style="padding-top: 150px;">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <div class="product-card-inner">
                        <div class="card-front">
                            <img src="Photoroom_20260305_123705.png" style="width:100%; height:200px; object-fit:contain;">
                            <div style="font-family:'Orbitron'; margin:15px 0;">LXRD PERFORMANCE</div>
                            <div style="color:var(--n-blue); font-weight:bold;">240,00 €</div>
                            <button class="submit-btn" onclick="addToCart('LXRD Performance', 240)">IN DEN WARENKORB</button>
                        </div>
                        <div class="card-back">
                            <h3 style="font-family:'Orbitron'; color:var(--n-blue);">PRO FEATURES</h3>
                            <p style="font-size:11px; color:#ccc; margin:20px; text-align:center;">TMR-Sticks & Clicky Triggers.</p>
                            <button class="submit-btn" onclick="addToCart('LXRD Performance', 240)">HINZUFÜGEN</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let cart = [];
        
        function addToCart(name, price) {
            cart.push({name, price});
            updateUI();
            const icon = document.getElementById('main-cart-icon');
            icon.classList.remove('cart-vibrate');
            void icon.offsetWidth;
            icon.classList.add('cart-vibrate');
        }

        function updateUI() {
            const list = document.getElementById('cart-items');
            const badge = document.getElementById('cart-badge');
            const totalVal = document.getElementById('total-val');
            
            if(cart.length > 0) { badge.style.display = 'flex'; badge.innerText = cart.length; }
            
            let html = ""; let total = 0;
            cart.forEach(item => {
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${item.name}</span><span>${item.price},00 €</span></div>`;
                total += item.price;
            });
            list.innerHTML = cart.length > 0 ? html : "Leer";
            totalVal.innerText = total + ",00 €";
        }

        function openCart() { document.getElementById('cart-overlay').style.display = 'flex'; }
        function closeCart() { document.getElementById('cart-overlay').style.display = 'none'; }

        var swiper = new Swiper(".mySwiper", { effect: "coverflow", centeredSlides: true, slidesPerView: "auto", coverflowEffect: { rotate: 20, stretch: 0, depth: 100, modifier: 1, slideShadows: false } });

        // Hintergrund Animationen
        const wC = document.getElementById('warp-canvas'), wX = wC.getContext('2d');
        function rW() { wC.width = window.innerWidth; wC.height = window.innerHeight; }
        window.addEventListener('resize', rW); rW();
        let pts = []; for(let i=0; i<400; i++) pts.push({x: Math.random()*wC.width-wC.width/2, y: Math.random()*wC.height-wC.height/2, z: Math.random()*wC.width});
        function aW() { wX.fillStyle = "black"; wX.fillRect(0,0,wC.width, wC.height); wX.fillStyle = "white"; pts.forEach(s => { s.z -= 10; if(s.z<=0) s.z=wC.width; let ox=s.x/s.z*wC.width+wC.width/2, oy=s.y/s.z*wC.width+wC.height/2; wX.fillRect(ox,oy,2,2); }); requestAnimationFrame(aW); }
        aW();

        window.addEventListener('load', () => { setTimeout(() => { gsap.to("#intro-overlay", { opacity: 0, duration: 1, onComplete: () => { document.getElementById('intro-overlay').style.display = "none"; }}); }, 1500); });
    </script>
</body>
</html>
