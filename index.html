<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title translate="no">LEXORD® | High-End Engineering | Beste Scuf Alternative 2026</title>
    
    <script src="https://www.paypal.com/sdk/js?client-id=AZOQW-hurpyvyR5OMuYdjPTJKG5jXuY-g2sKH-RZI3cMovxiLiSOc72y1_8EgqIAwjfPw220AmzuRfhd&currency=EUR"></script>
    <script src="https://js.stripe.com/v3/"></script>

    <meta name="description" content="LEXORD® Engineering: Die ultimative Premium Scuf Alternative. Made in Germany.">
    
    <link rel="icon" type="image/png" href="IMG_7023.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --n-blue: #00f2ff; --n-purple: #bc13fe; --bg: #000000; --panel: #0a0a0a; --trust-green: #00b67a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; top: 0 !important; }

        /* Google Translate Hide */
        .goog-te-banner-frame, .goog-te-balloon-frame, #goog-gt-tt, .skiptranslate, .goog-te-spinner-pos { display: none !important; }

        #star-canvas { position: fixed; inset: 0; z-index: -1; background: #000; }
        #intro-overlay { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; align-items: center; justify-content: center; }

        .floating-logo { width: 230px; filter: drop-shadow(0 0 20px var(--n-blue)); animation: floatLogo 4s ease-in-out infinite; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }

        header { position: fixed; top: 80px; width: 100%; z-index: 10000; padding: 0 6%; display: flex; justify-content: space-between; align-items: center; }
        .brand-text { font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; letter-spacing: 4px; }
        
        .cart-btn { cursor: pointer; position: relative; }
        .cart-count-badge { position: absolute; top: -8px; right: -8px; background: var(--n-blue); color: black; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 50%; }

        /* --- DRAWER --- */
        #cart-drawer { position: fixed; top: 0; right: -450px; width: 100%; max-width: 400px; height: 100%; background: #080808; z-index: 100001; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); border-left: 1px solid #111; padding: 30px; display: flex; flex-direction: column; overflow-y: auto; }
        #cart-drawer.active { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100000; display: none; backdrop-filter: blur(8px); }
        
        .cart-item { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; background: #0c0c0c; padding: 12px; border-radius: 12px; }
        .cart-item img { width: 50px; height: 50px; object-fit: contain; }

        /* STRIPE STYLING */
        #stripe-card-element { background: #111; padding: 15px; border-radius: 8px; border: 1px solid #222; margin-bottom: 20px; }
        .stripe-btn { width: 100%; padding: 15px; background: #6772e5; color: white; border: none; font-family: 'Orbitron'; cursor: pointer; border-radius: 4px; margin-bottom: 10px; }

        .hero-banner-box { width: 90%; max-width: 800px; margin-top: 50px; border-radius: 15px; border: 1px solid rgba(0, 242, 255, 0.3); }

        .swiper { width: 100%; max-width: 500px; padding-bottom: 50px; }
        .swiper-slide { perspective: 1000px; height: 480px; }
        .product-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .swiper-slide:hover .product-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; background: #080808; border-radius: 25px; padding: 25px; border: 1px solid #111; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-back { transform: rotateY(180deg); border-color: var(--n-blue); }

        .ticker-wrapper { position: fixed; top: 0; width: 100%; z-index: 9000; background: black; border-bottom: 1px solid #111; font-family: 'Orbitron'; font-size: 9px; }
        .ticker-move { display: inline-block; animation: ticker-scroll 35s linear infinite; white-space: nowrap; padding: 8px 0; }
        @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .submit-btn { width: 100%; padding: 18px; background: white; color: black; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: var(--n-blue); }

        #full-nav { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 40000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transform: translateX(100%); transition: 0.6s; }
        #full-nav.active { transform: translateX(0); }
    </style>
</head>
<body class="notranslate">

    <div id="intro-overlay"><canvas id="warp-canvas"></canvas></div>
    <canvas id="star-canvas"></canvas>
    
    <div class="cart-overlay" onclick="toggleCart()"></div>

    <div id="cart-drawer">
        <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; border-bottom:1px solid #222; padding-bottom:15px;">
            <span>WARENKORB</span>
            <span style="cursor:pointer; color:var(--n-blue);" onclick="toggleCart()">×</span>
        </div>
        <div class="cart-items" id="cart-items-container"></div>
        <div style="border-top:1px solid #222; padding-top:20px;">
            <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; margin-bottom:15px;">
                <span>TOTAL:</span><span id="cart-total-price">0.00 €</span>
            </div>
            
            <div id="stripe-section">
                <p style="font-size:10px; font-family:'Orbitron'; margin-bottom:10px; color:#555;">CREDIT CARD (STRIPE)</p>
                <div id="stripe-card-element"></div>
                <button class="stripe-btn" onclick="handleStripePayment()">Zahlen mit Karte</button>
            </div>

            <div id="paypal-button-container"></div>
            
            <label style="font-size:9px; color:#444; display:flex; gap:10px; margin-top:15px;">
                <input type="checkbox" id="cart-agree"> Ich akzeptiere AGB & Datenschutz.
            </label>
        </div>
    </div>

    <div class="ticker-wrapper">
        <div class="ticker-move">
            <span style="margin-right:50px;">MADE IN GERMANY</span>
            <span style="margin-right:50px;">24H VERSAND</span>
            <span style="margin-right:50px;">STRIPE & PAYPAL SECURE CHECKOUT</span>
            <span style="margin-right:50px;">MADE IN GERMANY</span>
        </div>
    </div>

    <header>
        <div class="brand-text">LEXORD®</div>
        <div class="cart-btn" onclick="toggleCart()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span class="cart-count-badge" id="nav-cart-count">0</span>
        </div>
    </header>

    <main>
        <section id="hero" style="min-height:90vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <img src="IMG_7023.png" class="floating-logo">
            <h1 style="font-family:'Orbitron'; letter-spacing:8px; margin-top:20px;">LEXORD ENGINEERING</h1>
            <img src="82AAE1DF-9784-4FAB-8264-A4C2E7A1BEC0.png" class="hero-banner-box">
        </section>

        <section style="padding:100px 0;">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <div class="product-card-inner">
                            <div class="card-front">
                                <img src="Photoroom_20260305_123705.png" style="width:100%; object-fit:contain;">
                                <div style="font-family:'Orbitron'; margin:15px 0;">LXRD PERFORMANCE</div>
                                <div style="color:var(--n-blue);">247,00 €</div>
                                <button class="submit-btn" style="margin-top:10px;" onclick="addToCart('LXRD Performance', 247.00, 'Photoroom_20260305_123705.png')">ADD TO CART</button>
                            </div>
                            <div class="card-back">
                                <h4 style="font-family:'Orbitron';">HIGH-END MODS</h4>
                                <p style="font-size:10px; margin-top:15px;">TMR Joysticks, Clicky Buttons, Pro Paddles.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>
    <script>
        let cart = [];
        
        // --- STRIPE SETUP ---
        // Ersetze 'pk_test_...' mit deinem echten Stripe Key
        const stripe = Stripe('pk_test_51P...dein_key...'); 
        const elements = stripe.elements();
        const cardElement = elements.create('card', {
            style: { base: { color: '#ffffff', fontFamily: 'Orbitron', fontSize: '14px', '::placeholder': { color: '#444' } } }
        });
        cardElement.mount('#stripe-card-element');

        async function handleStripePayment() {
            if(!document.getElementById('cart-agree').checked) { alert("Bitte AGB akzeptieren."); return; }
            // Hier würde normalerweise dein Backend-Call für den PaymentIntent folgen
            const {paymentMethod, error} = await stripe.createPaymentMethod({ type: 'card', card: cardElement });
            if (error) { alert(error.message); } else { alert("Zahlung erfolgreich initiiert: " + paymentMethod.id); }
        }

        // --- WARENKORB LOGIK ---
        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('active'); document.querySelector('.cart-overlay').style.display = document.getElementById('cart-drawer').classList.contains('active') ? 'block' : 'none'; }

        function addToCart(name, price, img) {
            cart.push({name, price, img});
            updateUI();
            if(!document.getElementById('cart-drawer').classList.contains('active')) toggleCart();
        }

        function updateUI() {
            const container = document.getElementById('cart-items-container');
            let total = 0;
            container.innerHTML = '';
            cart.forEach(item => {
                total += item.price;
                container.innerHTML += `<div class="cart-item"><img src="${item.img}"><div><p style="font-size:10px;">${item.name}</p><p style="color:var(--n-blue); font-size:12px;">${item.price.toFixed(2)} €</p></div></div>`;
            });
            document.getElementById('cart-total-price').innerText = total.toFixed(2) + ' €';
            document.getElementById('nav-cart-count').innerText = cart.length;
            renderPayPal(total);
        }

        function renderPayPal(total) {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = '';
            if(total <= 0) return;
            paypal.Buttons({
                style: { layout: 'vertical', color: 'blue', shape: 'rect' },
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: total.toFixed(2) } }] }),
                onApprove: (data, actions) => actions.order.capture().then(() => { alert('PayPal Erfolg!'); cart=[]; updateUI(); })
            }).render('#paypal-button-container');
        }

        // --- VISUALS ---
        const swiper = new Swiper(".mySwiper", { effect: "coverflow", grabCursor: true, centeredSlides: true, slidesPerView: "auto", coverflowEffect: { rotate: 20, stretch: 0, depth: 100, modifier: 1, slideShadows: false } });

        window.addEventListener('load', () => {
            gsap.to("#intro-overlay", { opacity: 0, duration: 1.5, delay: 1, onComplete: () => document.getElementById('intro-overlay').style.display="none" });
        });

        // Warp Canvas logic hier einfügen (wie im Vorpost)
        const wC = document.getElementById('warp-canvas'), wX = wC.getContext('2d');
        function rW() { wC.width = window.innerWidth; wC.height = window.innerHeight; }
        rW(); window.addEventListener('resize', rW);
        let pts = []; for(let i=0; i<400; i++) pts.push({x: Math.random()*wC.width-wC.width/2, y: Math.random()*wC.height-wC.height/2, z: Math.random()*wC.width});
        function aW() { wX.fillStyle = "black"; wX.fillRect(0,0,wC.width, wC.height); wX.fillStyle = "white"; pts.forEach(s => { s.z -= 12; if(s.z<=0) s.z=wC.width; let ox=s.x/s.z*wC.width+wC.width/2, oy=s.y/s.z*wC.width+wC.height/2; wX.fillRect(ox,oy,2,2); }); requestAnimationFrame(aW); }
        aW();
    </script>
</body>
</html>
