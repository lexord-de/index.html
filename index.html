<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title translate="no">LEXORD® | High-End Engineering</title>
    
    <script src="https://www.paypal.com/sdk/js?client-id=AZOQW-hurpyvyR5OMuYdjPTJKG5jXuY-g2sKH-RZI3cMovxiLiSOc72y1_8EgqIAwjfPw220AmzuRfhd&currency=EUR"></script>
    
    <link rel="icon" type="image/png" href="IMG_7023.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>

    <style>
        :root { --n-blue: #00f2ff; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER - NUR TEXT */
        header { position: fixed; top: 40px; width: 100%; z-index: 10000; padding: 0 6%; display: flex; justify-content: space-between; align-items: center; }
        .brand-text { font-family: 'Orbitron'; font-weight: 900; font-size: 1.4rem; letter-spacing: 5px; color: var(--n-blue); text-shadow: 0 0 15px rgba(0,242,255,0.6); }

        /* WARENKORB DRAWER */
        #cart-drawer { position: fixed; top: 0; right: -450px; width: 100%; max-width: 420px; height: 100%; background: #080808; z-index: 100001; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); border-left: 1px solid #111; padding: 25px; display: flex; flex-direction: column; }
        #cart-drawer.active { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100000; display: none; backdrop-filter: blur(8px); }
        
        .cart-item { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; background: #111; padding: 12px; border-radius: 10px; border: 1px solid #1a1a1a; }
        .cart-item img { width: 50px; height: 50px; object-fit: contain; }
        .cart-item-info h4 { font-size: 11px; font-family: 'Orbitron'; margin-bottom: 4px; }
        
        .shipping-box { background: #0c0c0c; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #222; }
        .cart-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; font-size: 11px; margin-bottom: 8px; border-radius: 6px; outline: none; }
        .cart-input:focus { border-color: var(--n-blue); }

        .total-section { padding-top: 15px; border-top: 1px solid #222; }
        .total-line { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 11px; margin-bottom: 8px; color: #888; }
        #cart-total-price { font-size: 18px; color: var(--n-blue); }

        .submit-btn { width: 100%; padding: 18px; background: white; color: black; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        
        #intro-overlay { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; align-items: center; justify-content: center; }
        .floating-logo { width: 220px; filter: drop-shadow(0 0 20px var(--n-blue)); }

        .product-card { background: #080808; border: 1px solid #111; padding: 25px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="intro-overlay"><canvas id="warp-canvas"></canvas></div>
    <div class="cart-overlay" onclick="toggleCart()"></div>

    <div id="cart-drawer">
        <h2 style="font-family:'Orbitron'; font-size: 1.1rem; border-bottom: 1px solid #222; padding-bottom: 15px; letter-spacing: 2px;">CHECKOUT</h2>
        
        <div id="cart-items-container" style="flex-grow:1; overflow-y:auto; padding: 15px 0;"></div>

        <div class="shipping-box" id="dhl-config" style="display:none;">
            <div style="color:#ffcc00; font-size:9px; font-family:'Orbitron'; margin-bottom:10px; display:flex; align-items:center; gap:5px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/DHL_Logo.svg" width="35"> PRIVATVERSAND
            </div>
            <input type="text" id="ship-name" class="cart-input" placeholder="Vor- & Nachname">
            <input type="text" id="ship-address" class="cart-input" placeholder="Straße & Hausnummer">
            <div style="display:flex; gap:5px;">
                <input type="text" id="ship-zip" class="cart-input" placeholder="PLZ" style="width:35%;">
                <input type="text" id="ship-city" class="cart-input" placeholder="Stadt" style="width:65%;">
            </div>
            <select id="ship-country" class="cart-input" onchange="updateCartUI()">
                <option value="DE">Deutschland (DHL Privat 2kg - 6,99 €)</option>
                <option value="EU">EU Ausland (DHL Privat - 16,49 €)</option>
                <option value="World">Weltweit (DHL Privat - 48,99 €)</option>
            </select>
        </div>

        <div class="total-section">
            <div class="total-line" style="border-top: 1px solid #222; padding-top: 10px;">
                <span>GESAMT:</span>
                <span id="cart-total-price">0.00 €</span>
            </div>
            
            <label style="font-size:9px; color:#555; display:flex; gap:8px; margin: 15px 0; cursor:pointer;">
                <input type="checkbox" id="agree-check">
                <span>Ich akzeptiere die AGB & Widerrufsbelehrung.</span>
            </label>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <header>
        <div class="brand-text" translate="no">LEXORD®</div>
        <div class="cart-btn" onclick="toggleCart()" style="cursor:pointer; position:relative;">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span id="nav-cart-count" style="position:absolute; top:-8px; right:-8px; background:var(--n-blue); color:black; border-radius:50%; padding:2px 6px; font-size:10px; font-weight:bold;">0</span>
        </div>
    </header>

    <main>
        <section style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <img src="IMG_7023.png" class="floating-logo">
            <h1 style="font-family:'Orbitron'; letter-spacing:10px; margin-top:20px;">BEYOND LIMITS</h1>
        </section>

        <section style="padding: 50px 6%; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px;">
            <div class="product-card">
                <img src="Photoroom_20260305_123705.png" style="width:100%; max-height:220px; object-fit:contain;">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-top:20px;">LXRD PERFORMANCE</h3>
                <div style="color:var(--n-blue); font-family:'Orbitron'; margin:15px 0;">247,00 €</div>
                <button class="submit-btn" onclick="addToCart('LXRD Performance', 247.00, 'Photoroom_20260305_123705.png')">IN DEN WARENKORB</button>
            </div>
            <div class="product-card">
                <img src="Stickzange.PNG" style="width:100%; max-height:220px; object-fit:contain;">
                <h3 style="font-family:'Orbitron'; font-size:14px; margin-top:20px;">STICKZANGE PRO</h3>
                <div style="color:var(--n-blue); font-family:'Orbitron'; margin:15px 0;">9,95 €</div>
                <button class="submit-btn" onclick="addToCart('Stickzange Pro', 9.95, 'Stickzange.PNG')">IN DEN WARENKORB</button>
            </div>
        </section>
    </main>

    <script>
        let cart = [];

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            const overlay = document.querySelector('.cart-overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function addToCart(name, price, img) {
            cart.push({ name, price, img });
            updateCartUI();
            if(!document.getElementById('cart-drawer').classList.contains('active')) toggleCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        /* DEINE ORIGINAL-LOGIK MIT DHL-UPGRADE */
        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-total-price');
            const navCount = document.getElementById('nav-cart-count');
            
            container.innerHTML = '';
            let subtotal = 0;

            // DHL PRIVATPREISE 2026 (Dynamisch nach Land)
            const country = document.getElementById('ship-country').value;
            let shippingCosts = 0;
            if (country === 'DE') shippingCosts = 6.99;
            else if (country === 'EU') shippingCosts = 16.49;
            else shippingCosts = 48.99;

            cart.forEach((item, index) => {
                subtotal += item.price;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p style="color:var(--n-blue); font-size:10px;">${item.price.toFixed(2)} €</p>
                            <span onclick="removeFromCart(${index})" style="font-size:8px; color:#555; cursor:pointer; text-decoration:underline;">ENTFERNEN</span>
                        </div>
                    </div>`;
            });

            // Versand nur berechnen, wenn Artikel im Warenkorb sind
            let finalTotal = subtotal > 0 ? (subtotal + shippingCosts) : 0;

            if (subtotal > 0) {
                document.getElementById('dhl-config').style.display = 'block';
                container.innerHTML += `
                    <div style="padding: 10px; border-top: 1px solid #222; font-size: 10px; display: flex; justify-content: space-between; color: #888; margin-top:10px;">
                        <span>Versandkosten (DHL versichert):</span>
                        <span>${shippingCosts.toFixed(2)} €</span>
                    </div>`;
            } else {
                document.getElementById('dhl-config').style.display = 'none';
            }

            totalEl.innerText = finalTotal.toFixed(2) + ' €';
            navCount.innerText = cart.length;
            
            // Übergibt den neuen Endpreis an PayPal
            renderPayPal(finalTotal);
        }

        function renderPayPal(total) {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = '';
            if(total <= 0) return;

            paypal.Buttons({
                style: { layout: 'vertical', color: 'blue', shape: 'rect' },
                onClick: (data, actions) => {
                    const name = document.getElementById('ship-name').value;
                    const addr = document.getElementById('ship-address').value;
                    if(!name || !addr || !document.getElementById('agree-check').checked) {
                        alert("Bitte Lieferadresse vollständig ausfüllen und AGB akzeptieren.");
                        return actions.reject();
                    }
                },
                createOrder: (data, actions) => {
                    return actions.order.create({
                        purchase_units: [{ amount: { value: total.toFixed(2), currency_code: 'EUR' } }]
                    });
                },
                onApprove: (data, actions) => {
                    return actions.order.capture().then(details => {
                        alert('Zahlung erfolgt! Danke für deine Bestellung bei LEXORD.');
                        cart = []; updateCartUI(); toggleCart();
                    });
                }
            }).render('#paypal-button-container');
        }

        // Warp Speed Intro
        const wC = document.getElementById('warp-canvas'), wX = wC.getContext('2d');
        function rW() { wC.width = window.innerWidth; wC.height = window.innerHeight; }
        window.addEventListener('resize', rW); rW();
        let pts = []; for(let i=0; i<800; i++) pts.push({x: Math.random()*wC.width-wC.width/2, y: Math.random()*wC.height-wC.height/2, z: Math.random()*wC.width});
        function aW() { 
            wX.fillStyle = "black"; wX.fillRect(0,0,wC.width, wC.height); wX.fillStyle = "white"; 
            pts.forEach(s => { s.z -= 15; if(s.z<=0) s.z=wC.width; let ox=s.x/s.z*wC.width+wC.width/2, oy=s.y/s.z*wC.width+wC.height/2; wX.fillRect(ox,oy,2,2); }); 
            requestAnimationFrame(aW); 
        }
        aW();
        window.addEventListener('load', () => { setTimeout(() => { gsap.to("#intro-overlay", { opacity: 0, duration: 1, onComplete: () => document.getElementById('intro-overlay').style.display='none' }); }, 1200); });
    </script>
</body>
</html>
