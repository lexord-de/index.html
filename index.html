<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title translate="no">LEXORD® | High-End Engineering</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>

    <style>
        :root { --n-blue: #00f2ff; --bg: #000; --panel: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- HEADER & NAV --- */
        header { position: fixed; top: 40px; width: 100%; z-index: 10000; padding: 0 6%; display: flex; justify-content: space-between; align-items: center; }
        .brand-text { font-family: 'Orbitron'; font-weight: 900; font-size: 1.4rem; letter-spacing: 4px; color: #fff; }
        .cart-btn { cursor: pointer; position: relative; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--n-blue); color: #000; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 10px; font-family: 'Orbitron'; }

        /* --- BACKGROUND --- */
        #star-canvas { position: fixed; inset: 0; z-index: -1; }

        /* --- HERO --- */
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .floating-logo { width: 200px; filter: drop-shadow(0 0 15px var(--n-blue)); margin-bottom: 20px; }
        .hero-title { font-family: 'Orbitron'; font-size: clamp(1.5rem, 8vw, 3rem); letter-spacing: 10px; margin-bottom: 20px; }

        /* --- PRODUCT SLIDER --- */
        .swiper { width: 100%; padding: 50px 0; }
        .swiper-slide { width: 320px; height: 450px; background: #080808; border: 1px solid #111; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .swiper-slide:hover { border-color: var(--n-blue); box-shadow: 0 0 30px rgba(0,242,255,0.1); }
        .prod-img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; }
        .prod-name { font-family: 'Orbitron'; font-size: 14px; margin-bottom: 10px; text-align: center; }
        .prod-price { color: var(--n-blue); font-weight: 700; margin-bottom: 20px; font-family: 'Orbitron'; }
        
        /* --- BUTTONS --- */
        .btn-add { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-family: 'Orbitron'; font-weight: 900; font-size: 10px; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .btn-add:hover { background: var(--n-blue); }

        /* --- SHOP GRID (ACCESSORIES) --- */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 6% 6%; max-width: 1200px; margin: 0 auto; }
        .card { background: #080808; border: 1px solid #111; padding: 20px; border-radius: 15px; text-align: center; }

        /* --- SHOPIFY CHECKOUT DRAWER --- */
        #checkout-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 99999; display: none; backdrop-filter: blur(10px); }
        .checkout-drawer { position: fixed; top: 0; right: 0; width: 100%; max-width: 450px; height: 100%; background: #000; border-left: 1px solid #222; padding: 30px; color: #fff; display: flex; flex-direction: column; transition: transform 0.4s ease; transform: translateX(100%); }
        .drawer-open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #111; padding-bottom: 15px; }
        .cart-items-list { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
        .cart-item-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; padding: 10px; background: #080808; border-radius: 8px; }
        .total-box { border-top: 1px solid #222; padding-top: 20px; margin-bottom: 30px; }
        .total-row { display: flex; justify-content: space-between; font-size: 20px; font-family: 'Orbitron'; color: var(--n-blue); }

        /* PAYMENT BUTTONS (Like Screenshot) */
        .pay-btn { width: 100%; height: 55px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; transition: 0.2s; }
        .pay-btn:active { transform: scale(0.97); }
        .btn-paypal { background: #2c2e2f; color: #fff; } /* Dunkler PayPal Button */
        .btn-paypal span { color: #0070ba; } /* PayPal Blau */
        .btn-sepa { background: #fff; color: #000; }
        .btn-card { background: #2c2e2f; color: #fff; }
        .sub-info { text-align: center; font-size: 11px; color: #555; margin-top: 10px; }

        .reveal { opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <header>
        <div class="brand-text">LEXORD®</div>
        <div class="cart-btn" onclick="toggleCart()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span class="cart-count" id="count">0</span>
        </div>
    </header>

    <div id="checkout-overlay" onclick="if(event.target===this) toggleCart()">
        <div class="checkout-drawer" id="drawer">
            <div class="drawer-header">
                <span style="font-family:'Orbitron'; font-size: 12px; letter-spacing: 2px;">WARENKORB</span>
                <span style="cursor:pointer; font-size: 24px;" onclick="toggleCart()">×</span>
            </div>
            
            <div class="cart-items-list" id="cart-list">
                </div>

            <div class="total-box">
                <div class="total-row">
                    <span>TOTAL</span>
                    <span id="total-price">0,00 €</span>
                </div>
            </div>

            <div class="payment-area">
                <button class="pay-btn btn-paypal" onclick="redirectToPaypal()">
                    Mit <b>PayPal</b> zahlen
                </button>
                <button class="pay-btn btn-sepa" onclick="redirectToPaypal()">
                    Mit <b>SEPA</b> Lastschrift
                </button>
                <button class="pay-btn btn-card" onclick="redirectToPaypal()">
                    Debit- oder Kreditkarte
                </button>
                <div class="sub-info">Sicherer Checkout via PayPal Gateway</div>
            </div>
        </div>
    </div>

    <section class="hero">
        <img src="IMG_7023.png" class="floating-logo">
        <h1 class="hero-title">BEYOND LIMITS</h1>
    </section>

    <section class="reveal">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <img src="Photoroom_20260305_123705.png" class="prod-img">
                    <div class="prod-name">LXRD PERFORMANCE BLACK</div>
                    <div class="prod-price">240,00 €</div>
                    <button class="btn-add" onclick="addItem('Performance Black', 240)">HINZUFÜGEN</button>
                </div>
                <div class="swiper-slide">
                    <img src="Photoroom_20260305_140346.png" class="prod-img">
                    <div class="prod-name">LXRD PLUS BLACK</div>
                    <div class="prod-price">180,00 €</div>
                    <button class="btn-add" onclick="addItem('LXRD Plus Black', 180)">HINZUFÜGEN</button>
                </div>
                <div class="swiper-slide">
                    <img src="Photoroom_20260305_124906.png" class="prod-img">
                    <div class="prod-name">LXRD BASIC BLACK</div>
                    <div class="prod-price">105,00 €</div>
                    <button class="btn-add" onclick="addItem('LXRD Basic Black', 105)">HINZUFÜGEN</button>
                </div>
            </div>
        </div>
    </section>

    <section class="shop-grid reveal">
        <div class="card">
            <img src="Stickzange.PNG" style="width:150px; margin-bottom: 15px;">
            <div class="prod-name">STICKZANGE PRO</div>
            <div class="prod-price">5,95 €</div>
            <button class="btn-add" onclick="addItem('Stickzange Pro', 5.95)">HINZUFÜGEN</button>
        </div>
        <div class="card">
            <img src="Photoroom_20260304_212902.png" style="width:150px; margin-bottom: 15px;">
            <div class="prod-name">PADDLE SYSTEM V2</div>
            <div class="prod-price">45,95 €</div>
            <button class="btn-add" onclick="addItem('Paddle System V2', 45.95)">HINZUFÜGEN</button>
        </div>
    </section>

    <script>
        let cart = [];

        function toggleCart() {
            const overlay = document.getElementById('checkout-overlay');
            const drawer = document.getElementById('drawer');
            if(overlay.style.display === 'block') {
                drawer.classList.remove('drawer-open');
                setTimeout(() => overlay.style.display = 'none', 400);
            } else {
                overlay.style.display = 'block';
                setTimeout(() => drawer.classList.add('drawer-open'), 10);
                renderCart();
            }
        }

        function addItem(name, price) {
            cart.push({name, price});
            document.getElementById('count').innerText = cart.length;
            toggleCart(); // Öffnet sofort den Checkout wie bei Shopify
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            const totalEl = document.getElementById('total-price');
            list.innerHTML = "";
            let total = 0;
            
            if(cart.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#444; margin-top:50px;'>Warenkorb leer</p>";
            }

            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `
                    <div class="cart-item-row">
                        <span>${item.name}</span>
                        <span>${item.price.toFixed(2)} €</span>
                    </div>
                `;
            });
            totalEl.innerText = total.toFixed(2) + " €";
        }

        function redirectToPaypal() {
            if(cart.length === 0) return alert("Warenkorb ist leer!");
            
            // Shopify-Professional Redirect Simulation
            const total = cart.reduce((sum, item) => sum + item.price, 0).toFixed(2);
            document.body.innerHTML = `
                <div style="background:#000; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Inter';">
                    <div style="width:50px; height:50px; border:3px solid #222; border-top-color:var(--n-blue); border-radius:50%; animation: spin 1s linear infinite;"></div>
                    <p style="color:#fff; margin-top:20px; letter-spacing:2px; font-size:12px;">WEITERLEITUNG ZU PAYPAL SECURE GATEWAY...</p>
                    <p style="color:var(--n-blue); font-weight:bold; margin-top:10px;">BETRAG: ${total} €</p>
                </div>
                <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
            `;
            
            // Hier würde die echte URL von PayPal stehen
            setTimeout(() => {
                window.location.href = "https://www.paypal.com/checkoutnow?amount=" + total;
            }, 2000);
        }

        // Swiper & GSAP
        new Swiper(".mySwiper", {
            effect: "coverflow",
            centeredSlides: true,
            slidesPerView: "auto",
            coverflowEffect: { rotate: 0, stretch: 0, depth: 100, modifier: 2, slideShadows: false }
        });

        gsap.utils.toArray(".reveal").forEach(el => {
            gsap.to(el, { scrollTrigger: el, opacity: 1, y: 0, duration: 1 });
        });

        // Background
        const canvas = document.getElementById('star-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            for(let i=0; i<100; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
        }
        drawStars();
    </script>
</body>
</html>
