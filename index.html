<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title translate="no">LEXORD® | High-End Engineering | 2026</title>
    
    <script src="https://www.paypal.com/sdk/js?client-id=AZOQW-hurpyvyR5OMuYdjPTJKG5jXuY-g2sKH-RZI3cMovxiLiSOc72y1_8EgqIAwjfPw220AmzuRfhd&currency=EUR"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>

    <style>
        :root { --n-blue: #00f2ff; --bg: #000000; --panel: #0a0a0a; --trust-green: #00b67a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Navigation */
        header { position: fixed; top: 40px; width: 100%; z-index: 10000; padding: 0 6%; display: flex; justify-content: space-between; align-items: center; height: 80px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .brand-text { font-family: 'Orbitron'; font-weight: 900; font-size: 1.5rem; letter-spacing: 4px; color: white; text-decoration: none; }
        
        .nav-controls { display: flex; align-items: center; gap: 20px; }
        .burger-menu { cursor: pointer; display: flex; flex-direction: column; gap: 5px; z-index: 10001; }
        .burger-bar { width: 25px; height: 2px; background: white; transition: 0.3s; }

        #full-nav { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; transform: translateX(100%); transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); }
        #full-nav.active { transform: translateX(0); }
        .nav-link { font-family: 'Orbitron'; font-size: 1.5rem; color: white; text-decoration: none; letter-spacing: 3px; transition: 0.3s; }
        .nav-link:hover { color: var(--n-blue); text-shadow: 0 0 10px var(--n-blue); }

        /* Ticker */
        .ticker-wrapper { position: fixed; top: 0; width: 100%; z-index: 11000; font-family: 'Orbitron'; font-size: 9px; background: black; border-bottom: 1px solid #111; padding: 8px 0; }
        .ticker-move { display: inline-block; animation: ticker-scroll 30s linear infinite; white-space: nowrap; }
        @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Sections */
        section { padding: 100px 6%; opacity: 0; transform: translateY(30px); }
        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding-top: 150px; opacity: 1; transform: none; }
        .floating-logo { width: 200px; filter: drop-shadow(0 0 15px var(--n-blue)); margin-bottom: 20px; }

        /* Shop Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 50px; }
        .card { background: #080808; border: 1px solid #111; padding: 25px; border-radius: 20px; text-align: center; transition: 0.4s; }
        .card:hover { border-color: var(--n-blue); box-shadow: 0 0 25px rgba(0,242,255,0.2); }
        .card img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 15px; }

        /* Form */
        .contact-form { max-width: 600px; margin: 0 auto; background: #050505; padding: 40px; border-radius: 20px; border: 1px solid #111; }
        .input-field { width: 100%; padding: 15px; background: #000; border: 1px solid #222; color: white; margin-bottom: 15px; font-family: 'Inter'; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: var(--n-blue); }
        .submit-btn { width: 100%; padding: 18px; background: white; color: black; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: var(--n-blue); transform: scale(1.02); }

        /* Cart Drawer */
        #cart-drawer { position: fixed; top: 0; right: -450px; width: 100%; max-width: 400px; height: 100%; background: #080808; z-index: 100001; transition: 0.5s; padding: 30px; display: flex; flex-direction: column; border-left: 1px solid #111; }
        #cart-drawer.active { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100000; display: none; backdrop-filter: blur(5px); }
        
        #intro-overlay { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="intro-overlay"><img src="IMG_7023.png" class="floating-logo" style="width:100px;"></div>

    <div class="ticker-wrapper">
        <div class="ticker-move">
            <span style="margin-right:50px;">FREE SHIPPING GERMANY</span>
            <span style="margin-right:50px;">TMR NO-DRIFT STICKS</span>
            <span style="margin-right:50px;">24H DISPATCH</span>
            <span style="margin-right:50px;">MADE IN GERMANY</span>
            <span style="margin-right:50px;">FREE SHIPPING GERMANY</span>
        </div>
    </div>

    <header>
        <a href="#" class="brand-text">LEXORD®</a>
        <div class="nav-controls">
            <div class="cart-btn" onclick="toggleCart()" style="cursor:pointer; position:relative;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span id="nav-cart-count" style="position:absolute; top:-8px; right:-8px; background:var(--n-blue); color:black; font-size:10px; font-weight:bold; padding:2px 6px; border-radius:50%;">0</span>
            </div>
            <div class="burger-menu" onclick="toggleMenu()">
                <div class="burger-bar"></div><div class="burger-bar"></div><div class="burger-bar"></div>
            </div>
        </div>
    </header>

    <nav id="full-nav">
        <a href="#hero" class="nav-link" onclick="toggleMenu()">HOME</a>
        <a href="#shop" class="nav-link" onclick="toggleMenu()">PRODUKTE</a>
        <a href="#contact" class="nav-link" onclick="toggleMenu()">KONTAKT</a>
    </nav>

    <main>
        <section id="hero" class="hero">
            <img src="IMG_7023.png" class="floating-logo">
            <h1 style="font-family:'Orbitron'; font-size:clamp(1.5rem, 8vw, 3.5rem); letter-spacing:10px;">BEYOND LIMITS</h1>
            <p style="color:var(--n-blue); font-family:'Orbitron'; font-size:12px; margin-top:10px;">HIGH-END ENGINEERING</p>
        </section>

        <section id="shop" class="reveal">
            <h2 style="font-family:'Orbitron'; text-align:center; letter-spacing:5px;">PRODUKTE</h2>
            <div class="grid">
                <div class="card">
                    <img src="Photoroom_20260305_123705.png">
                    <h3 style="font-family:'Orbitron'; font-size:14px;">LXRD PERFORMANCE</h3>
                    <p style="color:var(--n-blue); margin:10px 0;">247,00 €</p>
                    <button class="submit-btn" onclick="addToCart('LXRD Performance', 247.00, 'Photoroom_20260305_123705.png')">ADD TO CART</button>
                </div>
                <div class="card">
                    <img src="Stickzange.PNG">
                    <h3 style="font-family:'Orbitron'; font-size:14px;">STICKZANGE PRO</h3>
                    <p style="color:var(--n-blue); margin:10px 0;">9,95 €</p>
                    <button class="submit-btn" onclick="addToCart('Stickzange Pro', 9.95, 'Stickzange.PNG')">ADD TO CART</button>
                </div>
            </div>
        </section>

        <section id="contact" class="reveal">
            <div class="contact-form">
                <h2 style="font-family:'Orbitron'; text-align:center; margin-bottom:30px;">KONTAKT</h2>
                <form onsubmit="event.preventDefault(); alert('Nachricht gesendet!');">
                    <input type="text" placeholder="NAME" class="input-field" required>
                    <input type="email" placeholder="E-MAIL" class="input-field" required>
                    <textarea placeholder="DEINE NACHRICHT" class="input-field" style="height:150px;" required></textarea>
                    <button type="submit" class="submit-btn">SENDEN</button>
                </form>
            </div>
        </section>
    </main>

    <div class="cart-overlay" onclick="toggleCart()"></div>
    <div id="cart-drawer">
        <h3 style="font-family:'Orbitron'; border-bottom:1px solid #222; padding-bottom:15px;">WARENKORB</h3>
        <div id="cart-items-container" style="flex-grow:1; overflow-y:auto; padding:20px 0;"></div>
        <div style="border-top:1px solid #222; padding-top:20px;">
            <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; margin-bottom:15px;">
                <span>TOTAL:</span>
                <span id="cart-total-price" style="color:var(--n-blue);">0.00 €</span>
            </div>
            <label style="font-size:10px; color:#888; display:block; margin-bottom:15px; cursor:pointer;">
                <input type="checkbox" id="cart-agree"> Ich akzeptiere die AGB & Widerrufsbelehrung.
            </label>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <script>
        let cart = [];

        function toggleMenu() {
            document.getElementById('full-nav').classList.toggle('active');
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            const overlay = document.querySelector('.cart-overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function addToCart(name, price, img) {
            cart.push({ name, price, img });
            updateCartUI();
            toggleCart();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-total-price');
            const navCount = document.getElementById('nav-cart-count');
            container.innerHTML = '';
            let total = 0;
            
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div style="display:flex; gap:15px; background:#0c0c0c; padding:10px; border-radius:10px; margin-bottom:10px; align-items:center;">
                        <img src="${item.img}" style="width:40px;">
                        <div style="flex-grow:1; font-size:11px;">
                            <h4 style="font-family:'Orbitron';">${item.name}</h4>
                            <p>${item.price.toFixed(2)} €</p>
                        </div>
                    </div>`;
            });

            totalEl.innerText = total.toFixed(2) + ' €';
            navCount.innerText = cart.length;
            renderPayPal(total);
        }

        function renderPayPal(total) {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = '';
            if(total <= 0) return;

            paypal.Buttons({
                createOrder: (data, actions) => {
                    if(!document.getElementById('cart-agree').checked) {
                        alert("Bitte akzeptieren Sie die AGB.");
                        return;
                    }
                    return actions.order.create({ purchase_units: [{ amount: { value: total.toFixed(2) } }] });
                },
                onApprove: (data, actions) => actions.order.capture().then(() => {
                    alert('Erfolgreich!'); cart = []; updateCartUI(); toggleCart();
                })
            }).render('#paypal-button-container');
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                gsap.to("#intro-overlay", { opacity: 0, duration: 1, onComplete: () => {
                    document.getElementById('intro-overlay').style.display = "none";
                    gsap.utils.toArray(".reveal").forEach(el => {
                        gsap.to(el, { scrollTrigger: { trigger: el, start: "top 85%" }, opacity: 1, y: 0, duration: 1 });
                    });
                }});
            }, 1000);
        });
    </script>
</body>
</html>
