<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title translate="no">LEXORD® | High-End Engineering | Beste Scuf Alternative 2026</title>
    
    <meta name="description" content="LEXORD® Engineering: Die ultimative Premium Scuf Alternative. High-End Paddle Systeme, Stickzangen & Custom Controller Tuning. Made in Germany.">
    <meta name="keywords" content="LEXORD, Scuf Alternative, Scuf Controller, PS5 Scuf, Xbox Scuf, Gaming Engineering, Hall Effect Sticks, Digital Trigger, Clicky Buttons">
    
    <link rel="icon" type="image/png" href="IMG_7023.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <script src="https://unpkg.com/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
    <script data-goatcounter="https://lexord.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

    <style>
        :root { --n-blue: #00f2ff; --n-purple: #bc13fe; --bg: #000000; --panel: #0a0a0a; --trust-green: #00b67a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; top: 0 !important; }

        .goog-te-banner-frame, .goog-te-balloon-frame, #goog-gt-tt, .skiptranslate, .goog-te-spinner-pos { display: none !important; }
        body { top: 0 !important; }

        .lang-switcher { display: flex; gap: 10px; font-family: 'Orbitron'; font-size: 10px; }
        .lang-btn { cursor: pointer; color: #444; transition: 0.3s; padding: 5px; }
        .lang-btn.active { color: var(--n-blue); text-shadow: 0 0 8px var(--n-blue); }

        #star-canvas { position: fixed; inset: 0; z-index: -1; background: #000; }
        #intro-overlay { position: fixed; inset: 0; background: black; z-index: 100000; display: flex; align-items: center; justify-content: center; }

        .floating-logo { width: 230px; filter: drop-shadow(0 0 20px var(--n-blue)); animation: floatLogo 4s ease-in-out infinite; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }

        header { position: fixed; top: 80px; width: 100%; z-index: 10000; padding: 0 6%; display: flex; justify-content: space-between; align-items: center; }
        .brand-text { font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; letter-spacing: 4px; }
        
        .search-container { position: relative; margin: 0 15px; flex-grow: 1; max-width: 200px; }
        .search-input { width: 100%; padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid #222; color: white; font-family: 'Orbitron'; font-size: 9px; border-radius: 4px; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--n-blue); background: rgba(0, 242, 255, 0.05); }
        #search-results { position: absolute; top: 110%; left: 0; width: 100%; background: #0a0a0a; border: 1px solid #111; border-radius: 4px; display: none; z-index: 11000; }
        .result-item { padding: 8px; font-size: 10px; cursor: pointer; border-bottom: 1px solid #151515; font-family: 'Orbitron'; }
        .result-item:hover { background: #111; color: var(--n-blue); }

        .cart-btn { cursor: pointer; transition: 0.3s; display: flex; align-items: center; position: relative; }
        .cart-count-badge { position: absolute; top: -8px; right: -8px; background: var(--n-blue); color: black; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 50%; box-shadow: 0 0 10px var(--n-blue); }

        /* --- CHECKOUT DRAWER --- */
        #cart-drawer { position: fixed; top: 0; right: -450px; width: 100%; max-width: 400px; height: 100%; background: #080808; z-index: 100001; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); border-left: 1px solid #111; padding: 30px; display: flex; flex-direction: column; box-shadow: -20px 0 50px rgba(0,0,0,0.8); }
        #cart-drawer.active { right: 0; }
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100000; display: none; backdrop-filter: blur(8px); }
        .cart-header { font-family: 'Orbitron'; font-size: 1rem; border-bottom: 1px solid #222; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; letter-spacing: 2px; }
        .cart-items { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; background: #0c0c0c; padding: 12px; border-radius: 12px; border: 1px solid #151515; }
        .cart-item img { width: 50px; height: 50px; object-fit: contain; }
        .cart-item-info h4 { font-family: 'Orbitron'; font-size: 10px; margin-bottom: 5px; }
        .cart-footer { border-top: 1px solid #222; padding-top: 20px; }
        .total-row { display: flex; justify-content: space-between; font-family: 'Orbitron'; margin-bottom: 20px; color: var(--n-blue); font-size: 14px; font-weight: 700; }
        
        /* Direkter Checkout Button */
        .direct-pay-btn { display: block; width: 100%; padding: 18px; background: var(--n-blue); color: black; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; text-align: center; text-decoration: none; transition: 0.3s; }
        .direct-pay-btn:hover { background: white; box-shadow: 0 0 20px var(--n-blue); }

        /* BMC Button */
        .bmc-link { display: inline-flex; align-items: center; background: #FFDD00; color: #000; padding: 10px 20px; border-radius: 10px; font-family: 'Orbitron'; font-size: 11px; font-weight: 900; text-decoration: none; margin-top: 20px; transition: 0.3s; }
        .bmc-link:hover { box-shadow: 0 0 15px #FFDD00; transform: scale(1.05); }

        .config-section { width: 100%; padding: 60px 0; background: transparent; }
        .swiper { width: 100%; max-width: 500px; padding-bottom: 50px; }
        .swiper-slide { perspective: 1000px; background: transparent !important; border: none !important; height: 480px; }
        .product-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .swiper-slide:hover .product-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; background: #080808; border-radius: 25px; padding: 25px; border: 1px solid #111; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .card-back { transform: rotateY(180deg); border-color: var(--n-blue); background: #050505; }
        .config-img { width: 100%; height: 250px; object-fit: contain; margin-bottom: 20px; }
        .prod-title { font-family: 'Orbitron'; font-size: 13px; letter-spacing: 2px; margin-bottom: 8px; color: white; }
        .price-tag { font-family: 'Orbitron'; color: var(--n-blue); font-size: 16px; font-weight: 700; }
        .reveal { opacity: 0; transform: translateY(50px); }

        .trust-section { padding: 80px 0; background: #000; text-align: center; overflow: hidden; }
        .ticker-track { display: flex; gap: 25px; animation: ticker-scroll-rev 40s linear infinite; padding: 20px 0; }
        @keyframes ticker-scroll-rev { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        .review-card-mini { background: #080808; border: 1px solid #151515; padding: 20px; border-radius: 12px; width: 300px; flex-shrink: 0; text-align: left; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 100px 6%; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--panel); padding: 30px; border-radius: 15px; border: 1px solid #111; text-align: center; transition: 0.4s; }
        .card:hover { border-color: var(--n-blue); transform: translateY(-5px); }

        .submit-btn { width: 100%; padding: 18px; background: white; color: black; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin-top: 15px; text-transform: uppercase; transition: 0.3s; }
        .submit-btn:hover { background: var(--n-blue); }
        .input-field { width: 100%; padding: 15px; background: #000; border: 1px solid #222; color: white; margin-bottom: 12px; outline: none; }

        .footer-wrap { padding: 60px 20px; background: linear-gradient(-45deg, #00f2ff, #000, #bc13fe, #000); background-size: 400% 400%; animation: footerGradient 10s ease infinite; margin-top: 100px; }
        @keyframes footerGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .ticker-wrapper { position: fixed; top: 0; width: 100%; z-index: 9000; font-family: 'Orbitron'; font-size: 9px; pointer-events: none; background: #000; }
        .ticker-move { display: inline-block; animation: ticker-scroll 35s linear infinite; padding: 8px 0; }
        @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        #full-nav { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 40000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transform: translateX(100%); transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); }
        #full-nav.active { transform: translateX(0); }
        .nav-link { font-family: 'Orbitron'; font-size: 1.3rem; text-decoration: none; color: white; }
    </style>
</head>
<body class="notranslate">

    <div id="intro-overlay"><canvas id="warp-canvas"></canvas></div>
    <canvas id="star-canvas"></canvas>
    <div class="cart-overlay" onclick="toggleCart()"></div>

    <div id="cart-drawer">
        <div class="cart-header">
            <span>WARENKORB</span>
            <span style="cursor:pointer; font-size: 24px; color: var(--n-blue);" onclick="toggleCart()">×</span>
        </div>
        <div class="cart-items" id="cart-items-container"></div>
        <div class="cart-footer">
            <div class="total-row">
                <span>GESAMT:</span>
                <span id="cart-total-price">0.00 €</span>
            </div>
            <label class="check-container">
                <input type="checkbox" id="cart-agree">
                <span>AGB gelesen & akzeptiert.</span>
            </label>
            <a href="#" id="paypal-link" class="direct-pay-btn" onclick="checkPay(event)">JETZT MIT PAYPAL BEZAHLEN</a>
            <p style="font-size: 8px; text-align: center; margin-top: 15px; color: #444; font-family: 'Orbitron';">KÄUFERSCHUTZ ÜBER PAYPAL DIREKT</p>
        </div>
    </div>

    <header>
        <div class="brand-text" translate="no">LEXORD®</div>
        <div class="nav-controls" style="display:flex; align-items:center; gap:25px;">
            <div class="cart-btn" onclick="toggleCart()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="cart-count-badge" id="nav-cart-count">0</span>
            </div>
            <div class="burger-menu" onclick="toggleMenu()" style="cursor:pointer;">
                <div style="width:25px; height:2px; background:white; margin:4px 0;"></div>
                <div style="width:25px; height:2px; background:white; margin:4px 0;"></div>
            </div>
        </div>
    </header>

    <nav id="full-nav">
        <a href="#hero" class="nav-link" onclick="toggleMenu()">HOME</a>
        <a href="#shop" class="nav-link" onclick="toggleMenu()">PRODUKTE</a>
        <a href="https://www.buymeacoffee.com/lexord" target="_blank" class="bmc-link">
            <img src="https://cdn.buymeacoffee.com/buttons/bmc-new-btn-logo.svg" alt="BMC" width="15" style="margin-right:8px;">
            SUPPORT ENGINEERING
        </a>
    </nav>

    <main id="main-content">
        <section id="hero" style="min-height:90vh; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <img src="IMG_7023.png" class="floating-logo">
            <h1 translate="no" style="font-family:'Orbitron'; font-size:2rem; margin-top:20px; letter-spacing:8px;">BEYOND LIMITS</h1>
        </section>

        <section class="grid reveal" id="shop">
            <div class="card">
                <img src="Stickzange.PNG" style="width:100%; border-radius:10px;">
                <h3 style="font-family:'Orbitron'; margin-top:15px; font-size:12px;">STICKZANGE PRO</h3>
                <p style="color:var(--n-blue); margin: 10px 0;">9,95 €</p>
                <button class="submit-btn" onclick="addToCart('Stickzange Pro', 9.95, 'Stickzange.PNG')">WARENKORB</button>
            </div>
            </section>

        <footer class="footer-wrap">
            <div style="text-align:center;">
                <a href="https://www.buymeacoffee.com/lexord" target="_blank" class="bmc-link" style="margin-bottom:30px;">
                    <img src="https://cdn.buymeacoffee.com/buttons/bmc-new-btn-logo.svg" alt="BMC" width="15" style="margin-right:8px;">
                    BUY ME A COFFEE
                </a>
                <div class="rights-text" style="font-family:'Orbitron'; font-size:10px; color:rgba(255,255,255,0.5);">LEXORD® ALL RIGHTS RESERVED</div>
            </div>
        </footer>
    </main>

    <script>
        let cart = [];
        const paypalUser = "lexord-de"; // Dein PayPal-Name für paypal.me/lexord-de

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            const overlay = document.querySelector('.cart-overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function addToCart(name, price, img) {
            cart.push({ name, price, img });
            updateCartUI();
            toggleCart();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-total-price');
            const navCount = document.getElementById('nav-cart-count');
            container.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `<div class="cart-item"><img src="${item.img}"><div><h4>${item.name}</h4><p>${item.price.toFixed(2)}€</p></div></div>`;
            });
            totalEl.innerText = total.toFixed(2) + ' €';
            navCount.innerText = cart.length;
            
            // Link Generierung: paypal.me/user/betragEUR
            document.getElementById('paypal-link').href = `https://www.paypal.me/${paypalUser}/${total.toFixed(2)}EUR`;
        }

        function checkPay(e) {
            if(!document.getElementById('cart-agree').checked) {
                e.preventDefault();
                alert("Bitte akzeptiere die AGB.");
            } else {
                alert("Du wirst zu PayPal weitergeleitet. Bitte gib deine Adresse im Verwendungszweck an!");
            }
        }

        function toggleMenu() { document.getElementById('full-nav').classList.toggle('active'); }

        // Intro & Scroll
        window.addEventListener('load', () => { 
            setTimeout(() => { 
                gsap.to("#intro-overlay", { opacity: 0, duration: 1, onComplete: () => { 
                    document.getElementById('intro-overlay').style.display = "none"; 
                    gsap.utils.toArray(".reveal").forEach(el => {
                        gsap.to(el, { opacity: 1, y: 0, duration: 1 });
                    });
                }}); 
            }, 1000); 
        });

        // Background Star Canvas (Vereinfacht)
        const sc = document.getElementById('star-canvas'), sx = sc.getContext('2d');
        function rS() { sc.width = window.innerWidth; sc.height = window.innerHeight; }
        window.addEventListener('resize', rS); rS();
        function dS() { sx.clearRect(0,0,sc.width, sc.height); sx.fillStyle="white"; for(i=0;i<50;i++) sx.fillRect(Math.random()*sc.width, Math.random()*sc.height, 1, 1); requestAnimationFrame(dS); }
        dS();
    </script>
</body>
</html>
