        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; background: #080808; border-radius: 25px; padding: 25px; border: 1px solid #111; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        @keyframes ticker-scroll-rev { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        .review-card-mini { background: #080808; border: 1px solid #151515; padding: 20px; border-radius: 12px; width: 300px; flex-shrink: 0; text-align: left; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 100px 6%; max-width: 1400px; margin: 0 auto; }

        .ticker-row { overflow: hidden; white-space: nowrap; padding: 8px 0; border-bottom: 1px solid #111; background: black; }

        @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .footer-wrap { padding: 60px 20px; background: linear-gradient(-45deg, #00f2ff, #000, #bc13fe, #000); background-size: 400%; animation: footerGradient 10s ease infinite; margin-top: 100px; }
        @keyframes footerGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .burger-menu { cursor: pointer; width: 25px; height: 16px; display: flex; flex-direction: column; justify-content: space-between; z-index: 40005; }
        .burger-bar { height: 1.5px; width: 100%; background: white; transition: 0.3s; }
        #full-nav { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 40000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transform: translateX(100%); transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1); }
        #full-nav.active { transform: translateX(0); }
        .nav-link { font-family: 'Orbitron'; font-size: 1.3rem; text-decoration: none; color: white; }

<body class="notranslate">

    <div id="intro-overlay"><canvas id="warp-canvas"></canvas></div>

    <div id="cart-drawer">

    <div class="ticker-wrapper">
        <div class="ticker-row">

                <span style="margin-right:50px;">VERSAND INNERHALB VON 24 STUNDEN</span>
                <span style="margin-right:50px;">MADE IN GERMANY</span>
                <span style="margin-right:50px;">TOP BEWERTUNG</span>

    <header>

            <div class="lang-switcher">
                <div class="lang-btn active" onclick="changeLang('de')">DE</div>
                <div class="lang-btn" onclick="changeLang('en')">EN</div>

    <main>
        <section id="hero" style="min-height:95vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding-top: 100px;">
            <img src="IMG_7023.png" class="floating-logo">

        </section>

        <section class="config-section reveal">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <div class="product-card-inner">
                            <div class="card-front">
                                <img src="Photoroom_20260305_123705.png" class="config-img">

                            </div>
                            <div class="card-back">
                                <img src="Photoroom_20260306_112425.png" class="config-img">
                                <div class="prod-title">PADDLE SYSTEM V2</div>
                                <button class="submit-btn" onclick="addToCart('LXRD Performance', 247.00, 'Photoroom_20260305_123705.png')">JETZT KAUFEN</button>

        <section class="grid reveal" id="shop">
            <div class="card">
                <img src="Stickzange.PNG" style="width:100%;">
                <h3 style="font-family:'Orbitron'; margin-top:15px; font-size:12px;">STICKZANGE PRO</h3>
                <p style="color:var(--n-blue); margin: 10px 0;">9,95 €</p>
                <button class="submit-btn" onclick="addToCart('Stickzange Pro', 9.95, 'Stickzange.PNG')">WARENKORB</button>
            </div>
        </section>
    </main>

    <script>
        // --- STRIPE INITIALISIERUNG ---
        const stripe = Stripe('pk_live_DEIN_KEY_HIER'); // Deinen Public Key hier einsetzen

        let cart = [];

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
            const overlay = document.querySelector('.cart-overlay');
            overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
        }

        function addToCart(name, price, img) {
            cart.push({ name, price, img });
            updateCartUI();
            if(!document.getElementById('cart-drawer').classList.contains('active')) toggleCart();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const totalEl = document.getElementById('cart-total-price');
            const navCount = document.getElementById('nav-cart-count');
            container.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <p style="color:var(--n-blue);">${item.price.toFixed(2)} €</p>
                        </div>
                    </div>`;
            });
            totalEl.innerText = total.toFixed(2) + ' €';
            navCount.innerText = cart.length;
        }

        async function startStripeCheckout() {
            if(!document.getElementById('cart-agree').checked) {
                alert("Bitte akzeptiere die AGB.");
                return;
            }
            if(cart.length === 0) return;

            // Für Stripe Checkout (ohne Backend) nutzt man meistens Stripe "Payment Links"
            // oder eine Server-Side Session. 
            // Hier ein Platzhalter für die Weiterleitung:
            console.log("Stripe Checkout wird aufgerufen...");
            alert("Weiterleitung zu Stripe... (Hier musst du im Dashboard einen Checkout-Link erstellen)");
            
            /* Beispiel für Integration mit Backend:
            fetch('/create-checkout-session', { method: 'POST', body: JSON.stringify(cart) })
            .then(res => res.json())
            .then(session => stripe.redirectToCheckout({ sessionId: session.id }));
            */
        }

        // --- UI ANIMATIONEN ---
        gsap.registerPlugin(ScrollTrigger);
        var swiper = new Swiper(".mySwiper", { effect: "coverflow", centeredSlides: true, slidesPerView: "auto", coverflowEffect: { rotate: 20, stretch: 0, depth: 100, modifier: 1 } });
        
        function toggleMenu() { document.getElementById('full-nav').classList.toggle('active'); }
        
        window.addEventListener('load', () => { 
            setTimeout(() => { 
                gsap.to("#intro-overlay", { opacity: 0, duration: 1, onComplete: () => {
                    document.getElementById('intro-overlay').style.display = "none";
                    gsap.utils.toArray(".reveal").forEach(el => {
                        gsap.to(el, { scrollTrigger: { trigger: el, start: "top 90%" }, opacity: 1, y: 0, duration: 1 });
                    });
                }});
            }, 1000);
        });

        // Hintergrund Warp Effekt
        const wC = document.getElementById('warp-canvas'), wX = wC.getContext('2d');
        function rW() { wC.width = window.innerWidth; wC.height = window.innerHeight; }
        window.addEventListener('resize', rW); rW();
        let pts = []; for(let i=0; i<400; i++) pts.push({x: Math.random()*wC.width-wC.width/2, y: Math.random()*wC.height-wC.height/2, z: Math.random()*wC.width});
        function aW() { wX.fillStyle = "black"; wX.fillRect(0,0,wC.width, wC.height); wX.fillStyle = "white"; pts.forEach(s => { s.z -= 10; if(s.z<=0) s.z=wC.width; let ox=s.x/s.z*wC.width+wC.width/2, oy=s.y/s.z*wC.width+wC.height/2; wX.fillRect(ox,oy,1,1); }); requestAnimationFrame(aW); }
        aW();
    </script>
