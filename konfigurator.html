<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
    <title>PS5 Konfigurator | LEXORD®</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --neon2: #bc13fe;
            --bg: #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 120px; overflow-x: hidden; }

        /* AURORA & GRID */
        .aurora { position: fixed; inset: 0; z-index: -3; background: #000; overflow: hidden; }
        .ab { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .4; animation: af 25s ease-in-out infinite; }
        .ab:nth-child(1) { width: 55%; height: 55%; background: radial-gradient(circle,rgba(0,242,255,.5),transparent 70%); top: -10%; left: -10%; }
        .grid-overlay { position: fixed; inset: 0; z-index: -2; background-image: linear-gradient(rgba(0,242,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,.025) 1px,transparent 1px); background-size: 50px 50px; pointer-events: none; }
        @keyframes af { 0%,100% { transform: translate(0,0) scale(1) } 50% { transform: translate(15%,-10%) scale(1.1) } }

        /* HEADER */
        .cfg-header { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; padding: 10px 4%; background: rgba(0,0,0,.92); backdrop-filter: blur(22px); border-bottom: 1px solid rgba(0,242,255,.15); }
        .cfg-title { font-family: 'Orbitron'; font-weight: 900; font-size: 10px; letter-spacing: 2px; flex: 1; text-align: center; }

        /* STAGE & TINTS */
        .ctrl-wrap { display: flex; flex-direction: column; align-items: center; padding: 20px 4%; }
        .ctrl-stage { position: relative; width: 100%; max-width: 520px; aspect-ratio: 1.05/1; }
        
        .photo-stack { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s; }
        .photo-stack img { width: 100%; height: 100%; object-fit: contain; position: absolute; }

        /* Anforderung 4: Stärkerer Tint (.7) & Nur Controller-Clip */
        .tint-layer {
            position: absolute; inset: 0; mix-blend-mode: multiply; opacity: 0;
            transition: .4s ease; pointer-events: none; z-index: 3;
            background-color: transparent;
            clip-path: polygon(20% 28%, 80% 28%, 90% 50%, 80% 85%, 50% 80%, 20% 85%, 10% 50%);
        }
        .tint-layer.active { opacity: 0.7; }

        /* Anforderung 5: Toast */
        #toast {
            position: fixed; top: 75px; left: 50%; transform: translateX(-50%) translateY(-100px);
            z-index: 1000; background: #000; border: 1px solid var(--neon); border-radius: 12px;
            padding: 13px 18px; font-family: 'Orbitron'; font-size: 10px; color: var(--neon);
            transition: .4s; box-shadow: 0 8px 24px rgba(0,242,255,0.3);
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        /* Anforderung 6: Größere Tap-Targets & Accordions */
        .cfg-acc { background: rgba(12,12,16,.7); border: 1px solid rgba(255,255,255,.06); border-radius: 14px; overflow: hidden; margin-bottom: 10px; }
        .cfg-acc-hd { padding: 18px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .cfg-acc-body { max-height: 0; overflow: hidden; transition: max-height 0.4s; }
        .cfg-acc.open .cfg-acc-body { max-height: 2000px; }

        .cfg-color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 10px; padding: 15px; }
        /* Kacheln min 60px hoch */
        .cfg-color-item { min-height: 60px; border-radius: 11px; cursor: pointer; border: 2px solid transparent; position: relative; }
        .cfg-color-item.sel { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,242,255,0.4); }

        /* Labels wie bei Makemycon */
        .part-label {
            position: absolute; background: rgba(0,0,0,0.85); border: 1px solid var(--neon);
            color: #fff; padding: 6px 10px; border-radius: 8px; font-family: 'Orbitron';
            font-size: 8px; opacity: 0; transition: .3s; z-index: 5; pointer-events: none;
        }
        .part-label.show { opacity: 1; }

        /* TOGGLE */
        .ctrl-toggle { display: flex; gap: 8px; margin-bottom: 20px; background: rgba(12,12,14,.7); padding: 5px; border-radius: 12px; }
        .ctrl-toggle button { background: transparent; border: none; color: #888; padding: 10px 15px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; border-radius: 8px; }
        .ctrl-toggle button.active { background: rgba(0,242,255,0.15); color: var(--neon); }

        #cfg-loading { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="cfg-loading">
    <div style="font-family:'Orbitron'; color:var(--neon); letter-spacing:3px;">LÄDT KONFIGURATOR...</div>
</div>

<div class="aurora"><div class="ab"></div></div>
<div class="grid-overlay"></div>
<div id="toast"></div>

<header class="cfg-header">
    <div class="cfg-title">PS5 KONFIGURATOR | LEXORD®</div>
</header>

<div class="ctrl-wrap">
    <div class="ctrl-toggle">
        <button id="view-front-btn" class="active">VORDERSEITE</button>
        <button id="view-back-btn">RÜCKSEITE</button>
    </div>

    <div class="ctrl-stage">
        <!-- FRONT VIEW -->
        <div class="photo-stack" id="stack-front">
            <img src="IMG0611.jpeg" alt="PS5 Front">
            <div class="tint-layer" id="tint-front"></div>
            <div class="part-label" id="lbl-frontshell" style="top:15%; left:5%;">FRONT: <span class="v">-</span></div>
        </div>
        <!-- BACK VIEW -->
        <div class="photo-stack" id="stack-back" style="opacity:0; pointer-events:none;">
            <img src="Photoroom20260501_090821.png" alt="PS5 Back">
            <div class="tint-layer" id="tint-back"></div>
            <div class="part-label" id="lbl-backshell" style="top:15%; right:5%;">RÜCKSCHALE: <span class="v">-</span></div>
        </div>
    </div>
</div>

<div id="cfg-sections" style="padding: 0 4% 100px;"></div>

<script>
    const COLORS = [
        {name: 'Standard Weiß', hex: '#ffffff'},
        {name: 'Midnight Black', hex: '#1a1a1c'},
        {name: 'Cyan Neon', hex: '#00f2ff'},
        {name: 'Cosmic Red', hex: '#a81a31'},
        {name: 'Galactic Purple', hex: '#6a1b9a'}
    ];

    const DATA = [
        {id: 'frontshell', name: 'FRONTGEHÄUSE', view: 'front'},
        {id: 'backshell', name: 'RÜCKSCHALE', view: 'back'}
    ];

    function toast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    function setView(view) {
        const sf = document.getElementById('stack-front');
        const sb = document.getElementById('stack-back');
        const bf = document.getElementById('view-front-btn');
        const bb = document.getElementById('view-back-btn');

        if(view === 'front') {
            sf.style.opacity = 1; sf.style.pointerEvents = 'auto';
            sb.style.opacity = 0; sb.style.pointerEvents = 'none';
            bf.classList.add('active'); bb.classList.remove('active');
        } else {
            sf.style.opacity = 0; sf.style.pointerEvents = 'none';
            sb.style.opacity = 1; sb.style.pointerEvents = 'auto';
            bf.classList.remove('active'); bb.classList.add('active');
        }
    }

    function init() {
        const root = document.getElementById('cfg-sections');

        DATA.forEach((sec, idx) => {
            const acc = document.createElement('div');
            acc.className = 'cfg-acc';
            // Anforderung 2: Erste Kategorie offen
            if(idx === 0) acc.classList.add('open');

            acc.innerHTML = `
                <div class="cfg-acc-hd">
                    <span>${sec.name}</span>
                    <span class="cur-val" style="color:var(--neon); font-size:9px;">Standard</span>
                </div>
                <div class="cfg-acc-body">
                    <div class="cfg-color-grid"></div>
                </div>
            `;

            const grid = acc.querySelector('.cfg-color-grid');
            COLORS.forEach(col => {
                const item = document.createElement('div');
                item.className = 'cfg-color-item';
                item.style.backgroundColor = col.hex;

                // Anforderung 1: addEventListener direkt
                item.addEventListener('click', () => {
                    // Selektion Optik
                    grid.querySelectorAll('.cfg-color-item').forEach(i => i.classList.remove('sel'));
                    item.classList.add('sel');
                    acc.querySelector('.cur-val').innerText = col.name;

                    // Anforderung 3: Auto-Switch
                    setView(sec.view);

                    // Anforderung 4: Tint
                    const tint = document.getElementById('tint-' + sec.view);
                    tint.style.backgroundColor = col.hex;
                    tint.classList.add('active');

                    // Makemycon Label & Text einblenden
                    const label = document.getElementById('lbl-' + sec.id);
                    if(label) {
                        label.classList.add('show');
                        label.querySelector('.v').innerText = col.name;
                    }

                    // Anforderung 5: Toast
                    toast(`✓ ${sec.name}: ${col.name}`);
                });
                grid.appendChild(item);
            });

            acc.querySelector('.cfg-acc-hd').addEventListener('click', () => acc.classList.toggle('open'));
            root.appendChild(acc);
        });

        // View-Switcher
        document.getElementById('view-front-btn').addEventListener('click', () => setView('front'));
        document.getElementById('view-back-btn').addEventListener('click', () => setView('back'));

        // Anforderung 7: Failsafe Loading
        setTimeout(() => {
            document.getElementById('cfg-loading').style.display = 'none';
        }, 1000);
    }

    window.onload = init;
    // Backup-Lade-Stopper (3 Sek)
    setTimeout(() => { document.getElementById('cfg-loading').style.display = 'none'; }, 3000);
</script>
</body>
</html>
