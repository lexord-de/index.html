<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
<title>PS5 Konfigurator | LEXORD®</title>
<link rel="icon" type="image/png" href="IMG_7023.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--neon:#00f2ff;--neon2:#bc13fe;--green:#00b67a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:130px;overflow-x:hidden}

/* AURORA BACKGROUND */
.aurora{position:fixed;inset:0;z-index:-3;background:#000;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35;animation:af 20s ease-in-out infinite}
.ab:nth-child(1){width:60%;height:60%;background:radial-gradient(circle,rgba(0,242,255,0.4),transparent);top:-10%;left:-10%}
.ab:nth-child(2){width:50%;height:50%;background:radial-gradient(circle,rgba(188,19,254,0.3),transparent);bottom:-10%;right:-10%;animation-delay:-5s}
@keyframes af{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(10%,-5%) scale(1.1)}}

/* HEADER & UI */
.cfg-header{position:sticky;top:0;z-index:200;display:flex;align-items:center;padding:12px 5%;background:rgba(0,0,0,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,242,255,0.1)}
.cfg-back{font-family:'Orbitron';font-size:10px;color:#aaa;text-decoration:none;padding:8px 15px;border:1px solid #333;border-radius:8px}
.cfg-title{flex:1;text-align:center;font-family:'Orbitron';font-weight:900;font-size:11px;letter-spacing:2px}

/* STAGE */
.ctrl-wrap{padding:20px 5%;display:flex;flex-direction:column;align-items:center}
.ctrl-toggle{display:flex;gap:10px;margin-bottom:20px}
.ctrl-toggle button{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#888;padding:10px 20px;border-radius:8px;font-family:'Orbitron';font-size:9px;cursor:pointer;transition:0.3s}
.ctrl-toggle button.active{background:rgba(0,242,255,0.1);color:var(--neon);border-color:var(--neon)}

.ctrl-stage{position:relative;width:100%;max-width:450px;aspect-ratio:1/1}
.ctrl-view{position:absolute;inset:0;display:none;pointer-events:none}
.ctrl-view.active{display:block}
.base-img{width:100%;height:100%;object-fit:contain;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* OVERLAYS */
.part-overlay{position:absolute;inset:0;width:100%;height:100%;z-index:2;opacity:0.7;mix-blend-mode:multiply;transition:0.3s}
.p-frontshell{clip-path:polygon(5% 30%, 95% 30%, 90% 80%, 10% 80%)} /* Beispiel-Clip */

/* ACCORDIONS */
.cfg-sects{padding:0 5% 40px;max-width:600px;margin:0 auto}
.acc{background:rgba(20,20,25,0.8);border:1px solid rgba(255,255,255,0.05);border-radius:12px;margin-bottom:10px;overflow:hidden}
.acc-hd{padding:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.acc-body{max-height:0;transition:max-height 0.4s ease-out;overflow:hidden}
.acc.open .acc-body{max-height:500px}
.color-grid{padding:15px;display:grid;grid-template-columns:repeat(auto-fill, minmax(50px, 1fr));gap:10px}
.ci{aspect-ratio:1/1;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:0.2s}
.ci.sel{border-color:var(--neon);transform:scale(1.1)}

/* BOTTOM BAR */
.cfg-bottom{position:fixed;bottom:0;width:100%;background:rgba(10,10,15,0.95);padding:20px;border-top:1px solid var(--neon);display:flex;justify-content:space-between;align-items:center;z-index:300}
.price{font-family:'Orbitron';font-size:20px;font-weight:900}
.cart-btn{background:var(--neon);color:#000;border:none;padding:12px 25px;border-radius:8px;font-family:'Orbitron';font-weight:900;cursor:pointer}
</style>
</head>
<body>

<div class="aurora"><div class="ab"></div><div class="ab"></div></div>

<header class="cfg-header">
    <a href="#" class="cfg-back">BACK</a>
    <div class="cfg-title">LEXORD® CUSTOMS</div>
</header>

<div class="ctrl-wrap">
    <div class="ctrl-toggle">
        <button id="btn-v-front" class="active" onclick="switchView('front')">FRONT</button>
        <button id="btn-v-back" onclick="switchView('back')">BACK</button>
    </div>
    <div class="ctrl-stage">
        <div id="view-front" class="ctrl-view active">
            <img class="base-img" src="Photoroom_20260501_094506.png">
            <div id="ov-frontshell" class="part-overlay p-frontshell"></div>
        </div>
        <div id="view-back" class="ctrl-view">
            <img class="base-img" src="Photoroom_20260501_090821.png">
        </div>
    </div>
</div>

<div class="cfg-sects" id="cfg-sects"></div>

<div class="cfg-bottom">
    <div class="price">TOTAL: <span id="total-price">79,00 €</span></div>
    <button class="cart-btn" onclick="addToCart()">ADD TO CART</button>
</div>

<script>
// DATEN-STRUKTUR
const CONFIG = {
    basePrice: 79.00,
    parts: [
        { id: 'frontshell', name: 'VORDERSEITE', view: 'front', options: [
            { n: 'Standard Weiß', c: '#ffffff', p: 0 },
            { n: 'Deep Black', c: '#1a1a1c', p: 9.99 },
            { n: 'Cosmic Red', c: '#8b0000', p: 14.99 }
        ]},
        { id: 'buttons', name: 'BUTTONS', view: 'front', options: [
            { n: 'Classic', c: '#333333', p: 0 },
            { n: 'Gold Edition', c: '#ffd700', p: 19.99 }
        ]}
    ]
};

let selection = { frontshell: CONFIG.parts[0].options[0], buttons: CONFIG.parts[1].options[0] };

// INITIALISIERUNG (Die "Clean" Version)
function init() {
    const container = document.getElementById('cfg-sects');
    container.innerHTML = ''; // WICHTIG: Verhindert doppelte Elemente

    CONFIG.parts.forEach(part => {
        const acc = document.createElement('div');
        acc.className = 'acc';
        acc.innerHTML = `
            <div class="acc-hd" onclick="toggleAcc(this, '${part.view}')">
                <span class="acc-name">${part.name}</span>
                <span id="val-${part.id}" style="color:var(--neon); font-size:10px;">${selection[part.id].n}</span>
            </div>
            <div class="acc-body">
                <div class="color-grid" id="grid-${part.id}"></div>
            </div>
        `;
        container.appendChild(acc);

        const grid = document.getElementById(`grid-${part.id}`);
        part.options.forEach(opt => {
            const dot = document.createElement('div');
            dot.className = `ci ${selection[part.id].n === opt.n ? 'sel' : ''}`;
            dot.style.backgroundColor = opt.c;
            dot.onclick = () => selectOption(part.id, opt);
            grid.appendChild(dot);
        });
    });
    updateUI();
}

function selectOption(partId, opt) {
    selection[partId] = opt;
    // Markierung in der UI aktualisieren
    const grid = document.getElementById(`grid-${partId}`);
    Array.from(grid.children).forEach(child => {
        child.classList.toggle('sel', child.style.backgroundColor === opt.c || (opt.c === '#ffffff' && child.style.backgroundColor === 'rgb(255, 255, 255)'));
    });
    document.getElementById(`val-${partId}`).textContent = opt.n;
    updateUI();
}

function updateUI() {
    // Preis berechnen
    let total = CONFIG.basePrice;
    Object.values(selection).forEach(opt => total += opt.p);
    document.getElementById('total-price').textContent = total.toFixed(2).replace('.', ',') + ' €';

    // Visuelle Overlays (Beispiel für Frontshell)
    const ov = document.getElementById('ov-frontshell');
    if(ov) {
        ov.style.backgroundColor = selection.frontshell.c;
        ov.style.opacity = selection.frontshell.c === '#ffffff' ? '0' : '0.7';
    }
}

function toggleAcc(el, view) {
    const parent = el.parentElement;
    const wasOpen = parent.classList.contains('open');
    document.querySelectorAll('.acc').forEach(a => a.classList.remove('open'));
    if(!wasOpen) parent.classList.add('open');
    switchView(view);
}

function switchView(v) {
    document.querySelectorAll('.ctrl-view').forEach(el => el.classList.remove('active'));
    document.getElementById(`view-${v}`).classList.add('active');
    document.getElementById('btn-v-front').classList.toggle('active', v === 'front');
    document.getElementById('btn-v-back').classList.toggle('active', v === 'back');
}

function addToCart() {
    alert("Konfiguration gespeichert!");
}

// Start
init();
</script>
</body>
</html>
