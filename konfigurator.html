<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
<title>PS5 Konfigurator | LEXORD®</title>
<link rel="icon" type="image/png" href="IMG_7023.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--neon:#00f2ff;--neon2:#bc13fe;--green:#00b67a;--err:#ff4d4f}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:120px}

/* AURORA */
.aurora{position:fixed;inset:0;z-index:-3;background:#000;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:.4;animation:af 25s ease-in-out infinite}
.ab:nth-child(1){width:55%;height:55%;background:radial-gradient(circle,rgba(0,242,255,.5),transparent 70%);top:-10%;left:-10%}
.ab:nth-child(2){width:50%;height:50%;background:radial-gradient(circle,rgba(188,19,254,.4),transparent 70%);bottom:-10%;right:-10%;animation-delay:-8s}
.ab:nth-child(3){width:40%;height:40%;background:radial-gradient(circle,rgba(255,46,110,.25),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-15s}
@keyframes af{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(15%,-10%) scale(1.1)}}
.grid-overlay{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(0,242,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}

/* HEADER */
.cfg-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:10px 4%;background:rgba(0,0,0,.92);backdrop-filter:blur(22px);border-bottom:1px solid rgba(0,242,255,.15)}
.cfg-back{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron';font-size:9px;letter-spacing:1.5px;font-weight:700;color:#aaa;text-decoration:none;padding:9px 12px;border:1px solid #1a1a1e;border-radius:8px;background:rgba(10,10,12,.7)}
.cfg-back:active{color:var(--neon);border-color:var(--neon)}
.cfg-title{font-family:'Orbitron';font-weight:900;font-size:10px;letter-spacing:2px;color:#ddd;text-align:center;flex:1}
.cfg-live{font-family:'Orbitron';font-size:8px;letter-spacing:1.5px;color:var(--neon);background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.25);padding:6px 10px;border-radius:7px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.cfg-live::before{content:'';width:5px;height:5px;background:var(--neon);border-radius:50%;animation:ldot 1.5s infinite;box-shadow:0 0 8px var(--neon)}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.3}}

/* HERO */
.cfg-hero{text-align:center;padding:25px 5% 15px}
.cfg-hero-eyebrow{display:inline-block;padding:5px 12px;background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.25);border-radius:20px;font-family:'Orbitron';font-size:8px;color:var(--neon);letter-spacing:2px;margin-bottom:12px}
.cfg-hero-title{font-family:'Orbitron';font-weight:900;font-size:clamp(1.3rem,5vw,2.2rem);letter-spacing:-1px;line-height:1.1;margin-bottom:8px;background:linear-gradient(180deg,#fff,rgba(255,255,255,.5));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.cfg-hero-sub{font-family:'Orbitron';font-size:9px;letter-spacing:2px;color:#666}

/* TOGGLE */
.ctrl-wrap{display:flex;flex-direction:column;align-items:center;padding:5px 4% 20px}
.ctrl-toggle{display:flex;gap:6px;margin-bottom:14px;background:rgba(12,12,14,.7);padding:4px;border-radius:11px;border:1px solid rgba(255,255,255,.06)}
.ctrl-toggle button{font-family:'Orbitron';font-size:9.5px;letter-spacing:1.5px;font-weight:700;background:transparent;border:none;color:#888;padding:10px 18px;border-radius:8px;cursor:pointer;transition:.25s}
.ctrl-toggle button.active{background:linear-gradient(135deg,rgba(0,242,255,.2),rgba(0,242,255,.08));color:var(--neon);box-shadow:0 0 12px rgba(0,242,255,.2)}

/* STAGE */
.ctrl-stage{position:relative;width:100%;max-width:540px;aspect-ratio:1.05/1}
.photo-stack{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2}
.photo-stack svg{width:100%;height:100%;filter:drop-shadow(0 25px 45px rgba(0,242,255,.1))}

/* LABELS */
.part-label{position:absolute;background:rgba(10,10,15,0.9);border:1px solid var(--neon);color:#fff;padding:6px 10px;border-radius:6px;font-family:'Orbitron';font-size:8px;font-weight:800;opacity:0;transition:0.3s;pointer-events:none;z-index:10}
.part-label.show{opacity:1}
.part-label small{display:block;color:var(--neon);font-size:9px}

#label-frontshell{top:10%;left:5%}
#label-buttons{top:20%;right:5%}
#label-dpad{top:20%;left:5%}
#label-stickcap{top:55%;left:15%}
#label-backshell{top:10%;right:5%}

/* SECTIONS & COLORS */
.cfg-sections{padding:18px 4%;max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.cfg-acc{background:rgba(12,12,16,.7);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
.cfg-acc.open{border-color:var(--neon)}
.cfg-acc-hd{display:flex;align-items:center;gap:14px;padding:18px;cursor:pointer}
.cfg-acc-icon{width:40px;height:40px;background:rgba(0,242,255,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center}
.cfg-acc-name{flex:1;font-family:'Orbitron';font-size:11px}
.cfg-acc-cur strong{color:var(--neon)}
.cfg-color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:10px;padding:15px}
.cfg-color-item{aspect-ratio:1/1;border-radius:10px;cursor:pointer;border:2px solid transparent}
.cfg-color-item.sel{border-color:var(--neon)}

/* BOTTOM BAR */
.cfg-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(4,4,8,.97);padding:15px 4%;display:flex;align-items:center;gap:15px;border-top:1px solid var(--neon)}
.cfg-bottom-price-val{font-family:'Orbitron';font-size:22px;font-weight:900}
.cfg-add-cart{flex:1;background:var(--neon);color:#000;border:none;padding:15px;border-radius:10px;font-family:'Orbitron';font-weight:900;cursor:pointer}
</style>
</head>
<body>

<div class="aurora"><div class="ab"></div><div class="ab"></div><div class="ab"></div></div>
<div class="grid-overlay"></div>

<header class="cfg-header">
  <a href="#" class="cfg-back">ZURÜCK</a>
  <div class="cfg-title">PS5 KONFIGURATOR</div>
  <div class="cfg-live">LIVE</div>
</header>

<div class="cfg-hero">
  <div class="cfg-hero-eyebrow">⟫ MADE IN GERMANY ⟪</div>
  <h1 class="cfg-hero-title">DEIN CONTROLLER</h1>
</div>

<div class="ctrl-wrap">
  <div class="ctrl-toggle">
    <button id="view-front-btn" class="active" data-view="front">VORDERSEITE</button>
    <button id="view-back-btn" data-view="back">RÜCKSEITE</button>
  </div>

  <div class="ctrl-stage">
    <!-- FRONT SVG -->
    <div class="photo-stack" id="stack-front">
      <svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
        <!-- Gehäuse -->
        <path id="svg-frontshell" d="M150,120 Q100,120 80,180 L50,350 Q40,420 100,440 Q150,450 200,380 L230,220 Q300,200 370,220 L400,380 Q450,450 500,440 Q560,420 550,350 L520,180 Q500,120 450,120 Z" fill="#ffffff" />
        <!-- Buttons -->
        <g id="svg-buttons" fill="#f0f0f2">
          <circle cx="480" cy="180" r="18"/><circle cx="520" cy="220" r="18"/><circle cx="480" cy="260" r="18"/><circle cx="440" cy="220" r="18"/>
        </g>
        <!-- D-Pad -->
        <path id="svg-dpad" d="M100,180 h30 v30 h30 v30 h-30 v30 h-30 v-30 h-30 v-30 h30 z" fill="#f0f0f2" transform="translate(-20, 0)"/>
        <!-- Sticks -->
        <circle id="svg-stick-l" cx="215" cy="290" r="40" fill="#0a0a0c"/>
        <circle id="svg-stick-r" cx="385" cy="290" r="40" fill="#0a0a0c"/>
      </svg>
      <div class="part-label" id="label-frontshell">SHELL<small>–</small></div>
    </div>

    <!-- BACK SVG -->
    <div class="photo-stack" id="stack-back" style="display:none">
      <svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
        <path id="svg-backshell" d="M100,120 L500,120 Q550,120 540,180 L500,420 Q450,450 400,380 L370,220 Q300,200 230,220 L200,380 Q150,450 100,420 L60,180 Q50,120 100,120 Z" fill="#ffffff" />
      </svg>
      <div class="part-label" id="label-backshell">RÜCKSEITE<small>–</small></div>
    </div>
  </div>
</div>

<div class="cfg-sections" id="cfg-sections"></div>

<div class="cfg-bottom">
  <div class="cfg-bottom-price-val" id="total-price">79,00 €</div>
  <button class="cfg-add-cart">IN DEN WARENKORB</button>
</div>

<script>
const SHELL_COLORS=[{name:'Weiß',color:'#ffffff',premium:0,def:true},{name:'Schwarz',color:'#1a1a1c',premium:0},{name:'Cyan',color:'#00f2ff',premium:10},{name:'Rot',color:'#dc143c',premium:8}];
const BTN_COLORS=[{name:'Standard',color:'#f0f0f2',premium:0,def:true},{name:'Schwarz',color:'#222',premium:5},{name:'Gold',color:'#d4af37',premium:12}];

const CATS=[
  {id:'frontshell',name:'FRONTGEHÄUSE',colors:SHELL_COLORS,view:'front'},
  {id:'backshell',name:'RÜCKSCHALE',colors:SHELL_COLORS,view:'back'},
  {id:'buttons',name:'BUTTONS',colors:BTN_COLORS,view:'front'}
];

let state = { colors: {}, currentView: 'front' };

function init() {
  const root = document.getElementById('cfg-sections');
  CATS.forEach(cat => {
    const acc = document.createElement('div');
    acc.className = 'cfg-acc';
    acc.innerHTML = `<div class="cfg-acc-hd"><div class="cfg-acc-name">${cat.name} <span id="cur-${cat.id}"></span></div></div><div class="cfg-color-grid" id="grid-${cat.id}"></div>`;
    root.appendChild(acc);
    
    const grid = document.getElementById('grid-'+cat.id);
    cat.colors.forEach(c => {
      const item = document.createElement('div');
      item.className = 'cfg-color-item' + (c.def ? ' sel' : '');
      item.style.background = c.color;
      item.onclick = () => selectColor(cat.id, c, item);
      grid.appendChild(item);
      if(c.def) selectColor(cat.id, c, item);
    });
  });

  document.getElementById('view-front-btn').onclick = () => setView('front');
  document.getElementById('view-back-btn').onclick = () => setView('back');
}

function selectColor(catId, color, el) {
  document.querySelectorAll(`#grid-${catId} .cfg-color-item`).forEach(i => i.classList.remove('sel'));
  el.classList.add('sel');
  state.colors[catId] = color;
  document.getElementById('cur-'+catId).innerHTML = `<strong>${color.name}</strong>`;
  
  // Übertrage Farbe auf SVG
  const svgPart = document.getElementById('svg-' + catId);
  if(svgPart) svgPart.style.fill = color.color;
  
  // Label Update
  const lbl = document.getElementById('label-' + catId);
  if(lbl) {
    lbl.classList.add('show');
    lbl.querySelector('small').innerText = color.name;
  }
  updatePrice();
}

function setView(view) {
  state.currentView = view;
  document.getElementById('stack-front').style.display = view === 'front' ? 'flex' : 'none';
  document.getElementById('stack-back').style.display = view === 'back' ? 'flex' : 'none';
  document.querySelectorAll('.ctrl-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === view));
}

function updatePrice() {
  let p = 79;
  Object.values(state.colors).forEach(c => p += c.premium);
  document.getElementById('total-price').innerText = p.toFixed(2) + ' €';
}

init();
</script>
</body>
</html>
