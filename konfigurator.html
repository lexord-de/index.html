<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>LEXORD® PRO CONFIG</title>
    <style>
        :root{--neon:#00f2ff;--bg:#0a0a0a}
        body{background:var(--bg);color:#fff;font-family:'Orbitron',sans-serif;margin:0;display:flex;flex-direction:column;align-items:center}
        
        #cfg-container{width:100%;max-width:600px;position:relative;margin-top:20px}
        canvas{width:100%;height:auto;filter:drop-shadow(0 0 20px rgba(0,242,255,0.2))}
        
        .loading-overlay{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:0.5s}
        .loading-overlay.hidden{opacity:0;pointer-events:none}

        .controls{width:90%;max-width:800px;margin-top:30px;padding-bottom:150px}
        .cat-box{background:#111;border:1px solid #222;border-radius:12px;margin-bottom:15px;padding:15px}
        .cat-title{font-size:12px;margin-bottom:10px;color:var(--neon);letter-spacing:2px}
        
        .grid{display:flex;gap:10px;overflow-x:auto;padding:5px}
        .dot{width:35px;height:35px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
        .dot.active{border-color:var(--neon);transform:scale(1.1)}

        .view-nav{display:flex;gap:10px;margin-bottom:15px}
        .view-nav button{background:#1a1a1a;border:1px solid #333;color:#fff;padding:10px 20px;cursor:pointer;font-family:'Orbitron'}
        .view-nav button.active{background:var(--neon);color:#000}
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div style="font-size:20px;margin-bottom:10px">SYSTEM START...</div>
    <div id="load-status">0%</div>
</div>

<div class="view-nav" style="margin-top:20px">
    <button id="v-front" class="active" onclick="setView('front')">FRONT</button>
    <button id="v-back" onclick="setView('back')">BACK</button>
</div>

<div id="cfg-container">
    <canvas id="mainCanvas" width="1000" height="1000"></canvas>
</div>

<div class="controls" id="ui"></div>

<script>
// --- KONFIGURATION ---
const PARTS = {
    front: [
        { id: 'frontshell', img: 'Photoroom_20260501_094506.png' }, // Deine Hauptdatei
        { id: 'touchpad', img: 'touchpad_mask.png' },
        { id: 'buttons', img: 'buttons_mask.png' },
        { id: 'dpad', img: 'dpad_mask.png' },
        { id: 'sticks', img: 'sticks_mask.png' }
    ],
    back: [
        { id: 'backshell', img: 'Photoroom_20260501_090821.png' },
        { id: 'paddles', img: 'paddles_mask.png' }
    ]
};

const FARBEN = [
    { name: 'White', hex: '#ffffff' },
    { name: 'Black', hex: '#151515' },
    { name: 'Cyan', hex: '#00f2ff' },
    { name: 'Red', hex: '#ff0000' }
];

let state = {
    view: 'front',
    colors: {
        frontshell: '#ffffff', touchpad: '#ffffff', buttons: '#151515', 
        dpad: '#151515', sticks: '#151515', backshell: '#ffffff', paddles: '#151515'
    }
};

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const imgCache = {};

// --- ENGINE ---

async function loadSystem() {
    let loaded = 0;
    const all = [...PARTS.front, ...PARTS.back];
    
    for (let p of all) {
        try {
            const img = new Image();
            img.src = p.img;
            await new Promise((res, rej) => {
                img.onload = res;
                img.onerror = () => {
                    console.error("Fehler beim Laden von: " + p.img);
                    res(); // Weitermachen trotz Fehler für Demo
                };
            });
            imgCache[p.id] = img;
            loaded++;
            document.getElementById('load-status').innerText = Math.round((loaded/all.length)*100) + "%";
        } catch(e) {}
    }
    
    document.getElementById('loader').classList.add('hidden');
    render();
    buildUI();
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const currentParts = PARTS[state.view];
    
    currentParts.forEach(p => {
        const img = imgCache[p.id];
        if (!img) return;

        // Offscreen Tinting
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        const tCtx = tempCanvas.getContext('2d');

        // Zeichne die Maske
        tCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        // Farbe drüber (Multiply-Effekt)
        tCtx.globalCompositeOperation = 'source-in';
        tCtx.fillStyle = state.colors[p.id];
        tCtx.fillRect(0, 0, canvas.width, canvas.height);

        // Auf Haupt-Canvas übertragen
        ctx.drawImage(tempCanvas, 0, 0);
    });
}

function buildUI() {
    const ui = document.getElementById('ui');
    const partsToDisplay = (state.view === 'front') ? PARTS.front : PARTS.back;
    ui.innerHTML = "";

    partsToDisplay.forEach(p => {
        const box = document.createElement('div');
        box.className = 'cat-box';
        box.innerHTML = `<div class="cat-title">${p.id.toUpperCase()}</div>`;
        
        const grid = document.createElement('div');
        grid.className = 'grid';
        
        FARBEN.forEach(f => {
            const dot = document.createElement('div');
            dot.className = `dot ${state.colors[p.id] === f.hex ? 'active' : ''}`;
            dot.style.background = f.hex;
            dot.onclick = () => {
                state.colors[p.id] = f.hex;
                render();
                buildUI();
            };
            grid.appendChild(dot);
        });
        
        box.appendChild(grid);
        ui.appendChild(box);
    });
}

function setView(v) {
    state.view = v;
    document.getElementById('v-front').classList.toggle('active', v === 'front');
    document.getElementById('v-back').classList.toggle('active', v === 'back');
    render();
    buildUI();
}

loadSystem();
</script>
</body>
</html>
