<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
<title>PS5 Konfigurator | LEXORD®</title>
<link rel="icon" type="image/png" href="IMG_7023.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--neon:#00f2ff;--neon2:#bc13fe;--green:#00b67a;--err:#ff4d4f}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:120px}

/* AURORA & GRID */
.aurora{position:fixed;inset:0;z-index:-3;background:#000;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:.4;animation:af 25s ease-in-out infinite}
.ab:nth-child(1){width:55%;height:55%;background:radial-gradient(circle,rgba(0,242,255,.5),transparent 70%);top:-10%;left:-10%}
.ab:nth-child(2){width:50%;height:50%;background:radial-gradient(circle,rgba(188,19,254,.4),transparent 70%);bottom:-10%;right:-10%;animation-delay:-8s}
.ab:nth-child(3){width:40%;height:40%;background:radial-gradient(circle,rgba(255,46,110,.25),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-15s}
@keyframes af{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(15%,-10%) scale(1.1)}}
.grid-overlay{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(0,242,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}

/* HEADER */
.cfg-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:10px 4%;background:rgba(0,0,0,.92);backdrop-filter:blur(22px);border-bottom:1px solid rgba(0,242,255,.15)}
.cfg-back{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron';font-size:9px;letter-spacing:1.5px;font-weight:700;color:#aaa;text-decoration:none;padding:9px 12px;border:1px solid #1a1a1e;border-radius:8px;background:rgba(10,10,12,.7)}
.cfg-back:active{color:var(--neon);border-color:var(--neon)}
.cfg-title{font-family:'Orbitron';font-weight:900;font-size:10px;letter-spacing:2px;color:#ddd;text-align:center;flex:1}
.cfg-live{font-family:'Orbitron';font-size:8px;letter-spacing:1.5px;color:var(--neon);background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.25);padding:6px 10px;border-radius:7px;display:flex;align-items:center;gap:5px}
.cfg-live::before{content:'';width:5px;height:5px;background:var(--neon);border-radius:50%;animation:ldot 1.5s infinite;box-shadow:0 0 8px var(--neon)}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.3}}

/* HERO */
.cfg-hero{text-align:center;padding:25px 5% 15px}
.cfg-hero-eyebrow{display:inline-block;padding:5px 12px;background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.25);border-radius:20px;font-family:'Orbitron';font-size:8px;color:var(--neon);letter-spacing:2px;margin-bottom:12px}
.cfg-hero-title{font-family:'Orbitron';font-weight:900;font-size:clamp(1.3rem,5vw,2.2rem);letter-spacing:-1px;line-height:1.1;margin-bottom:8px;background:linear-gradient(180deg,#fff,rgba(255,255,255,.5));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.cfg-hero-sub{font-family:'Orbitron';font-size:9px;letter-spacing:2px;color:#666}

/* TOGGLE & STAGE */
.ctrl-wrap{display:flex;flex-direction:column;align-items:center;padding:5px 4% 20px}
.ctrl-toggle{display:flex;gap:6px;margin-bottom:14px;background:rgba(12,12,14,.7);padding:4px;border-radius:11px;border:1px solid rgba(255,255,255,.06)}
.ctrl-toggle button{font-family:'Orbitron';font-size:9.5px;letter-spacing:1.5px;font-weight:700;background:transparent;border:none;color:#888;padding:10px 18px;border-radius:8px;cursor:pointer;transition:.25s}
.ctrl-toggle button.active{background:linear-gradient(135deg,rgba(0,242,255,.2),rgba(0,242,255,.08));color:var(--neon);box-shadow:0 0 12px rgba(0,242,255,.2)}

.ctrl-stage{position:relative;width:100%;max-width:540px;aspect-ratio:1.05/1}
.photo-stack{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;animation:floatY 5s ease-in-out infinite}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.base-img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;z-index:1;filter:drop-shadow(0 25px 45px rgba(0,242,255,.12))}

/* COLOR MASKS - THE CORE */
.part-mask {
    position: absolute; inset: 0; z-index: 2;
    opacity: 0; transition: opacity 0.4s ease, background-color 0.4s ease;
    pointer-events: none;
    mix-blend-mode: multiply; /* Verleiht Tiefe durch Multiplikation mit Schatten */
    -webkit-mask-size: contain; mask-size: contain;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    -webkit-mask-position: center; mask-position: center;
}
.part-mask.active { opacity: 0.9; }

.part-image {
    position: absolute; inset: 0; z-index: 3;
    width: 100%; height: 100%; object-fit: contain;
    opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
}
.part-image.active { opacity: 1; }

/* LIGHTBAR & ENGRAVE */
#lightbar-glow{position:absolute;top:41.5%;left:50%;transform:translateX(-50%);width:18%;height:4px;border-radius:50%;filter:blur(6px);opacity:0;transition:.4s;z-index:5;pointer-events:none}
#lightbar-glow.on{opacity:.85}

.engrave-txt{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron';font-weight:900;font-size:clamp(10px,2vw,14px);letter-spacing:1px;pointer-events:none;z-index:6;opacity:0;transition:.3s;text-shadow:0 1px 2px rgba(0,0,0,0.3);white-space:nowrap}
.engrave-txt.show{opacity:0.7}

/* LABELS */
.part-label{
position:absolute;background:rgba(8,8,12,.9);border:1px solid rgba(0,242,255,.4);color:#fff;padding:6px 10px;border-radius:8px;
font-family:'Orbitron';font-size:8px;font-weight:800;white-space:nowrap;opacity:0;transform:scale(.8);transition:.3s;z-index:10;pointer-events:none;text-transform:uppercase;
}
.part-label.show{opacity:1;transform:scale(1)}
.part-label small{display:block;color:var(--neon);font-size:9px;margin-top:2px}
.part-label::after{content:'';position:absolute;width:6px;height:6px;background:var(--neon);border-radius:50%;top:50%;transform:translateY(-50%)}
.part-label.left::after{right:-10px}.part-label.right::after{left:-10px}

#label-frontshell{top:15%;left:5%} #label-lightbar{top:15%;right:5%}
#label-dpad{top:40%;left:2%} #label-buttons{top:40%;right:2%}
#label-stickcap{top:60%;left:5%} #label-stick{top:60%;right:5%}
#label-triggercolor{top:80%;left:5%} #label-trigger{top:80%;right:5%}
#label-backshell{top:20%;left:5%} #label-paddle{top:55%;right:5%}

/* SECTIONS & ACCORDIONS */
.cfg-sections{padding:18px 4% 40px;max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.cfg-acc{background:rgba(12,12,16,.7);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
.cfg-acc.open{border-color:rgba(0,242,255,.3)}
.cfg-acc-hd{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;font-family:'Orbitron';font-size:11px;font-weight:700}
.cfg-acc-icon{width:38px;height:38px;background:rgba(0,242,255,.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.cfg-acc-name{flex:1}.cfg-acc-cur{font-family:'Inter';font-size:10px;color:#777;margin-top:2px}
.cfg-acc-cur strong{color:var(--neon)}
.cfg-acc-body{max-height:0;overflow:hidden;transition:max-height .4s ease}.cfg-acc.open .cfg-acc-body{max-height:1000px}
.cfg-acc-content{padding:0 16px 18px}

.cfg-color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:10px}
.cfg-color-item{aspect-ratio:1/1;border-radius:10px;cursor:pointer;border:2px solid rgba(255,255,255,.05);transition:.2s;position:relative}
.cfg-color-item.sel{border-color:var(--neon);transform:scale(1.05)}

.cfg-opt-list{display:flex;flex-direction:column;gap:8px}
.cfg-opt{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px;cursor:pointer}
.cfg-opt.sel{border-color:var(--neon);background:rgba(0,242,255,.05)}
.cfg-opt-name{font-family:'Orbitron';font-size:10px;font-weight:700}
.cfg-opt-price{margin-left:auto;font-family:'Orbitron';font-size:10px;color:var(--neon)}

/* PRESETS */
.preset-wrap{padding:10px 4%;max-width:780px;margin:0 auto}
.preset-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:5px;scrollbar-width:none}
.preset-btn{flex-shrink:0;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(25,25,30,.5);font-family:'Orbitron';font-size:9px;color:#bbb;cursor:pointer}
.preset-btn.active{border-color:var(--neon);color:var(--neon)}

/* BOTTOM BAR */
.cfg-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(4,4,8,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(0,242,255,.2);padding:12px 4%;display:flex;align-items:center;gap:10px}
.cfg-bottom-price-val{font-family:'Orbitron';font-size:18px;font-weight:900}
.cfg-bottom-price-val span{color:var(--neon)}
.cfg-add-cart{font-family:'Orbitron';font-size:10px;font-weight:900;background:var(--neon);color:#000;border:none;padding:14px 20px;border-radius:10px;cursor:pointer;margin-left:auto}

#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:1000;background:#111;border:1px solid var(--neon);padding:12px 20px;border-radius:10px;font-family:'Orbitron';font-size:9px;color:var(--neon);transition:.4s;opacity:0}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

#cfg-loading{position:fixed;inset:0;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:15px;transition:0.6s}
.cfg-loader-spinner{width:40px;height:40px;border:3px solid rgba(0,242,255,.1);border-top-color:var(--neon);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:500px){
    .cfg-bottom-price-val{font-size:16px}
    .cfg-add-cart{padding:12px 15px}
}
</style>
</head>
<body>

<div class="aurora"><div class="ab"></div><div class="ab"></div><div class="ab"></div></div>
<div class="grid-overlay"></div>

<div id="cfg-loading">
  <div class="cfg-loader-spinner"></div>
  <div class="cfg-loader-text" style="font-family:'Orbitron'; font-size:9px; color:var(--neon);">⟫ SYSTEM INITIALISIERUNG ⟪</div>
</div>

<header class="cfg-header">
  <a href="index.html" class="cfg-back">ZURÜCK</a>
  <div class="cfg-title">PS5 CONFIGURATOR</div>
  <div class="cfg-live">LIVE</div>
</header>

<div class="cfg-hero">
  <div class="cfg-hero-eyebrow">⟫ PREMIUM CUSTOMS ⟪</div>
  <h1 class="cfg-hero-title">DESIGN YOUR WEAPON</h1>
</div>

<div class="ctrl-wrap">
  <div class="ctrl-toggle">
    <button id="view-front-btn" class="active" onclick="setView('front')">FRONT</button>
    <button id="view-back-btn" onclick="setView('back')">BACK</button>
  </div>

  <div class="ctrl-stage">
    <!-- FRONT VIEW -->
    <div class="photo-stack" id="stack-front">
      <img src="Photoroom_20260501_094506.png" class="base-img" id="img-front">
      <!-- Masks -->
      <div class="part-mask" id="mask-frontshell" style="-webkit-mask-image:url('mask_frontshell.svg'); mask-image:url('mask_frontshell.svg');"></div>
      <div class="part-mask" id="mask-buttons" style="-webkit-mask-image:url('mask_buttons.svg'); mask-image:url('mask_buttons.svg');"></div>
      <div class="part-mask" id="mask-dpad" style="-webkit-mask-image:url('mask_dpad.svg'); mask-image:url('mask_dpad.svg');"></div>
      <div class="part-mask" id="mask-stickcap" style="-webkit-mask-image:url('mask_stickcap.svg'); mask-image:url('mask_stickcap.svg');"></div>
      <div class="part-mask" id="mask-triggercolor" style="-webkit-mask-image:url('mask_trigger.svg'); mask-image:url('mask_trigger.svg');"></div>
      <div id="lightbar-glow"></div>
      <div class="engrave-txt" id="engrave-front"></div>
    </div>

    <!-- BACK VIEW -->
    <div class="photo-stack" id="stack-back" style="display:none">
      <img src="Photoroom_20260501_090821.png" class="base-img" id="img-back">
      <div class="part-mask" id="mask-backshell" style="-webkit-mask-image:url('mask_backshell.svg'); mask-image:url('mask_backshell.svg');"></div>
      <img src="" class="part-image" id="img-paddle">
      <div class="engrave-txt" id="engrave-back"></div>
    </div>

    <!-- LABELS -->
    <div class="part-label left" id="label-frontshell" data-side="front">FRONT<small>–</small></div>
    <div class="part-label right" id="label-lightbar" data-side="front">LIGHTBAR<small>–</small></div>
    <div class="part-label left" id="label-dpad" data-side="front">DPAD<small>–</small></div>
    <div class="part-label right" id="label-buttons" data-side="front">BUTTONS<small>–</small></div>
    <div class="part-label left" id="label-triggercolor" data-side="front">TRIGGER<small>–</small></div>
    <div class="part-label left" id="label-backshell" data-side="back">RÜCKSCHALE<small>–</small></div>
    <div class="part-label right" id="label-paddle" data-side="back">PADDLES<small>–</small></div>
  </div>
</div>

<div class="preset-wrap">
  <div class="preset-row" id="preset-row"></div>
</div>

<div class="cfg-sections" id="cfg-sections"></div>

<div class="cfg-bottom">
  <div class="cfg-bottom-price">
    <div class="cfg-bottom-price-val">ab <span id="total-price">79,00 €</span></div>
  </div>
  <button class="cfg-add-cart" onclick="addCustomToCart()">IN DEN WARENKORB</button>
</div>

<div id="toast"></div>

<script>
// --- DATEN ---
const SHELL_COLORS=[
  {name:'Weiß',color:'#ffffff',premium:0,def:true},{name:'Schwarz',color:'#111',premium:5},
  {name:'Purple',color:'#3d1a52',premium:10},{name:'Red',color:'#5c0d10',premium:10},
  {name:'Gold',color:'#d4af37',premium:15},{name:'Carbon',color:'#1c1c1f',premium:20}
];
const BTN_COLORS=[
  {name:'Standard',color:'#f0f0f2',premium:0,def:true},{name:'Schwarz',color:'#222',premium:5},
  {name:'Cyan',color:'#00f2ff',premium:8},{name:'Pink',color:'#ff2e6e',premium:8}
];
const OPTS={
  paddle:[{val:'Keine',price:0,def:true},{val:'2× Paddles',price:40},{val:'4× Paddles',price:60}],
  stick:[{val:'Standard',price:0,def:true},{val:'Hall Effect',price:30}]
};

const PRESETS={
  stealth:{frontshell:'#111',backshell:'#111',buttons:'#222',dpad:'#222',stickcap:'#111',triggercolor:'#111',lightbar:'#00f2ff'},
  gold:{frontshell:'#111',backshell:'#111',buttons:'#d4af37',dpad:'#d4af37',stickcap:'#d4af37',triggercolor:'#d4af37',lightbar:'#d4af37'}
};

let state={
  colors:{frontshell:null,backshell:null,buttons:null,dpad:null,stickcap:null,triggercolor:null,lightbar:null},
  options:{paddle:null,stick:null},
  engraving:''
};

let currentView = 'front';

// --- CORE FUNKTIONEN ---
function $(id){return document.getElementById(id)}

function init(){
  buildSections();
  buildPresets();
  applyTints();
  updatePrice();
  setTimeout(()=>{$('cfg-loading').style.opacity='0';setTimeout(()=>$('cfg-loading').style.display='none',600)},800);
}

function buildSections(){
  const root=$('cfg-sections');
  const cats=[
    {id:'frontshell',name:'FRONTGEHÄUSE',colors:SHELL_COLORS,icon:'🎨'},
    {id:'backshell',name:'RÜCKSCHALE',colors:SHELL_COLORS,icon:'🛡'},
    {id:'buttons',name:'BUTTONS',colors:BTN_COLORS,icon:'🔘'},
    {id:'dpad',name:'D-PAD',colors:BTN_COLORS,icon:'✚'},
    {id:'triggercolor',name:'TRIGGER FARBE',colors:BTN_COLORS,icon:'🎯'}
  ];

  cats.forEach(cat=>{
    const acc=document.createElement('div');
    acc.className='cfg-acc';
    acc.innerHTML=`
      <div class="cfg-acc-hd" onclick="this.parentElement.classList.toggle('open')">
        <div class="cfg-acc-icon">${cat.icon}</div>
        <div class="cfg-acc-name">${cat.name}<div class="cfg-acc-cur" id="cur-${cat.id}">Standard</div></div>
      </div>
      <div class="cfg-acc-body"><div class="cfg-acc-content"><div class="cfg-color-grid" id="grid-${cat.id}"></div></div></div>`;
    root.appendChild(acc);
    
    const grid=acc.querySelector('#grid-'+cat.id);
    cat.colors.forEach(c=>{
      const item=document.createElement('div');
      item.className='cfg-color-item'+(c.def?' sel':'');
      item.style.background=c.color;
      item.onclick=()=>{
        grid.querySelectorAll('.cfg-color-item').forEach(i=>i.classList.remove('sel'));
        item.classList.add('sel');
        state.colors[cat.id]=c;
        if(cat.id==='backshell' && currentView!=='back') setView('back');
        if(cat.id!=='backshell' && currentView!=='front') setView('front');
        applyTints();
        updatePrice();
      };
      grid.appendChild(item);
      if(c.def) state.colors[cat.id]=c;
    });
  });

  // Paddles Option
  const pAcc=document.createElement('div');
  pAcc.className='cfg-acc';
  pAcc.innerHTML=`<div class="cfg-acc-hd" onclick="this.parentElement.classList.toggle('open')"><div class="cfg-acc-icon">⚙</div><div class="cfg-acc-name">PADDLES</div></div><div class="cfg-acc-body"><div class="cfg-acc-content" id="opt-paddle"></div></div>`;
  root.appendChild(pAcc);
  OPTS.paddle.forEach(o=>{
    const item=document.createElement('div');
    item.className='cfg-opt'+(o.def?' sel':'');
    item.innerHTML=`<div class="cfg-opt-name">${o.val}</div><div class="cfg-opt-price">${o.price>0?'+'+o.price+'€':'Inkl.'}</div>`;
    item.onclick=()=>{
      pAcc.querySelectorAll('.cfg-opt').forEach(i=>i.classList.remove('sel'));
      item.classList.add('sel');
      state.options.paddle=o;
      setView('back');
      applyTints();
      updatePrice();
    };
    pAcc.querySelector('#opt-paddle').appendChild(item);
    if(o.def) state.options.paddle=o;
  });
}

function applyTints(){
  // Masken füllen
  Object.keys(state.colors).forEach(key=>{
    const mask=$('mask-'+key);
    const col=state.colors[key];
    if(mask && col){
      if(col.color.toLowerCase()==='#ffffff'){
        mask.classList.remove('active');
      } else {
        mask.style.backgroundColor=col.color;
        mask.classList.add('active');
      }
      const cur=$('cur-'+key); if(cur) cur.innerHTML=`<strong>${col.name}</strong>`;
      updateLabel(key, col.name, col.premium > 0);
    }
  });

  // Paddles Image
  const pImg=$('img-paddle');
  const pOpt=state.options.paddle;
  if(pImg && pOpt){
    if(pOpt.val.includes('2×')) { pImg.src='paddles_2x.png'; pImg.classList.add('active'); }
    else if(pOpt.val.includes('4×')) { pImg.src='paddles_4x.png'; pImg.classList.add('active'); }
    else { pImg.classList.remove('active'); }
    updateLabel('paddle', pOpt.val, pOpt.price > 0);
  }
}

function updateLabel(id, val, active){
  const l=$('label-'+id); if(!l) return;
  l.querySelector('small').innerText=val;
  l.classList.toggle('show', active && l.dataset.side === currentView);
}

function setView(v){
  currentView=v;
  $('stack-front').style.display = v==='front'?'flex':'none';
  $('stack-back').style.display = v==='back'?'flex':'none';
  $('view-front-btn').classList.toggle('active', v==='front');
  $('view-back-btn').classList.toggle('active', v==='back');
  applyTints(); // Labels aktualisieren sich durch Side-Check
}

function updatePrice(){
  let p=79;
  Object.values(state.colors).forEach(c=>{if(c)p+=c.premium});
  Object.values(state.options).forEach(o=>{if(o)p+=o.price});
  $('total-price').innerText=p.toFixed(2).replace('.',',')+' €';
}

function buildPresets(){
  const row=$('preset-row');
  Object.keys(PRESETS).forEach(id=>{
    const btn=document.createElement('button');
    btn.className='preset-btn';
    btn.innerText=id.toUpperCase();
    btn.onclick=()=>{
      const p=PRESETS[id];
      Object.keys(p).forEach(k=>{
        const colObj = SHELL_COLORS.find(c=>c.color===p[k]) || BTN_COLORS.find(c=>c.color===p[k]);
        if(colObj) state.colors[k]=colObj;
      });
      applyTints(); updatePrice();
    };
    row.appendChild(btn);
  });
}

function addCustomToCart(){
    if('vibrate' in navigator) navigator.vibrate(50);
    const toast = $('toast');
    toast.innerText = "✓ ZUR KONFIGURATION HINZUGEFÜGT";
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'),2000);
}

window.onload=init;
</script>
</body>
</html>
