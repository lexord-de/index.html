<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
    <title>PS5 Konfigurator PRO | LEXORD®</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{--neon:#00f2ff;--neon2:#bc13fe;--bg:#000}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
        body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;overflow-x:hidden;padding-bottom:120px}
        
        /* STAGE */
        .ctrl-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 4%}
        .ctrl-stage{position:relative;width:100%;max-width:600px;aspect-ratio:1/1;display:flex;justify-content:center;align-items:center}
        
        /* Der Canvas füllt den Container. Wir nutzen EINEN Canvas pro Seite, 
           der intern alle Layer zeichnet. */
        .main-canvas{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 20px 50px rgba(0,242,255,0.2))}

        /* TOGGLE */
        .ctrl-toggle{display:flex;gap:10px;margin-bottom:20px;background:rgba(255,255,255,0.05);padding:5px;border-radius:12px}
        .ctrl-toggle button{background:transparent;border:none;color:#666;padding:12px 20px;font-family:'Orbitron';font-size:10px;cursor:pointer;transition:0.3s;border-radius:8px}
        .ctrl-toggle button.active{background:var(--neon);color:#000;box-shadow:0 0 15px var(--neon)}

        /* SECTIONS */
        .cfg-sections{max-width:800px;margin:0 auto;padding:0 4%}
        .cfg-acc{background:rgba(20,20,25,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:15px;margin-bottom:10px;overflow:hidden}
        .cfg-acc-hd{padding:18px;cursor:pointer;display:flex;justify-content:space-between;font-family:'Orbitron';font-size:11px;letter-spacing:1px}
        .cfg-acc-body{max-height:0;overflow:hidden;transition:0.4s ease-out}
        .cfg-acc.open .cfg-acc-body{max-height:500px;padding:15px}
        
        .color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:10px}
        .color-item{aspect-ratio:1/1;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:0.2s}
        .color-item.sel{border-color:var(--neon);transform:scale(1.1)}

        /* BOTTOM BAR */
        .cfg-bottom{position:fixed;bottom:0;inset-x:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(10px);padding:20px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--neon)}
        #total-price{font-family:'Orbitron';font-size:22px;color:var(--neon)}
        
        #loading{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';color:var(--neon)}
    </style>
</head>
<body>

<div id="loading">SYSTEM INITIALISIERUNG...</div>

<header style="text-align:center;padding:30px 0;">
    <h1 style="font-family:'Orbitron';font-size:18px;letter-spacing:4px;">LEXORD® CONFIGURATOR</h1>
</header>

<div class="ctrl-wrap">
    <div class="ctrl-toggle">
        <button id="btn-front" class="active" onclick="setView('front')">FRONT</button>
        <button id="btn-back" onclick="setView('back')">BACK</button>
    </div>

    <div class="ctrl-stage">
        <canvas id="configCanvas" width="1200" height="1200" class="main-canvas"></canvas>
    </div>
</div>

<div class="cfg-sections" id="ui-root"></div>

<div class="cfg-bottom">
    <div id="total-price">89,00 €</div>
    <button style="background:var(--neon);border:none;padding:15px 30px;font-family:'Orbitron';font-weight:bold;border-radius:5px;cursor:pointer;">BESTELLEN</button>
</div>

<script>
'use strict';

// 1. Asset Definition (Pfade müssen zu deinen Bildern passen)
const ASSETS = {
    front: {
        base: 'front_base.png', // Das Bild mit Schatten/Details
        frontshell: 'front_shell_mask.png',
        touchpad: 'touchpad_mask.png',
        buttons: 'buttons_mask.png',
        dpad: 'dpad_mask.png',
        sticks: 'sticks_mask.png'
    },
    back: {
        base: 'back_base.png',
        backshell: 'back_shell_mask.png',
        paddles: 'paddles_mask.png' // Platzhalter Maske für Paddles
    }
};

const COLORS = [
    { name: 'Pure White', hex: '#ffffff', price: 0 },
    { name: 'Deep Black', hex: '#1a1a1a', price: 0 },
    { name: 'Neon Blue', hex: '#00f2ff', price: 10 },
    { name: 'Lava Red', hex: '#ff4d4d', price: 10 }
];

// 2. State (Welches Bauteil hat welche Farbe)
let state = {
    view: 'front',
    parts: {
        frontshell: '#ffffff',
        touchpad: '#ffffff',
        buttons: '#ffffff',
        dpad: '#ffffff',
        sticks: '#1a1a1a',
        backshell: '#ffffff',
        paddles: '#1a1a1a'
    }
};

const imgCache = {};
const canvas = document.getElementById('configCanvas');
const ctx = canvas.getContext('2d');

// 3. Bilder vorladen
async function preload() {
    const promises = [];
    for (let side in ASSETS) {
        for (let part in ASSETS[side]) {
            const img = new Image();
            img.src = ASSETS[side][part];
            imgCache[`${side}_${part}`] = img;
            promises.push(new Promise(res => img.onload = res));
        }
    }
    await Promise.all(promises);
    document.getElementById('loading').style.display = 'none';
    render();
}

// 4. Die Render-Engine (Layer für Layer)
function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const side = state.view;
    
    // Zuerst die Base (Schatten/Ambient Occlusion)
    drawLayer(`${side}_base`);

    // Dann die einzelnen Bauteile einfärben
    if (side === 'front') {
        drawTintedLayer('front_frontshell', state.parts.frontshell);
        drawTintedLayer('front_touchpad', state.parts.touchpad);
        drawTintedLayer('front_buttons', state.parts.buttons);
        drawTintedLayer('front_dpad', state.parts.dpad);
        drawTintedLayer('front_sticks', state.parts.sticks);
    } else {
        drawTintedLayer('back_backshell', state.parts.backshell);
        drawTintedLayer('back_paddles', state.parts.paddles);
    }
}

function drawLayer(key) {
    const img = imgCache[key];
    if (img) ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
}

function drawTintedLayer(key, color) {
    const img = imgCache[key];
    if (!img || !color) return;

    // Temporärer Canvas für das Tinting (Multiply-Verfahren)
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
    const tCtx = tempCanvas.getContext('2d');

    // 1. Maske zeichnen
    tCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
    // 2. Farbe drüberlegen (Multiply behält Details)
    tCtx.globalCompositeOperation = 'source-in';
    tCtx.fillStyle = color;
    tCtx.fillRect(0, 0, canvas.width, canvas.height);

    // 3. Auf Hauptcanvas zeichnen
    ctx.drawImage(tempCanvas, 0, 0);
}

// 5. UI Generierung
function buildUI() {
    const container = document.getElementById('ui-root');
    const sections = [
        { id: 'frontshell', name: 'Frontgehäuse' },
        { id: 'touchpad', name: 'Touchpad' },
        { id: 'buttons', name: 'Action Buttons' },
        { id: 'dpad', name: 'D-Pad' },
        { id: 'sticks', name: 'Analog Sticks' },
        { id: 'backshell', name: 'Rückschale' },
        { id: 'paddles', name: 'Paddles (SCUF Style)' }
    ];

    sections.forEach(sec => {
        const div = document.createElement('div');
        div.className = 'cfg-acc';
        div.innerHTML = `
            <div class="cfg-acc-hd" onclick="this.parentElement.classList.toggle('open')">
                <span>${sec.name}</span>
                <span>+</span>
            </div>
            <div class="cfg-acc-body">
                <div class="color-grid">
                    ${COLORS.map(c => `
                        <div class="color-item" 
                             style="background:${c.hex}" 
                             onclick="updatePart('${sec.id}', '${c.hex}')">
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        container.appendChild(div);
    });
}

function updatePart(part, hex) {
    state.parts[part] = hex;
    // Automatisch zur richtigen Seite springen
    if (['backshell', 'paddles'].includes(part)) setView('back');
    else setView('front');
    render();
}

function setView(v) {
    state.view = v;
    document.getElementById('btn-front').classList.toggle('active', v === 'front');
    document.getElementById('btn-back').classList.toggle('active', v === 'back');
    render();
}

// Start
preload();
buildUI();

</script>
</body>
</html>
