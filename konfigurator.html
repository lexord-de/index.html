<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
    <title>PS5 Konfigurator | LEXORD®</title>
    <link rel="icon" type="image/png" href="IMG_7023.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{--neon:#00f2ff;--neon2:#bc13fe;--green:#00b67a;--err:#ff4d4f}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
        html,body{overflow-x:hidden}
        body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:120px}

        /* AURORA BACKGROUND */
        .aurora{position:fixed;inset:0;z-index:-3;background:#000;overflow:hidden}
        .ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:.4;animation:af 25s ease-in-out infinite}
        .ab:nth-child(1){width:55%;height:55%;background:radial-gradient(circle,rgba(0,242,255,.5),transparent 70%);top:-10%;left:-10%}
        .ab:nth-child(2){width:50%;height:50%;background:radial-gradient(circle,rgba(188,19,254,.4),transparent 70%);bottom:-10%;right:-10%;animation-delay:-8s}
        .ab:nth-child(3){width:40%;height:40%;background:radial-gradient(circle,rgba(255,46,110,.25),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-15s}
        @keyframes af{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(15%,-10%) scale(1.1)}}
        .grid-overlay{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(0,242,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}

        /* HEADER */
        .cfg-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:10px 4%;background:rgba(0,0,0,.92);backdrop-filter:blur(22px);border-bottom:1px solid rgba(0,242,255,.15)}
        .cfg-back{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron';font-size:9px;letter-spacing:1.5px;font-weight:700;color:#aaa;text-decoration:none;padding:9px 12px;border:1px solid #1a1a1e;border-radius:8px;background:rgba(10,10,12,.7)}
        .cfg-title{font-family:'Orbitron';font-weight:900;font-size:10px;letter-spacing:2px;color:#ddd;text-align:center;flex:1}
        .cfg-live{font-family:'Orbitron';font-size:8px;letter-spacing:1.5px;color:var(--neon);background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.25);padding:6px 10px;border-radius:7px;display:flex;align-items:center;gap:5px;white-space:nowrap}
        .cfg-live::before{content:'';width:5px;height:5px;background:var(--neon);border-radius:50%;animation:ldot 1.5s infinite;box-shadow:0 0 8px var(--neon)}
        @keyframes ldot{0%,100%{opacity:1}50%{opacity:.3}}

        /* HERO */
        .cfg-hero{text-align:center;padding:25px 5% 15px}
        .cfg-hero-title{font-family:'Orbitron';font-weight:900;font-size:clamp(1.3rem,5vw,2.2rem);letter-spacing:-1px;line-height:1.1;background:linear-gradient(180deg,#fff,rgba(255,255,255,.5));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

        /* TOGGLE & STAGE */
        .ctrl-wrap{display:flex;flex-direction:column;align-items:center;padding:5px 4% 20px}
        .ctrl-toggle{display:flex;gap:6px;margin-bottom:14px;background:rgba(12,12,14,.7);padding:4px;border-radius:11px;border:1px solid rgba(255,255,255,.06)}
        .ctrl-toggle button{font-family:'Orbitron';font-size:9.5px;letter-spacing:1.5px;font-weight:700;background:transparent;border:none;color:#888;padding:10px 18px;border-radius:8px;cursor:pointer;transition:.25s}
        .ctrl-toggle button.active{background:linear-gradient(135deg,rgba(0,242,255,.2),rgba(0,242,255,.08));color:var(--neon)}

        .ctrl-stage{position:relative;width:100%;max-width:540px;aspect-ratio:1.05/1}
        .photo-stack{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;animation:floatY 5s ease-in-out infinite}
        @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .photo-stack .photo-img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;z-index:1}

        /* TINT LAYERS */
        .tint-layer{position:absolute;inset:0;z-index:2;opacity:0;transition:opacity .4s ease;pointer-events:none;mix-blend-mode:multiply;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center}
        .tint-layer.active{opacity:.85}
        #tint-front{-webkit-mask-image:url('Photoroom_20260501_094506.png');mask-image:url('Photoroom_20260501_094506.png')}
        #tint-back{-webkit-mask-image:url('Photoroom_20260501_090821.png');mask-image:url('Photoroom_20260501_090821.png')}

        /* PART LABELS (ZYPA STYLE) */
        .part-label{position:absolute;background:#fff;color:#000;padding:7px 11px;border-radius:4px;font-family:'Inter';font-size:10px;font-weight:800;white-space:nowrap;opacity:0;transform:translateY(10px);transition:all .35s cubic-bezier(0.16, 1, 0.3, 1);box-shadow:0 10px 25px rgba(0,0,0,.5);pointer-events:none;z-index:50;text-transform:uppercase}
        .part-label.show{opacity:1;transform:translateY(0)}
        .part-label small{display:block;color:#777;font-size:8px;font-weight:400;margin-top:2px;text-transform:none}

        /* LABEL POSITIONS */
        #label-frontshell{top:15%;left:0%} #label-buttons{top:35%;right:0%}
        #label-stick{bottom:25%;right:5%} #label-backshell{top:15%;left:0%}
        #label-paddle{bottom:30%;right:5%}

        /* UI ELEMENTS */
        .cfg-sections{padding:18px 4% 30px;max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
        .cfg-acc{background:rgba(12,12,16,.7);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
        .cfg-acc-hd{display:flex;align-items:center;gap:14px;padding:18px;cursor:pointer;font-family:'Orbitron';font-size:11px;font-weight:700;color:#ddd}
        .cfg-acc-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
        .cfg-acc.open .cfg-acc-body{max-height:2000px}
        .cfg-acc-content{padding:0 16px 18px}

        .cfg-color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:10px}
        .cfg-color-item{aspect-ratio:1/1;border-radius:11px;cursor:pointer;border:2px solid rgba(255,255,255,.05)}
        .cfg-color-item.sel{border-color:var(--neon)}

        .cfg-opt{display:flex;align-items:center;gap:14px;padding:15px;background:rgba(255,255,255,.025);border:1.5px solid rgba(255,255,255,.05);border-radius:11px;margin-bottom:8px;cursor:pointer}
        .cfg-opt.sel{border-color:var(--neon);background:rgba(0,242,255,.06)}
        .cfg-opt-name{font-family:'Orbitron';font-size:10.5px;font-weight:700}
        .cfg-opt-price{font-family:'Orbitron';font-size:10.5px;color:var(--neon);margin-left:auto}

        /* BOTTOM BAR */
        .cfg-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(4,4,8,.97);backdrop-filter:blur(28px);border-top:1px solid rgba(0,242,255,.18);padding:11px 4%;display:flex;align-items:center;gap:10px}
        #total-price{font-family:'Orbitron';font-size:20px;font-weight:900}
        .cfg-add-cart{font-family:'Orbitron';font-size:10px;font-weight:900;background:var(--neon);border:none;padding:14px 20px;border-radius:11px;cursor:pointer;margin-left:auto}

        #cfg-loading{position:fixed;inset:0;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center;transition:opacity .6s}
    </style>
</head>
<body>

<div class="aurora"><div class="ab"></div><div class="ab"></div><div class="ab"></div></div>
<div class="grid-overlay"></div>

<div id="cfg-loading">
  <div style="font-family:'Orbitron';color:var(--neon);font-size:10px;letter-spacing:3px">⟫ LEXORD® LÄDT ⟪</div>
</div>

<header class="cfg-header">
  <a href="#" class="cfg-back">ZURÜCK</a>
  <div class="cfg-title">PS5 ULTIMATE CONFIGURATOR</div>
  <div class="cfg-live">LIVE</div>
</header>

<div class="ctrl-wrap">
  <div class="ctrl-toggle">
    <button id="view-front-btn" class="active" onclick="setView('front')">VORDERSEITE</button>
    <button id="view-back-btn" onclick="setView('back')">RÜCKSEITE</button>
  </div>

  <div class="ctrl-stage">
    <div class="photo-stack" id="stack-front">
      <img src="Photoroom_20260501_094506.png" class="photo-img">
      <div class="tint-layer" id="tint-front"></div>
      <!-- Zypa Labels Front -->
      <div class="part-label" id="label-frontshell">FRONTSCHALE<small>-</small></div>
      <div class="part-label" id="label-buttons">BUTTONS<small>-</small></div>
      <div class="part-label" id="label-stick">STICKS<small>-</small></div>
    </div>

    <div class="photo-stack" id="stack-back" style="display:none">
      <img src="Photoroom_20260501_090821.png" class="photo-img">
      <div class="tint-layer" id="tint-back"></div>
      <!-- PADDLE OVERLAY -->
      <img src="paddles_4er.png" id="img-paddles" class="photo-img" style="display:none; z-index:10;">
      <!-- Zypa Labels Back -->
      <div class="part-label" id="label-backshell">RÜCKSCHALE<small>-</small></div>
      <div class="part-label" id="label-paddle">PADDLES<small>-</small></div>
    </div>
  </div>
</div>

<div class="cfg-sections" id="cfg-sections"></div>

<div class="cfg-bottom">
  <div id="total-price">79,00 €</div>
  <button class="cfg-add-cart">IN DEN WARENKORB</button>
</div>

<script>
const COLORS = [
    {name:'Weiß',color:'#ffffff',premium:0,def:true},
    {name:'Schwarz',color:'#1a1a1c',premium:0},
    {name:'Sky Blue',color:'#00f2ff',premium:15},
    {name:'Cosmic Red',color:'#5c0d10',premium:15}
];

const CATS = [
  {id:'frontshell', name:'FRONTSCHALE', colors:COLORS, view:'front'},
  {id:'backshell', name:'RÜCKSCHALE', colors:COLORS, view:'back'},
  {id:'buttons', name:'ACTION BUTTONS', colors:COLORS, view:'front'}
];

const OPTS = {
  stick:[{val:'Standard',price:0,def:true},{val:'Hall Effect',price:35},{val:'TMR Pro',price:55}],
  paddle:[{val:'Keine',price:0,def:true},{val:'2× Paddles',price:39},{val:'4× Paddles',price:59}]
};

let state = { colors:{}, options:{} };
let labelTimer;

function init() {
    const root = document.getElementById('cfg-sections');
    
    // Farben generieren
    CATS.forEach(cat => {
        state.colors[cat.id] = { name:'-', premium:0 };
        const acc = document.createElement('div');
        acc.className = 'cfg-acc';
        acc.innerHTML = `
            <div class="cfg-acc-hd" onclick="toggleAcc(this, '${cat.view}')"><b>${cat.name}</b></div>
            <div class="cfg-acc-body"><div class="cfg-acc-content"><div class="cfg-color-grid" id="grid-${cat.id}"></div></div></div>`;
        root.appendChild(acc);
        const grid = acc.querySelector('#grid-'+cat.id);
        cat.colors.forEach(c => {
            const item = document.createElement('div');
            item.className = 'cfg-color-item';
            item.style.background = c.color;
            item.onclick = () => selectColor(cat.id, c, item, cat.view);
            grid.appendChild(item);
            if(c.def) selectColor(cat.id, c, item, cat.view);
        });
    });

    // Optionen generieren
    Object.keys(OPTS).forEach(key => {
        state.options[key] = { val:'-', price:0 };
        const acc = document.createElement('div');
        acc.className = 'cfg-acc';
        acc.innerHTML = `<div class="cfg-acc-hd" onclick="toggleAcc(this, '${key==='paddle'?'back':'front'}')"><b>${key.toUpperCase()}</b></div><div class="cfg-acc-body"><div class="cfg-acc-content" id="opt-${key}"></div></div>`;
        root.appendChild(acc);
        OPTS[key].forEach(o => {
            const div = document.createElement('div');
            div.className = 'cfg-opt';
            div.innerHTML = `<div class="cfg-opt-name">${o.val}</div><div class="cfg-opt-price">+${o.price}€</div>`;
            div.onclick = () => selectOpt(key, o, div);
            acc.querySelector('#opt-'+key).appendChild(div);
            if(o.def) selectOpt(key, o, div);
        });
    });

    setTimeout(() => document.getElementById('cfg-loading').style.opacity='0', 800);
    setTimeout(() => document.getElementById('cfg-loading').style.display='none', 1400);
}

function toggleAcc(el, view) {
    document.querySelectorAll('.cfg-acc').forEach(a => a.classList.remove('open'));
    el.parentElement.classList.add('open');
    setView(view);
}

function selectColor(id, c, el, view) {
    el.parentElement.querySelectorAll('.cfg-color-item').forEach(i => i.classList.remove('sel'));
    el.classList.add('sel');
    state.colors[id] = { name:c.name, premium:c.premium };
    
    // Tinting
    const t = document.getElementById('tint-' + id);
    if(t) {
        t.style.backgroundColor = c.color;
        t.classList.toggle('active', c.color !== '#ffffff');
    }
    
    showZypaLabel(id, c.name);
    updateUI();
}

function selectOpt(id, o, el) {
    el.parentElement.querySelectorAll('.cfg-opt').forEach(i => i.classList.remove('sel'));
    el.classList.add('sel');
    state.options[id] = { val:o.val, price:o.price };
    
    // Paddles-Bild Logic
    if(id === 'paddle') {
        document.getElementById('img-paddles').style.display = o.val.includes('4×') ? 'block' : 'none';
        setView('back');
    }
    
    showZypaLabel(id, o.val);
    updateUI();
}

function showZypaLabel(id, text) {
    document.querySelectorAll('.part-label').forEach(l => l.classList.remove('show'));
    const label = document.getElementById('label-' + id);
    if(label) {
        label.querySelector('small').innerText = text;
        label.classList.add('show');
        clearTimeout(labelTimer);
        labelTimer = setTimeout(() => label.classList.remove('show'), 3000);
    }
}

function setView(v) {
    document.getElementById('stack-front').style.display = v==='front'?'flex':'none';
    document.getElementById('stack-back').style.display = v==='back'?'flex':'none';
    document.getElementById('view-front-btn').classList.toggle('active', v==='front');
    document.getElementById('view-back-btn').classList.toggle('active', v==='back');
}

function updateUI() {
    let p = 79;
    Object.values(state.colors).forEach(c => p += c.premium);
    Object.values(state.options).forEach(o => p += o.price);
    document.getElementById('total-price').innerText = p.toFixed(2).replace('.',',') + ' €';
}

init();
</script>
</body>
</html>
