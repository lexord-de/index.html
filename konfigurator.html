<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>PS5 Custom Controller Konfigurator | LEXORD</title>
  <link rel="icon" type="image/png" href="IMG_7023.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--neon:#00f2ff;--bg:#000;--panel:#080808;--border:#1a1a1a;--text:#fff;--muted:#555;--gold:#d4af37}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}

    .header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:15px 20px;display:flex;justify-content:space-between;align-items:center}
    .header-left{display:flex;align-items:center;gap:12px}
    .back-btn{padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--muted);font-family:'Orbitron';font-size:9px;letter-spacing:1px;cursor:pointer;transition:.3s;border:none;background:none}
    .back-btn:hover{color:var(--neon)}
    .title{font-family:'Orbitron';font-weight:900;font-size:11px;letter-spacing:2px}
    .header-right{display:flex;align-items:center;gap:14px}
    .price-box{text-align:right}
    .price-label{font-family:'Orbitron';font-size:8px;color:#666;letter-spacing:1px}
    .price-val{font-family:'Orbitron';font-size:18px;font-weight:900;color:var(--neon);text-shadow:0 0 10px rgba(0,242,255,.3)}

    .container{max-width:1400px;margin:0 auto;padding:30px 20px}

    .preset-section{margin-bottom:30px;text-align:center}
    .preset-title{font-family:'Orbitron';font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:12px;text-transform:uppercase}
    .preset-buttons{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
    .preset-btn{padding:10px 18px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:#999;font-family:'Orbitron';font-size:9px;letter-spacing:1px;cursor:pointer;border-radius:6px;transition:.3s;text-transform:uppercase}
    .preset-btn:hover{border-color:var(--neon);color:var(--neon)}
    .preset-btn.active{border-color:var(--neon);background:rgba(0,242,255,.1);color:var(--neon)}

    .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;margin-bottom:30px}
    @media(max-width:1000px){.main-grid{grid-template-columns:1fr;gap:30px}}

    /* PREVIEW */
    .preview-col{display:flex;flex-direction:column;align-items:center;justify-content:center}
    .preview-title{font-family:'Orbitron';font-size:11px;letter-spacing:2px;color:var(--neon);margin-bottom:20px;text-align:center}
    .controller-wrapper{position:relative;width:100%;max-width:450px;aspect-ratio:1}
    .controller-img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 30px 60px rgba(0,242,255,.25));position:relative;z-index:2}
    .controller-overlay{position:absolute;inset:0;border-radius:30px;opacity:0;transition:opacity .5s ease;z-index:1;pointer-events:none}
    .controller-overlay.shell{opacity:.8}

    /* OPTIONS */
    .options-col{display:flex;flex-direction:column;gap:28px}

    .color-section{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;transition:.3s}
    .color-section:hover{border-color:var(--neon);background:#0a0a0a}

    .section-title{font-family:'Orbitron';font-size:10px;letter-spacing:2px;color:var(--neon);margin-bottom:14px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
    .section-title::before{content:'';width:3px;height:16px;background:var(--neon);border-radius:2px}

    .color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .color-choice{position:relative;aspect-ratio:1;border:2px solid var(--border);border-radius:10px;cursor:pointer;overflow:hidden;transition:.25s;background:#000}
    .color-choice:hover{border-color:var(--neon);transform:scale(1.08)}
    .color-choice.selected{border-color:var(--neon);box-shadow:0 0 20px rgba(0,242,255,.5)}
    .color-choice::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--neon);font-size:20px;font-weight:900;opacity:0;transition:.2s}
    .color-choice.selected::after{opacity:1;text-shadow:0 0 10px var(--neon)}
    .color-name{font-size:7px;color:#666;text-align:center;margin-top:6px;font-family:'Orbitron';letter-spacing:.5px;min-height:14px}
    .color-price{font-size:7px;color:var(--neon);font-weight:700}

    .option-group{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
    .option-group:hover{border-color:var(--neon);background:#0a0a0a}

    .radio-options{display:flex;flex-direction:column;gap:8px}
    .radio-opt{display:flex;align-items:flex-start;gap:10px;padding:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:6px;cursor:pointer;transition:.2s}
    .radio-opt:hover{background:rgba(255,255,255,.05);border-color:var(--neon)}
    .radio-opt input[type=radio]{appearance:none;width:16px;height:16px;border:2px solid var(--border);border-radius:50%;cursor:pointer;flex-shrink:0;margin-top:1px;transition:.2s;background:#000}
    .radio-opt input[type=radio]:hover{border-color:var(--neon)}
    .radio-opt input[type=radio]:checked{border-color:var(--neon);background:rgba(0,242,255,.2);box-shadow:inset 0 0 4px var(--neon)}
    .radio-content{flex:1}
    .radio-name{font-family:'Orbitron';font-size:9px;font-weight:700;letter-spacing:.5px}
    .radio-desc{font-size:8px;color:#666;margin-top:2px;line-height:1.4}
    .radio-price{font-size:8px;color:var(--neon);font-weight:700;margin-top:4px}

    .input-text{width:100%;padding:10px 12px;background:rgba(0,0,0,.5);border:1px solid var(--border);color:var(--text);font-family:'Orbitron';font-size:9px;letter-spacing:1px;border-radius:6px;text-transform:uppercase;transition:.2s}
    .input-text:focus{border-color:var(--neon);background:rgba(0,242,255,.05);outline:none}

    .bottom-section{display:flex;gap:12px;justify-content:center;margin-top:40px}
    .btn{padding:13px 24px;border:none;border-radius:8px;font-family:'Orbitron';font-weight:900;font-size:9px;letter-spacing:1.5px;cursor:pointer;transition:.3s;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-save{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border);min-width:160px}
    .btn-save:hover{border-color:var(--neon);color:var(--neon)}
    .btn-cart{background:var(--neon);color:#000;font-weight:900;min-width:280px}
    .btn-cart:hover{background:#fff;transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,242,255,.3)}

    .info-box{background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.3);border-radius:10px;padding:16px;margin:20px 0;font-size:9px;color:#aaa;line-height:1.6;font-family:'Orbitron';letter-spacing:.5px}

    .toast{position:fixed;bottom:20px;right:20px;padding:12px 16px;background:rgba(0,242,255,.2);border:1px solid var(--neon);border-radius:8px;color:var(--neon);font-family:'Orbitron';font-size:8.5px;letter-spacing:1px;z-index:9999;opacity:0;transition:.3s;box-shadow:0 4px 16px rgba(0,242,255,.2)}
    .toast.show{opacity:1}

    @media(max-width:1000px){
      .main-grid{grid-template-columns:1fr}
      .preset-buttons{justify-content:flex-start;gap:6px;overflow-x:auto;padding:0 0 8px}
      .preset-btn{flex-shrink:0}
    }
    @media(max-width:600px){
      .header{flex-direction:column;gap:12px}
      .color-grid{grid-template-columns:repeat(4,1fr)}
      .btn{padding:11px 16px;font-size:8px;min-width:auto}
      .btn-cart{min-width:auto;flex:1}
      .bottom-section{flex-wrap:wrap;gap:8px}
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="back-btn" onclick="window.location.href='index.html'">← ZURÜCK</button>
    <div class="title">🎮 PS5 CUSTOM CONTROLLER</div>
  </div>
  <div class="header-right">
    <div class="price-box">
      <div class="price-label">AB</div>
      <div class="price-val" id="total-price">79,00 €</div>
    </div>
  </div>
</header>

<div class="container">

  <!-- PRESETS -->
  <div class="preset-section">
    <div class="preset-title">⚡ SCHNELL-PRESETS</div>
    <div class="preset-buttons" id="presets-container"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-grid">
    
    <!-- LEFT: PREVIEW -->
    <div class="preview-col">
      <div class="preview-title">DEIN CUSTOM DESIGN</div>
      <div class="controller-wrapper">
        <img src="Photoroom_20260501_094506.png" alt="PS5 Controller" class="controller-img">
        <canvas id="overlay-canvas" style="position:absolute;inset:0;z-index:3"></canvas>
      </div>
      <div class="info-box" style="margin-top:20px;text-align:center;width:100%;max-width:450px">
        ✨ Dein Design wird in Echtzeit angezeigt
      </div>
    </div>

    <!-- RIGHT: OPTIONS -->
    <div class="options-col">

      <!-- FRONTGEHÄUSE -->
      <div class="color-section">
        <div class="section-title">🎨 FRONTGEHÄUSE</div>
        <div class="color-grid" id="shell-colors"></div>
      </div>

      <!-- D-PAD -->
      <div class="color-section">
        <div class="section-title">✚ D-PAD</div>
        <div class="color-grid" id="dpad-colors"></div>
      </div>

      <!-- ACTION BUTTONS -->
      <div class="color-section">
        <div class="section-title">⊙ ACTION BUTTONS</div>
        <div class="color-grid" id="buttons-colors"></div>
      </div>

      <!-- STICK CAPS -->
      <div class="color-section">
        <div class="section-title">🕹 STICK CAPS</div>
        <div class="color-grid" id="sticks-colors"></div>
      </div>

      <!-- TRIGGER FARBE -->
      <div class="color-section">
        <div class="section-title">🎯 TRIGGER</div>
        <div class="color-grid" id="trigger-colors"></div>
      </div>

    </div>
  </div>

  <!-- OPTIONS BELOW -->
  <div class="color-section" style="margin-bottom:24px">
    <div class="section-title">⚙ ANALOG STICKS</div>
    <div class="radio-options" id="stick-options"></div>
  </div>

  <div class="color-section" style="margin-bottom:24px">
    <div class="section-title">⚡ TRIGGER SYSTEM</div>
    <div class="radio-options" id="trigger-options"></div>
  </div>

  <div class="color-section" style="margin-bottom:24px">
    <div class="section-title">🔙 PADDLES (RÜCKSEITE)</div>
    <div class="radio-options" id="paddle-options"></div>
  </div>

  <div class="color-section" style="margin-bottom:30px">
    <div class="section-title">✏ GRAVUR (OPTIONAL)</div>
    <input type="text" id="engraving" class="input-text" placeholder="BIS ZU 20 ZEICHEN" maxlength="20">
  </div>

  <!-- BUTTONS -->
  <div class="bottom-section">
    <button class="btn btn-save" onclick="saveDraft()">💾 SPEICHERN</button>
    <button class="btn btn-cart" onclick="addToCart()">🛒 IN WARENKORB</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

const COLORS={
  shell:[
    {name:'Weiß',color:'#ffffff',price:0},
    {name:'Schwarz',color:'#1a1a1c',price:0},
    {name:'Nacht',color:'#0a1633',price:8},
    {name:'Purple',color:'#3d1a52',price:8},
    {name:'Red',color:'#5c0d10',price:8},
    {name:'Forest',color:'#0d2f17',price:8},
    {name:'Gold',color:'#d4af37',price:18},
    {name:'Carbon',color:'#1c1c1f',price:22}
  ],
  dpad:[
    {name:'Standard',color:'#f0f0f2',price:0},
    {name:'Schwarz',color:'#222222',price:5},
    {name:'Cyan',color:'#00f2ff',price:7},
    {name:'Gold',color:'#d4af37',price:12}
  ],
  buttons:[
    {name:'Standard',color:'#f0f0f2',price:0},
    {name:'Schwarz',color:'#222222',price:5},
    {name:'Cyan',color:'#00f2ff',price:7},
    {name:'Gold',color:'#d4af37',price:12}
  ],
  sticks:[
    {name:'Schwarz',color:'#0a0a0c',price:0},
    {name:'Weiß',color:'#e8e8e8',price:5},
    {name:'Cyan',color:'#00f2ff',price:8}
  ],
  trigger:[
    {name:'Standard',color:'#f0f0f2',price:0},
    {name:'Schwarz',color:'#1a1a1c',price:5},
    {name:'Cyan',color:'#00f2ff',price:9}
  ]
};

const STICK_OPTIONS=[
  {val:'Standard',desc:'Original PS5 Sticks',price:0},
  {val:'Hall Effect',desc:'Magnetisch - kein Drift',price:35},
  {val:'TMR',desc:'Höchste Genauigkeit',price:55}
];

const TRIGGER_OPTIONS=[
  {val:'Adaptive',desc:'Original Sony Adaptive Trigger',price:0},
  {val:'Smart Clicky',desc:'Gaming-Maus Feeling - 1mm Auslöseweg',price:25}
];

const PADDLE_OPTIONS=[
  {val:'Keine',desc:'Standard Setup',price:0},
  {val:'2x Paddles',desc:'2 programmierbare Paddles (EMPFOHLEN)',price:39},
  {val:'4x Paddles',desc:'4 Paddles - maximale Kontrolle',price:59}
];

const PRESETS={
  'DEFAULT':{shell:'#ffffff',dpad:'#f0f0f2',buttons:'#f0f0f2',sticks:'#0a0a0c',trigger:'#f0f0f2',stick:'Standard',triggerOpt:'Adaptive',paddle:'Keine'},
  'STEALTH':{shell:'#1a1a1c',dpad:'#222222',buttons:'#222222',sticks:'#0a0a0c',trigger:'#1a1a1c',stick:'Standard',triggerOpt:'Adaptive',paddle:'Keine'},
  'CYBER':{shell:'#0a1633',dpad:'#00f2ff',buttons:'#00f2ff',sticks:'#0a0a0c',trigger:'#0a1633',stick:'Hall Effect',triggerOpt:'Smart Clicky',paddle:'2x Paddles'},
  'COSMIC':{shell:'#5c0d10',dpad:'#f0f0f2',buttons:'#f0f0f2',sticks:'#0a0a0c',trigger:'#5c0d10',stick:'Standard',triggerOpt:'Adaptive',paddle:'Keine'},
  'ELITE':{shell:'#1a1a1c',dpad:'#d4af37',buttons:'#d4af37',sticks:'#0a0a0c',trigger:'#1a1a1c',stick:'TMR',triggerOpt:'Smart Clicky',paddle:'4x Paddles'}
};

const DRAFT_KEY='lxrd_cfg_draft';
const CART_KEY='lxrd_cart';
const BASE_PRICE=79;

let state={
  shell:'#ffffff',dpad:'#f0f0f2',buttons:'#f0f0f2',sticks:'#0a0a0c',trigger:'#f0f0f2',
  stick:'Standard',triggerOpt:'Adaptive',paddle:'Keine',
  engraving:''
};

function init(){
  loadDraft();
  renderPresets();
  renderColors();
  renderOptions();
  updatePrice();
  document.getElementById('engraving').value=state.engraving;
}

function renderPresets(){
  const cont=document.getElementById('presets-container');
  cont.innerHTML=Object.keys(PRESETS).map(name=>`
    <button class="preset-btn" onclick="applyPreset('${name}')">${name}</button>
  `).join('');
}

function renderColors(){
  ['shell','dpad','buttons','sticks','trigger'].forEach(key=>{
    const cont=document.getElementById(key+'-colors');
    cont.innerHTML=COLORS[key].map((c,i)=>`
      <div>
        <div class="color-choice ${state[key]===c.color?'selected':''}" 
             style="background:${c.color}" 
             onclick="selectColor('${key}','${c.color}',${c.price})"></div>
        <div class="color-name">
          ${c.name}
          ${c.price?`<div class="color-price">+${c.price}€</div>`:''}
        </div>
      </div>
    `).join('');
  });
}

function renderOptions(){
  renderOptionGroup('stick-options',STICK_OPTIONS,'stick');
  renderOptionGroup('trigger-options',TRIGGER_OPTIONS,'triggerOpt');
  renderOptionGroup('paddle-options',PADDLE_OPTIONS,'paddle');
}

function renderOptionGroup(cont,opts,key){
  document.getElementById(cont).innerHTML=opts.map(o=>`
    <label class="radio-opt">
      <input type="radio" name="${key}" value="${o.val}" ${state[key]===o.val?'checked':''} onchange="selectOption('${key}','${o.val}',${o.price})">
      <div class="radio-content">
        <div class="radio-name">${o.val}</div>
        <div class="radio-desc">${o.desc}</div>
        ${o.price?`<div class="radio-price">+${o.price}€</div>`:''}
      </div>
    </label>
  `).join('');
}

function selectColor(key,color,price){
  state[key]=color;
  updatePrice();
  renderColors();
}

function selectOption(key,val,price){
  state[key]=val;
  updatePrice();
}

function applyPreset(name){
  state=Object.assign({},state,PRESETS[name]);
  updatePrice();
  renderColors();
  renderOptions();
  document.getElementById('engraving').value=state.engraving;
  toast(`✓ ${name} aktiviert`);
}

function updatePrice(){
  let price=BASE_PRICE;
  
  Object.entries(state).forEach(([k,v])=>{
    if(['shell','dpad','buttons','sticks','trigger'].includes(k)){
      const cat=COLORS[k];
      const c=cat.find(x=>x.color===v);
      if(c)price+=c.price;
    }
  });

  const stickOpt=STICK_OPTIONS.find(x=>x.val===state.stick);
  if(stickOpt)price+=stickOpt.price;

  const triggerOpt=TRIGGER_OPTIONS.find(x=>x.val===state.triggerOpt);
  if(triggerOpt)price+=triggerOpt.price;

  const paddleOpt=PADDLE_OPTIONS.find(x=>x.val===state.paddle);
  if(paddleOpt)price+=paddleOpt.price;

  document.getElementById('total-price').innerText=price.toFixed(2)+' €';
  saveDraft();
}

function saveDraft(){
  state.engraving=document.getElementById('engraving').value;
  localStorage.setItem(DRAFT_KEY,JSON.stringify(state));
}

function loadDraft(){
  const saved=localStorage.getItem(DRAFT_KEY);
  if(saved){
    try{state=JSON.parse(saved);}catch(e){}
  }
}

function addToCart(){
  saveDraft();
  
  let price=BASE_PRICE;
  Object.entries(state).forEach(([k,v])=>{
    if(['shell','dpad','buttons','sticks','trigger'].includes(k)){
      const cat=COLORS[k];
      const c=cat.find(x=>x.color===v);
      if(c)price+=c.price;
    }
  });
  const stickOpt=STICK_OPTIONS.find(x=>x.val===state.stick);
  if(stickOpt)price+=stickOpt.price;
  const triggerOpt=TRIGGER_OPTIONS.find(x=>x.val===state.triggerOpt);
  if(triggerOpt)price+=triggerOpt.price;
  const paddleOpt=PADDLE_OPTIONS.find(x=>x.val===state.paddle);
  if(paddleOpt)price+=paddleOpt.price;

  const config={
    name:'Custom PS5 Controller',
    colors:{shell:state.shell,dpad:state.dpad,buttons:state.buttons,sticks:state.sticks,trigger:state.trigger},
    options:{stick:state.stick,trigger:state.triggerOpt,paddle:state.paddle},
    engraving:state.engraving,
    price:price,
    qty:1
  };

  let cart=JSON.parse(localStorage.getItem(CART_KEY)||'[]');
  cart.push(config);
  localStorage.setItem(CART_KEY,JSON.stringify(cart));
  
  toast('✓ Warenkorb hinzugefügt!');
  setTimeout(()=>window.location.href='index.html',1500);
}

function toast(msg){
  const t=document.getElementById('toast');
  t.innerText=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>

</body>
</html>
