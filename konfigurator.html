<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PS5 Controller Konfigurator | LEXORD®</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --purple: #bc13fe;
            --bg: #020207;
            --card: rgba(18, 18, 24, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #e8e8ec; font-family: 'Inter', sans-serif; overflow-x: hidden; padding-bottom: 120px; }

        /* AURORA BACKGROUND */
        .aurora { position: fixed; inset: 0; z-index: -3; background: #020207; overflow: hidden; }
        .aurora-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 20s infinite alternate; }
        .aurora-blob:nth-child(1) { width: 60%; height: 60%; background: radial-gradient(circle, var(--neon), transparent); top: -10%; left: -10%; }
        .aurora-blob:nth-child(2) { width: 50%; height: 50%; background: radial-gradient(circle, var(--purple), transparent); bottom: -10%; right: -10%; }
        @keyframes float { from { transform: translate(0,0) scale(1); } to { transform: translate(10%, 10%) scale(1.1); } }

        /* HEADER */
        .cfg-header { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; padding: 15px 5%; background: rgba(2,2,7,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0,242,255,0.15); }
        .cfg-title { font-family: 'Orbitron'; font-weight: 900; font-size: 14px; letter-spacing: 2px; flex: 1; text-align: center; }

        /* CONTROLLER STAGE */
        .ctrl-stage-wrap { display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }
        .ctrl-stage { position: relative; width: 100%; max-width: 500px; aspect-ratio: 1.2; display: flex; justify-content: center; align-items: center; }
        .ctrl-svg { width: 100%; height: auto; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8)); transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* CONFIGURATION SECTIONS */
        .cfg-container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .cfg-acc { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .cfg-acc-hd { padding: 18px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-family: 'Orbitron'; font-size: 12px; border-bottom: 1px solid transparent; }
        .cfg-acc.open .cfg-acc-hd { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .cfg-acc-body { max-height: 0; transition: max-height 0.4s ease; overflow: hidden; }
        .cfg-acc.open .cfg-acc-body { max-height: 1000px; }
        .cfg-content { padding: 20px; }

        /* COLOR GRID */
        .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 12px; }
        .color-item { aspect-ratio: 1; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; position: relative; }
        .color-item.active { border-color: var(--neon); transform: scale(1.1); box-shadow: 0 0 15px var(--neon); }
        .color-item::after { content: attr(data-name); position: absolute; top: 110%; left: 50%; transform: translateX(-50%); font-size: 8px; opacity: 0; pointer-events: none; }
        .color-item:hover::after { opacity: 1; }

        /* OPTIONS LIST */
        .opt-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .opt-item.active { border-color: var(--neon); background: rgba(0,242,255,0.05); }
        .opt-info span { display: block; font-size: 10px; color: #777; }
        .opt-price { font-family: 'Orbitron'; color: var(--neon); font-size: 12px; }

        /* BOTTOM BAR */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: rgba(2,2,7,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--neon); padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 200; }
        .price-display { font-family: 'Orbitron'; font-size: 24px; font-weight: 900; }
        .add-btn { background: var(--neon); color: #000; border: none; padding: 15px 30px; border-radius: 8px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; }

        /* TECH BADGES */
        .tech-badge { position: absolute; background: #fff; color: #000; padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 700; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 10; }
        .badge-visible { opacity: 1; transform: translateY(-5px); }
    </style>
</head>
<body>

<div class="aurora"><div class="aurora-blob"></div><div class="aurora-blob"></div></div>

<header class="cfg-header">
    <div class="cfg-title">LEXORD® CUSTOM DUALSENSE</div>
</header>

<div class="ctrl-stage-wrap">
    <div style="margin-bottom: 20px;">
        <button onclick="switchView('front')" style="background:none; border:1px solid var(--neon); color:#fff; padding:5px 15px; cursor:pointer;">FRONT</button>
        <button onclick="switchView('back')" style="background:none; border:1px solid #333; color:#fff; padding:5px 15px; cursor:pointer;">BACK</button>
    </div>
    
    <div class="ctrl-stage">
        <div id="badge-he" class="tech-badge" style="top: 60%; left: 20%;">HALL EFFECT</div>
        <div id="badge-paddle" class="tech-badge" style="top: 40%; right: 20%;">PADDLES ACTIVE</div>
        
        <!-- SVG CONTROLLER -->
        <svg id="controller-svg" class="ctrl-svg" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.5"/></filter>
            </defs>
            <!-- Hauptgehäuse -->
            <path id="svg-frontshell" d="M100,150 Q100,100 150,90 L450,90 Q500,100 500,150 L500,250 Q500,350 400,400 L200,400 Q100,350 100,250 Z" fill="#ffffff" stroke="#1a1a1a" />
            <!-- Touchpad -->
            <rect id="svg-touchpad" x="200" y="100" width="200" height="80" rx="10" fill="#222" />
            <text id="svg-engraving" x="300" y="145" text-anchor="middle" fill="#555" font-family="Orbitron" font-size="12" style="text-transform: uppercase;"></text>
            <!-- Sticks -->
            <circle id="svg-stick-l" cx="210" cy="280" r="35" fill="#111" />
            <circle id="svg-stick-r" cx="390" cy="280" r="35" fill="#111" />
            <!-- Buttons -->
            <circle id="svg-btns" cx="440" cy="180" r="15" fill="#eee" />
            <circle cx="475" cy="215" r="15" fill="#eee" />
            <!-- Lightbar -->
            <rect id="svg-lightbar" x="198" y="98" width="204" height="84" rx="11" fill="none" stroke="#00f2ff" stroke-width="2" opacity="0.6" />
        </svg>
    </div>
</div>

<div class="cfg-container" id="configurator-ui">
    <!-- Dynamisch per JS gefüllt -->
</div>

<div class="bottom-bar">
    <div class="price-display"><span id="total-price">79,00</span> €</div>
    <button class="add-btn" onclick="addToCart()">WARENKORB</button>
</div>

<script>
    const CONFIG = {
        frontshell: { label: "Gehäuse Farbe", items: [
            { name: "White", color: "#ffffff", price: 0 },
            { name: "Black", color: "#1a1a1c", price: 0 },
            { name: "Neon Blue", color: "#00f2ff", price: 10 },
            { name: "Cosmic Red", color: "#9e192e", price: 10 }
        ]},
        sticks: { label: "Analog Sticks", items: [
            { name: "Black", color: "#111111", price: 0 },
            { name: "White", color: "#eeeeee", price: 5 },
            { name: "Clear Blue", color: "rgba(0,242,255,0.5)", price: 8 }
        ]},
        tech: { label: "Stick Technologie", options: [
            { name: "Standard", desc: "Original Sony", price: 0, code: 'std' },
            { name: "Hall Effect", desc: "Kein Stick-Drift möglich", price: 35, code: 'he' }
        ]}
    };

    let selection = {
        frontshell: CONFIG.frontshell.items[0],
        sticks: CONFIG.sticks.items[0],
        tech: CONFIG.tech.options[0],
        engraving: ""
    };

    function init() {
        const ui = document.getElementById('configurator-ui');
        
        // Farben Rendern
        let html = renderSection("Gehäuse", "frontshell", CONFIG.frontshell.items, 'color');
        html += renderSection("Sticks", "sticks", CONFIG.sticks.items, 'color');
        html += renderSection("Upgrade", "tech", CONFIG.tech.options, 'list');
        
        // Gravur
        html += `
            <div class="cfg-acc">
                <div class="cfg-acc-hd" onclick="this.parentElement.classList.toggle('open')"><span>✨</span> Gravur</div>
                <div class="cfg-acc-body"><div class="cfg-content">
                    <input type="text" maxlength="12" placeholder="DEIN NAME" oninput="updateEngraving(this.value)" 
                    style="width:100%; background:#111; border:1px solid #333; color:#fff; padding:10px; font-family:'Orbitron';">
                </div></div>
            </div>`;

        ui.innerHTML = html;
        updateUI();
    }

    function renderSection(title, key, items, type) {
        let content = '';
        if(type === 'color') {
            content = `<div class="color-grid">` + items.map(item => `
                <div class="color-item" style="background:${item.color}" data-name="${item.name}" 
                     onclick="selectItem('${key}', '${item.name}')"></div>
            `).join('') + `</div>`;
        } else {
            content = items.map(item => `
                <div class="opt-item" onclick="selectItem('${key}', '${item.name}')">
                    <div class="opt-info">${item.name} <span>${item.desc}</span></div>
                    <div class="opt-price">+ ${item.price}€</div>
                </div>
            `).join('');
        }

        return `
            <div class="cfg-acc">
                <div class="cfg-acc-hd" onclick="this.parentElement.classList.toggle('open')"><span>⚙</span> ${title}</div>
                <div class="cfg-acc-body"><div class="cfg-content">${content}</div></div>
            </div>`;
    }

    function selectItem(key, name) {
        const item = [...(CONFIG[key].items || []), ...(CONFIG[key].options || [])].find(i => i.name === name);
        selection[key] = item;
        updateUI();
    }

    function updateEngraving(val) {
        selection.engraving = val;
        document.getElementById('svg-engraving').textContent = val;
        updateUI();
    }

    function updateUI() {
        // SVG Update
        document.getElementById('svg-frontshell').setAttribute('fill', selection.frontshell.color);
        document.getElementById('svg-stick-l').setAttribute('fill', selection.sticks.color);
        document.getElementById('svg-stick-r').setAttribute('fill', selection.sticks.color);
        
        // Badges
        document.getElementById('badge-he').classList.toggle('badge-visible', selection.tech.code === 'he');

        // Preis
        let total = 79;
        total += selection.frontshell.price;
        total += selection.sticks.price;
        total += selection.tech.price;
        if(selection.engraving.length > 0) total += 8;
        
        document.getElementById('total-price').innerText = total.toFixed(2).replace('.', ',');
    }

    function switchView(view) {
        const svg = document.getElementById('controller-svg');
        if(view === 'back') {
            svg.style.transform = 'rotateY(180deg) scale(0.9)';
            // Hier könnte man Pfade für Paddles einblenden
        } else {
            svg.style.transform = 'rotateY(0deg) scale(1)';
        }
    }

    function addToCart() {
        alert("Controller wurde gespeichert! Preis: " + document.getElementById('total-price').innerText + " €");
    }

    init();
</script>

</body>
</html>
