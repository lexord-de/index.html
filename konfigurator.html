<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
    <title>PS5 Konfigurator | LEXORD®</title>
    <link rel="icon" type="image/png" href="IMG_7023.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{--neon:#00f2ff;--neon2:#bc13fe;--green:#00b67a;--err:#ff4d4f}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
        html,body{overflow-x:hidden}
        body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:120px}

        /* AURORA BACKGROUND */
        .aurora{position:fixed;inset:0;z-index:-3;background:#000;overflow:hidden}
        .ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:.4;animation:af 25s ease-in-out infinite}
        .ab:nth-child(1){width:55%;height:55%;background:radial-gradient(circle,rgba(0,242,255,.5),transparent 70%);top:-10%;left:-10%}
        .ab:nth-child(2){width:50%;height:50%;background:radial-gradient(circle,rgba(188,19,254,.4),transparent 70%);bottom:-10%;right:-10%;animation-delay:-8s}
        .ab:nth-child(3){width:40%;height:40%;background:radial-gradient(circle,rgba(255,46,110,.25),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-15s}
        @keyframes af{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(15%,-10%) scale(1.1)}}
        .grid-overlay{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(0,242,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}

        /* HEADER */
        .cfg-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:10px 4%;background:rgba(0,0,0,.92);backdrop-filter:blur(22px);border-bottom:1px solid rgba(0,242,255,.15)}
        .cfg-back{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron';font-size:9px;letter-spacing:1.5px;font-weight:700;color:#aaa;text-decoration:none;padding:9px 12px;border:1px solid #1a1a1e;border-radius:8px;background:rgba(10,10,12,.7)}
        .cfg-title{font-family:'Orbitron';font-weight:900;font-size:10px;letter-spacing:2px;color:#ddd;text-align:center;flex:1}
        .cfg-live{font-family:'Orbitron';font-size:8px;letter-spacing:1.5px;color:var(--neon);background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.25);padding:6px 10px;border-radius:7px;display:flex;align-items:center;gap:5px;white-space:nowrap}
        .cfg-live::before{content:'';width:5px;height:5px;background:var(--neon);border-radius:50%;animation:ldot 1.5s infinite;box-shadow:0 0 8px var(--neon)}
        @keyframes ldot{0%,100%{opacity:1}50%{opacity:.3}}

        /* HERO */
        .cfg-hero{text-align:center;padding:25px 5% 15px}
        .cfg-hero-title{font-family:'Orbitron';font-weight:900;font-size:clamp(1.3rem,5vw,2.2rem);line-height:1.1;margin-bottom:8px;background:linear-gradient(180deg,#fff,rgba(255,255,255,.5));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

        /* STAGE & LABELS (ZYPA STYLE) */
        .ctrl-wrap{display:flex;flex-direction:column;align-items:center;padding:5px 4% 20px}
        .ctrl-toggle{display:flex;gap:6px;margin-bottom:14px;background:rgba(12,12,14,.7);padding:4px;border-radius:11px;border:1px solid rgba(255,255,255,.06)}
        .ctrl-toggle button{font-family:'Orbitron';font-size:9.5px;background:transparent;border:none;color:#888;padding:10px 18px;border-radius:8px;cursor:pointer}
        .ctrl-toggle button.active{background:linear-gradient(135deg,rgba(0,242,255,.2),rgba(0,242,255,.08));color:var(--neon)}

        .ctrl-stage{position:relative;width:100%;max-width:540px;aspect-ratio:1.05/1}
        .photo-stack{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2}
        .photo-img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}

        /* TINTS */
        .tint-layer{position:absolute;inset:0;z-index:3;opacity:0;transition:opacity .4s ease;pointer-events:none;mix-blend-mode:multiply;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center}
        .tint-layer.active{opacity:.85}

        /* ZYPA LABELS */
        .part-label{position:absolute;background:rgba(255,255,255,0.95);color:#000;padding:6px 10px;border-radius:4px;font-family:'Inter';font-size:9px;font-weight:700;opacity:0;transform:translateY(10px);transition:0.4s cubic-bezier(0.16, 1, 0.3, 1);z-index:50;pointer-events:none;text-transform:uppercase;box-shadow:0 5px 15px rgba(0,0,0,0.5)}
        .part-label.show{opacity:1;transform:translateY(0)}
        .part-label small{display:block;color:#666;font-size:8px;font-weight:400}
        
        /* POSITIONS FRONT */
        #label-frontshell{top:15%;left:2%} #label-lightbar{top:15%;right:2%}
        #label-dpad{top:40%;left:0%} #label-buttons{top:40%;right:0%}
        #label-stick{bottom:20%;right:5%} #label-trigger{top:5%;right:15%}
        /* POSITIONS BACK */
        #label-backshell{top:20%;left:5%} #label-paddle{bottom:35%;right:5%}

        /* UI SECTIONS & PRESETS */
        .preset-wrap{padding:5px 4% 18px;max-width:780px;margin:0 auto}
        .preset-row{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
        .preset-btn{flex-shrink:0;padding:11px 16px;border-radius:11px;border:1.5px solid rgba(255,255,255,.06);background:rgba(255,255,255,.025);font-family:'Orbitron';font-size:9px;color:#bbb;cursor:pointer}
        .preset-btn.active{border-color:var(--neon);color:var(--neon)}

        .cfg-sections{padding:18px 4% 30px;max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
        .cfg-acc{background:rgba(12,12,16,.7);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
        .cfg-acc.open{border-color:rgba(0,242,255,.3)}
        .cfg-acc-hd{display:flex;align-items:center;gap:14px;padding:18px;cursor:pointer;font-family:'Orbitron';font-size:11px}
        .cfg-acc-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
        .cfg-acc.open .cfg-acc-body{max-height:2000px}
        
        .cfg-color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:10px;padding:15px}
        .cfg-color-item{aspect-ratio:1/1;border-radius:11px;cursor:pointer;border:2px solid rgba(255,255,255,.05);position:relative}
        .cfg-color-item.sel{border-color:var(--neon)}
        
        .cfg-opt{display:flex;align-items:center;padding:15px;background:rgba(255,255,255,0.025);border:1.5px solid rgba(255,255,255,.05);border-radius:11px;margin:0 15px 8px;cursor:pointer}
        .cfg-opt.sel{border-color:var(--neon);background:rgba(0,242,255,.06)}
        .cfg-opt-name{font-family:'Orbitron';font-size:10px;flex:1}
        .cfg-opt-price{color:var(--neon);font-size:10px}

        /* BOTTOM BAR */
        .cfg-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(4,4,8,.97);backdrop-filter:blur(28px);border-top:1px solid rgba(0,242,255,.18);padding:11px 4%;display:flex;align-items:center;justify-content:space-between}
        .cfg-total-val{font-family:'Orbitron';font-size:20px;font-weight:900}
        .cfg-add-cart{font-family:'Orbitron';font-size:10px;font-weight:900;background:var(--neon);color:#000;border:none;padding:14px 20px;border-radius:11px;cursor:pointer}

        /* LOADING */
        #cfg-loading{position:fixed;inset:0;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px}
        #cfg-loading.hidden{opacity:0;pointer-events:none;transition:0.6s}
        .cfg-loader-spinner{width:40px;height:40px;border:3px solid rgba(0,242,255,.1);border-top-color:var(--neon);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div class="aurora"><div class="ab"></div><div class="ab"></div><div class="ab"></div></div>
<div class="grid-overlay"></div>

<div id="cfg-loading">
  <div class="cfg-loader-spinner"></div>
  <div style="font-family:'Orbitron';color:var(--neon);font-size:9px;letter-spacing:2px">KONFIGURATOR LÄDT...</div>
</div>

<header class="cfg-header">
  <a href="#" class="cfg-back">← SHOP</a>
  <div class="cfg-title">PS5 ULTIMATE CONFIGURATOR</div>
  <div class="cfg-live">LIVE</div>
</header>

<div class="cfg-hero">
  <h1 class="cfg-hero-title">DESIGN YOUR CONTROLLER</h1>
</div>

<div class="ctrl-wrap">
  <div class="ctrl-toggle">
    <button id="v-front-btn" class="active" onclick="setView('front')">VORDERSEITE</button>
    <button id="v-back-btn" onclick="setView('back')">RÜCKSEITE</button>
  </div>

  <div class="ctrl-stage">
    <!-- VORDERSEITE -->
    <div class="photo-stack" id="stack-front">
      <img src="Photoroom_20260501_094506.png" class="photo-img">
      <div class="tint-layer" id="tint-front"></div>
      
      <div class="part-label" id="label-frontshell">FRONT<small>-</small></div>
      <div class="part-label" id="label-lightbar">LIGHTBAR<small>-</small></div>
      <div class="part-label" id="label-dpad">D-PAD<small>-</small></div>
      <div class="part-label" id="label-buttons">BUTTONS<small>-</small></div>
      <div class="part-label" id="label-stick">STICKS<small>-</small></div>
      <div class="part-label" id="label-trigger">TRIGGER<small>-</small></div>
    </div>

    <!-- RÜCKSEITE -->
    <div class="photo-stack" id="stack-back" style="display:none">
      <img src="Photoroom_20260501_090821.png" class="photo-img">
      <div class="tint-layer" id="tint-back"></div>
      <!-- PADDLE OVERLAY (ZYPA STYLE) -->
      <img src="paddles_4er.png" id="img-paddles" class="photo-img" style="display:none; z-index:10;">
      
      <div class="part-label" id="label-backshell">RÜCKSCHALE<small>-</small></div>
      <div class="part-label" id="label-paddle">PADDLES<small>-</small></div>
    </div>
  </div>
</div>

<div class="preset-wrap">
  <div class="preset-row" id="preset-row"></div>
</div>

<div class="cfg-sections" id="cfg-sections"></div>

<div class="cfg-bottom">
  <div class="cfg-total-val" id="total-price">79,00 €</div>
  <button class="cfg-add-cart">IN DEN WARENKORB</button>
</div>

<script>
const SHELL_COLORS=[{name:'Weiß',color:'#ffffff',p:0,def:true},{name:'Schwarz',color:'#1a1a1c',p:0},{name:'Cyan',color:'#00f2ff',p:10}];
const OPTS={
  stick:[{n:'Standard',p:0,def:true},{n:'Hall Effect',p:35},{n:'TMR',p:55}],
  trigger:[{n:'Adaptive',p:0,def:true},{n:'Smart Clicky',p:25}],
  paddle:[{n:'Keine',p:0,def:true},{n:'2× Paddles',p:39},{n:'4× Paddles',p:59}]
};

let state={ colors:{}, options:{} };
let labelTimer;

function buildSections(){
    const root=document.getElementById('cfg-sections');
    // Farben
    const cats=[{id:'frontshell',name:'VORDERSEITE',view:'front'},{id:'backshell',name:'RÜCKSCHALE',view:'back'}];
    cats.forEach(cat=>{
        const acc=document.createElement('div');
        acc.className='cfg-acc';
        acc.innerHTML=`<div class="cfg-acc-hd" onclick="toggleAcc(this,'${cat.view}')">${cat.name}</div><div class="cfg-acc-body"><div class="cfg-color-grid" id="grid-${cat.id}"></div></div>`;
        root.appendChild(acc);
        SHELL_COLORS.forEach(c=>{
            const i=document.createElement('div');
            i.className='cfg-color-item'; i.style.background=c.color;
            i.onclick=()=>updateColor(cat.id,c,cat.view);
            acc.querySelector('.cfg-color-grid').appendChild(i);
        });
    });
    // Optionen
    Object.keys(OPTS).forEach(key=>{
        const acc=document.createElement('div');
        acc.className='cfg-acc';
        acc.innerHTML=`<div class="cfg-acc-hd" onclick="toggleAcc(this,'${key==='paddle'?'back':'front'}')">${key.toUpperCase()}</div><div class="cfg-acc-body" id="opt-${key}"></div>`;
        root.appendChild(acc);
        OPTS[key].forEach(o=>{
            const div=document.createElement('div');
            div.className='cfg-opt';
            div.innerHTML=`<span class="cfg-opt-name">${o.n}</span><span class="cfg-opt-price">+${o.p}€</span>`;
            div.onclick=()=>updateOpt(key,o,key==='paddle'?'back':'front');
            acc.querySelector('.cfg-acc-body').appendChild(div);
        });
    });
}

function toggleAcc(el,view){
    document.querySelectorAll('.cfg-acc').forEach(a=>a.classList.remove('open'));
    el.parentElement.classList.add('open');
    setView(view);
}

function updateColor(id,c,view){
    state.colors[id]=c;
    const t=document.getElementById('tint-'+id);
    if(t){ t.style.background=c.color; t.classList.toggle('active',c.color!=='#ffffff'); }
    showLabel(id,c.name);
    updatePrice();
}

function updateOpt(id,o,view){
    state.options[id]=o;
    if(id==='paddle'){
        document.getElementById('img-paddles').style.display = o.n.includes('4×') ? 'block' : 'none';
        setView('back');
    }
    showLabel(id,o.n);
    updatePrice();
}

function showLabel(id,val){
    document.querySelectorAll('.part-label').forEach(l=>l.classList.remove('show'));
    const l=document.getElementById('label-'+id);
    if(l){
        l.querySelector('small').innerText=val;
        l.classList.add('show');
        clearTimeout(labelTimer);
        labelTimer=setTimeout(()=>l.classList.remove('show'),3000);
    }
}

function setView(v){
    document.getElementById('stack-front').style.display=v==='front'?'flex':'none';
    document.getElementById('stack-back').style.display=v==='back'?'flex':'none';
    document.getElementById('v-front-btn').classList.toggle('active',v==='front');
    document.getElementById('v-back-btn').classList.toggle('active',v==='back');
}

function updatePrice(){
    let p=79;
    Object.values(state.colors).forEach(c=>p+=c.p);
    Object.values(state.options).forEach(o=>p+=o.p);
    document.getElementById('total-price').innerText=p.toFixed(2).replace('.',',')+' €';
}

window.onload=()=>{
    buildSections();
    setTimeout(()=>document.getElementById('cfg-loading').classList.add('hidden'),800);
};
</script>
</body>
</html>
