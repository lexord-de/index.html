<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
<title>PS5 Controller Konfigurator | LEXORD®</title>
<!-- Hier bleibt dein gesamter CSS-Teil exakt gleich -->
<style>
/* ... Dein originales CSS ... */
.ctrl-stage { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; }
.ctrl-stage img { position: absolute; width: 100%; height: auto; z-index: 1; pointer-events: none; }
.ctrl-svg { position: relative; z-index: 2; width: 100%; height: 100%; }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Dein gesamter HTML-Body bleibt gleich, nur hier im ctrl-stage Bereich kommen die Bilder rein -->
<div class="ctrl-stage">
    <!-- DIE NEUEN BILDER -->
    <img id="real-front" src="VorderseiteIMG_0611.jpeg" alt="Front">
    <img id="real-back" src="Photoroom_20260501_090821.png" alt="Back" class="hidden">

    <!-- DEINE ORIGINALEN SVGS (unverändert) -->
    <svg id="svg-front" class="ctrl-svg" ... > <!-- Dein SVG Content --> </svg>
    <svg id="svg-back" class="ctrl-svg hidden" ... > <!-- Dein SVG Content --> </svg>
</div>

<!-- Der Script-Teil: Nur die setView Funktion wurde minimal um die Bild-Umschaltung ergänzt -->
<script>
function setView(view) {
    // Dein originaler Haptic/Button-Code
    haptic(20);
    document.querySelectorAll('.ctrl-toggle button').forEach(b => b.classList.remove('active'));

    const fSvg = document.getElementById('svg-front');
    const bSvg = document.getElementById('svg-back');
    const fImg = document.getElementById('real-front'); // Bild-Referenz
    const bImg = document.getElementById('real-back');  // Bild-Referenz

    if (view === 'front') {
        document.getElementById('view-front-btn').classList.add('active');
        fSvg.classList.remove('hidden');
        fImg.classList.remove('hidden'); // Bild anzeigen
        bSvg.classList.add('hidden');
        bImg.classList.add('hidden');    // Bild ausblenden
    } else {
        document.getElementById('view-back-btn').classList.add('active');
        fSvg.classList.add('hidden');
        fImg.classList.add('hidden');    // Bild ausblenden
        bSvg.classList.remove('hidden');
        bImg.classList.remove('hidden'); // Bild anzeigen
    }
}

// REST DEINES ORIGINALEN CODES (Price-Calc, Accordeons, etc.) BLEIBT UNBERÜHRT
</script>
</body>
</html>
