<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
    <title>PS5 Konfigurator | LEXORD®</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --neon2: #bc13fe;
            --bg: #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; padding-bottom: 100px; }

        /* 1. STAGE & TINT (Präzise auf Controller begrenzt) */
        .ctrl-wrap { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .ctrl-stage { position: relative; width: 100%; max-width: 500px; aspect-ratio: 1/1; }
        
        .photo-stack { 
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; 
            transition: opacity 0.4s ease;
        }
        
        .photo-stack img { width: 100%; height: 100%; object-fit: contain; z-index: 1; }

        /* Punkt 4: Stärkere Tints (.7 Opacity) & Nur Controller-Fläche */
        .tint-layer {
            position: absolute; inset: 0; z-index: 2; mix-blend-mode: multiply;
            pointer-events: none; opacity: 0; transition: 0.3s;
            /* Clip-Path sorgt dafür, dass NUR der Controller gefärbt wird, nicht der Hintergrund */
            clip-path: polygon(15% 30%, 30% 15%, 50% 10%, 70% 15%, 85% 30%, 90% 50%, 85% 80%, 70% 90%, 50% 85%, 30% 90%, 15% 80%, 10% 50%);
        }
        .tint-layer.active { opacity: 0.7; }

        /* Punkt 6: Größere Tap-Targets & Accordion Styling */
        .cfg-acc { background: #0a0a0c; border: 1px solid #1a1a1e; border-radius: 12px; margin: 10px auto; max-width: 800px; overflow: hidden; }
        .cfg-acc-hd { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 11px; align-items: center; }
        .cfg-acc-body { max-height: 0; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .cfg-acc.open .cfg-acc-body { max-height: 1000px; }
        
        .cfg-color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; padding: 15px; }
        
        /* Punkt 6: Min-Height 60px für Mobile */
        .cfg-color-item { 
            height: 60px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; 
            transition: 0.2s; position: relative;
        }
        .cfg-color-item.sel { border-color: var(--neon); transform: scale(1.05); }

        /* Punkt 5: Toast Styling */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px);
            background: #000; border: 1px solid var(--neon); color: var(--neon);
            padding: 12px 20px; border-radius: 8px; font-family: 'Orbitron'; font-size: 10px;
            z-index: 1000; transition: 0.5s; box-shadow: 0 0 20px rgba(0,242,255,0.2);
        }
        #toast.show { transform: translate(-50%, 0); }

        /* Labels (Makemycon Style) */
        .part-label {
            position: absolute; background: rgba(0,0,0,0.8); border: 1px solid var(--neon);
            padding: 5px 10px; border-radius: 4px; font-family: 'Orbitron'; font-size: 8px;
            z-index: 10; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .part-label.active { opacity: 1; }

        .ctrl-toggle { display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; }
        .ctrl-toggle button { 
            background: #111; border: 1px solid #333; color: #fff; padding: 10px 20px; 
            border-radius: 8px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer;
        }
        .ctrl-toggle button.active { border-color: var(--neon); color: var(--neon); }

        #loading {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="loading">
    <div style="font-family:'Orbitron'; color:var(--neon); letter-spacing:3px;">INITIALISIERE...</div>
</div>

<div id="toast"></div>

<header style="text-align: center; padding: 20px; border-bottom: 1px solid #1a1a1e;">
    <h1 style="font-family:'Orbitron'; font-size: 14px; letter-spacing: 2px;">PS5 CUSTOMIZER</h1>
</header>

<div class="ctrl-wrap">
    <div class="ctrl-toggle">
        <button id="view-front-btn" class="active">VORDERSEITE</button>
        <button id="view-back-btn">RÜCKSEITE</button>
    </div>

    <div class="ctrl-stage">
        <div class="photo-stack" id="stack-front">
            <img src="IMG0611.jpeg" alt="Front">
            <div id="tint-front" class="tint-layer"></div>
            <div id="lbl-frontshell" class="part-label" style="top:20%; left:5%;">FRONT: <span class="val">-</span></div>
        </div>
        <div class="photo-stack" id="stack-back" style="opacity: 0; pointer-events: none;">
            <img src="Photoroom20260501_090821.png" alt="Back">
            <div id="tint-back" class="tint-layer"></div>
            <div id="lbl-backshell" class="part-label" style="top:20%; right:5%;">RÜCKSEITE: <span class="val">-</span></div>
        </div>
    </div>
</div>

<div id="cfg-container" style="padding: 0 15px;"></div>

<script>
    // Datenstrukturen
    const SHELL_COLORS = [
        {name: 'Standard Weiß', hex: '#ffffff'},
        {name: 'Midnight Black', hex: '#1a1a1c'},
        {name: 'Cosmic Red', hex: '#a81a31'},
        {name: 'Cyan Neon', hex: '#00f2ff'},
        {name: 'Galactic Purple', hex: '#6a1b9a'}
    ];

    const SECTIONS = [
        {id: 'frontshell', name: 'FRONTGEHÄUSE', view: 'front', colors: SHELL_COLORS},
        {id: 'backshell', name: 'RÜCKSCHALE', view: 'back', colors: SHELL_COLORS}
    ];

    function toast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    // Punkt 3: Auto-Switch Logik
    function setView(view) {
        const front = document.getElementById('stack-front');
        const back = document.getElementById('stack-back');
        const btnF = document.getElementById('view-front-btn');
        const btnB = document.getElementById('view-back-btn');

        if(view === 'front') {
            front.style.opacity = "1"; front.style.pointerEvents = "auto";
            back.style.opacity = "0"; back.style.pointerEvents = "none";
            btnF.classList.add('active'); btnB.classList.remove('active');
        } else {
            front.style.opacity = "0"; front.style.pointerEvents = "none";
            back.style.opacity = "1"; back.style.pointerEvents = "auto";
            btnF.classList.remove('active'); btnB.classList.add('active');
        }
    }

    function init() {
        const container = document.getElementById('cfg-container');

        SECTIONS.forEach((sec, idx) => {
            // Sektion erstellen
            const acc = document.createElement('div');
            acc.className = 'cfg-acc';
            // Punkt 2: Erste Kategorie von Anfang an offen
            if(idx === 0) acc.classList.add('open');

            acc.innerHTML = `
                <div class="cfg-acc-hd">
                    <span>${sec.name}</span>
                    <span class="sel-name" style="color:var(--neon)">Standard</span>
                </div>
                <div class="cfg-acc-body">
                    <div class="cfg-color-grid"></div>
                </div>
            `;

            const grid = acc.querySelector('.cfg-color-grid');

            sec.colors.forEach(col => {
                const item = document.createElement('div');
                item.className = 'cfg-color-item';
                item.style.backgroundColor = col.hex;

                // Punkt 1: EventListener statt onclick
                item.addEventListener('click', () => {
                    // UI selektieren
                    grid.querySelectorAll('.cfg-color-item').forEach(i => i.classList.remove('sel'));
                    item.classList.add('sel');
                    acc.querySelector('.sel-name').innerText = col.name;

                    // Punkt 3: Auto-Switch
                    setView(sec.view);

                    // Punkt 4: Tint anwenden
                    const tint = document.getElementById('tint-' + sec.view);
                    tint.style.backgroundColor = col.hex;
                    tint.classList.add('active');

                    // Label einblenden (wie makemycon)
                    const lbl = document.getElementById('lbl-' + sec.id);
                    if(lbl) {
                        lbl.classList.add('active');
                        lbl.querySelector('.val').innerText = col.name;
                    }

                    // Punkt 5: Toast Bestätigung
                    toast(`✓ ${sec.name}: ${col.name}`);
                });

                grid.appendChild(item);
            });

            // Accordion Toggle
            acc.querySelector('.cfg-acc-hd').addEventListener('click', () => {
                acc.classList.toggle('open');
            });

            container.appendChild(acc);
        });

        // View Button Events
        document.getElementById('view-front-btn').addEventListener('click', () => setView('front'));
        document.getElementById('view-back-btn').addEventListener('click', () => setView('back'));

        // Punkt 7: Failsafe Loading (nach 0.8s ausblenden, max 3s)
        setTimeout(() => {
            const loader = document.getElementById('loading');
            loader.style.opacity = "0";
            setTimeout(() => loader.style.display = "none", 500);
        }, 800);
    }

    window.onload = init;

    // Hard Failsafe
    setTimeout(() => {
        const loader = document.getElementById('loading');
        if(loader) loader.style.display = "none";
    }, 3000);
</script>

</body>
</html>
