<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
    <title>LEXORD® PS5 Pro Konfigurator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --neon2: #bc13fe; --bg: #000; --panel: rgba(15,15,20,0.8); }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; padding-bottom: 120px; }

        /* AURORA HINTERGRUND */
        .aurora { position: fixed; inset: 0; z-index: -2; background: #000; overflow: hidden; }
        .ab { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: move 20s infinite alternate; }
        .ab1 { width: 60%; height: 60%; background: radial-gradient(circle, var(--neon), transparent); top: -10%; left: -10%; }
        .ab2 { width: 50%; height: 50%; background: radial-gradient(circle, var(--neon2), transparent); bottom: -10%; right: -10%; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(10%, 10%); } }

        /* HEADER */
        header { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); padding: 15px 5%; border-bottom: 1px solid rgba(0,242,255,0.2); display: flex; align-items: center; justify-content: space-between; }
        .logo { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 2px; font-size: 14px; }

        /* STAGE & CONTROLLER */
        .stage { position: relative; width: 100%; max-width: 500px; margin: 20px auto; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
        
        .controller-wrap { position: relative; width: 100%; height: 100%; }
        .base-img { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 1; }

        /* DIE FARB-EBENE (EXAKTER UMRISS) */
        .color-layer {
            position: absolute; inset: 0; z-index: 2;
            pointer-events: none;
            mix-blend-mode: color; /* Erhält Texturen, ändert nur die Farbe */
            opacity: 0; transition: 0.4s;
            /* Hier wird dein Bild als Maske genutzt */
            -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
        }
        .color-layer.active { opacity: 1; }

        /* KNÖPFE (PRÄZISIONS-SPOTS) */
        .spot { position: absolute; z-index: 3; pointer-events: none; mix-blend-mode: color; opacity: 0; border-radius: 50%; filter: blur(1px); }
        .spot.active { opacity: 1; }

        /* UI */
        .config-area { max-width: 600px; margin: 0 auto; padding: 0 20px; }
        .acc { background: var(--panel); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 10px; }
        .acc-head { padding: 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; display: flex; justify-content: space-between; }
        .acc-body { display: none; padding: 15px; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; }
        .acc.open .acc-body { display: grid; }

        .color-dot { aspect-ratio: 1; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
        .color-dot.selected { border-color: var(--neon); transform: scale(1.1); }

        /* FOOTER */
        .footer { position: fixed; bottom: 0; width: 100%; background: #050505; padding: 20px; border-top: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .price { font-family: 'Orbitron'; font-size: 20px; color: var(--neon); }
        .btn-buy { background: var(--neon); color: #000; padding: 12px 25px; border: none; border-radius: 5px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; }
    </style>
</head>
<body>

<div class="aurora"><div class="ab ab1"></div><div class="ab ab2"></div></div>

<header><div class="logo">LEXORD®</div></header>

<div class="stage">
    <div class="controller-wrap">
        <!-- FRONT ANSICHT -->
        <div id="view-front">
            <img src="Photoroom_20260501_094506.png" class="base-img" id="img-f">
            <!-- Maske für das Gehäuse -->
            <div id="mask-f" class="color-layer" style="-webkit-mask-image: url('Photoroom_20260501_094506.png');"></div>
            
            <!-- Button Spots (Positionen müssen einmalig feinjustiert werden) -->
            <div class="spot" id="s-tri" style="top:33%; left:78%; width:6%; height:6%;"></div>
            <div class="spot" id="s-cir" style="top:42%; left:85%; width:6%; height:6%;"></div>
            <div class="spot" id="s-cro" style="top:51%; left:78%; width:6%; height:6%;"></div>
            <div class="spot" id="s-squ" style="top:42%; left:71%; width:6%; height:6%;"></div>
        </div>
    </div>
</div>

<div class="config-area" id="ui">
    <!-- Wird per JS befüllt -->
</div>

<div class="footer">
    <div class="price" id="total">79,00 €</div>
    <button class="btn-buy" onclick="addToCart()">WARENKORB</button>
</div>

<script>
    const COLORS = [
        { name: 'Standard', hex: 'transparent', p: 0 },
        { name: 'Stealth Black', hex: '#151517', p: 0 },
        { name: 'Electric Cyan', hex: '#00f2ff', p: 10 },
        { name: 'Lava Red', hex: '#ff2e2e', p: 10 },
        { name: 'Royal Purple', hex: '#bc13fe', p: 10 }
    ];

    const CONFIG = [
        { id: 'shell', name: 'GEHÄUSE', target: 'mask-f', items: COLORS },
        { id: 'btns', name: 'BUTTONS', target: 'spots', items: COLORS }
    ];

    let selection = { shell: 0, btns: 0 };

    function renderUI() {
        const container = document.getElementById('ui');
        CONFIG.forEach(cat => {
            const acc = document.createElement('div');
            acc.className = 'acc';
            acc.innerHTML = `<div class="acc-head" onclick="this.parentElement.classList.toggle('open')">${cat.name} <span>+</span></div>`;
            
            const body = document.createElement('div');
            body.className = 'acc-body';
            
            cat.items.forEach((c, idx) => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.backgroundColor = c.hex === 'transparent' ? '#fff' : c.hex;
                dot.onclick = () => select(cat, c, idx, dot);
                body.appendChild(dot);
            });
            
            acc.appendChild(body);
            container.appendChild(acc);
        });
    }

    function select(cat, color, idx, el) {
        // UI Update
        el.parentElement.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        el.classList.add('selected');

        // Visual Update
        if (cat.target === 'mask-f') {
            const mask = document.getElementById('mask-f');
            if (color.hex === 'transparent') mask.classList.remove('active');
            else {
                mask.style.backgroundColor = color.hex;
                mask.classList.add('active');
            }
        } else if (cat.target === 'spots') {
            const ids = ['s-tri', 's-cir', 's-cro', 's-squ'];
            ids.forEach(id => {
                const s = document.getElementById(id);
                if (color.hex === 'transparent') s.classList.remove('active');
                else {
                    s.style.backgroundColor = color.hex;
                    s.classList.add('active');
                }
            });
        }
        
        selection[cat.id] = color.p;
        updatePrice();
    }

    function updatePrice() {
        let total = 79;
        Object.values(selection).forEach(v => total += v);
        document.getElementById('total').innerText = total.toFixed(2).replace('.', ',') + ' €';
    }

    function addToCart() {
        localStorage.setItem('lxrd_config', JSON.stringify({
            selection: selection,
            total: document.getElementById('total').innerText
        }));
        alert('Im Warenkorb gespeichert!');
        window.location.href = 'index.html';
    }

    renderUI();
</script>
</body>
</html>
