<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
<title>PS5 Controller Konfigurator | LEXORD®</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --neon:#00f2ff;--neon-dim:rgba(0,242,255,.12);
  --purple:#bc13fe;--green:#00b67a;--err:#ff4d4f;
  --bg:#020207;--card:rgba(12,12,16,.7);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:#e8e8ec;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:100px;overflow-x:hidden}

/* AURORA BG */
.aurora{position:fixed;inset:0;z-index:-3;background:linear-gradient(180deg,#020207,#04040a);overflow:hidden}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.5;animation:auroraFloat 25s ease-in-out infinite}
.aurora-blob:nth-child(1){width:55%;height:55%;background:radial-gradient(circle,rgba(0,242,255,.45),transparent 70%);top:-10%;left:-10%}
@keyframes auroraFloat{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(15%,-10%) scale(1.1)}}
.grid-overlay{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(0,242,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}

/* HEADER */
.cfg-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 5%;background:rgba(2,2,4,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,242,255,.12)}
.cfg-back{display:inline-flex;align-items:center;gap:7px;font-family:'Orbitron';font-size:9px;letter-spacing:2px;font-weight:700;color:#aaa;text-decoration:none;padding:9px 14px;border:1px solid #1a1a1e;border-radius:10px;background:rgba(10,10,12,.6)}
.cfg-title{font-family:'Orbitron';font-weight:900;font-size:11px;letter-spacing:3px;color:#ddd;text-align:center;flex:1}
.cfg-title-dot{color:var(--neon)}

/* CONTROLLER STAGE */
.ctrl-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 5% 30px;position:relative}
.ctrl-toggle{display:flex;gap:6px;margin-bottom:18px;background:rgba(12,12,14,.7);padding:4px;border-radius:11px;border:1px solid rgba(255,255,255,.06);z-index:10}
.ctrl-toggle button{font-family:'Orbitron';font-size:9px;letter-spacing:1.5px;font-weight:700;background:transparent;border:none;color:#888;padding:9px 16px;border-radius:8px;cursor:pointer;transition:.25s}
.ctrl-toggle button.active{background:linear-gradient(135deg,rgba(0,242,255,.18),rgba(0,242,255,.08));color:var(--neon);box-shadow:0 0 12px rgba(0,242,255,.2)}

.ctrl-stage{position:relative;width:100%;max-width:560px;aspect-ratio:1.15/1;display:flex;align-items:center;justify-content:center}
.ctrl-stage img {
    position: absolute;
    width: 100%;
    height: auto;
    object-fit: contain;
    z-index: 1;
    pointer-events: none;
}
.ctrl-svg{width:100%;height:100%;position:relative;z-index:2;filter:drop-shadow(0 15px 30px rgba(0,0,0,0.5))}

/* Accordions & UI */
.cfg-sections{padding:18px 5%;max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.cfg-acc{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden;backdrop-filter:blur(10px)}
.cfg-acc-hd{display:flex;align-items:center;gap:14px;padding:18px;cursor:pointer;font-family:'Orbitron';font-size:11px;font-weight:700}
.cfg-acc-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.cfg-acc.open .cfg-acc-body{max-height:1000px}
.cfg-acc-content{padding:0 18px 20px}

/* Color Grid */
.cfg-color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:10px}
.cfg-color-item{aspect-ratio:1/1;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.1);transition:.2s}
.cfg-color-item.sel{border-color:var(--neon);transform:scale(1.1);box-shadow:0 0 10px var(--neon)}

/* Bottom Bar */
.cfg-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(4,4,8,.96);padding:15px 5%;display:flex;align-items:center;gap:12px;border-top:1px solid var(--neon-dim)}
.cfg-add-cart{font-family:'Orbitron';background:linear-gradient(135deg,var(--neon),#00bdd6);border:none;padding:14px 25px;border-radius:11px;font-weight:900;cursor:pointer}

#cfg-loading{position:fixed;inset:0;background:#020207;z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px}
.hidden{display:none !important}
</style>
</head>
<body>

<div class="aurora"><div class="aurora-blob"></div></div>
<div class="grid-overlay"></div>

<div id="cfg-loading">
  <div style="width:40px;height:40px;border:3px solid var(--neon-dim);border-top-color:var(--neon);border-radius:50%;animation:spin 1s linear infinite"></div>
  <div style="font-family:'Orbitron';font-size:10px;color:var(--neon)">LÄDT...</div>
</div>

<header class="cfg-header">
  <a href="#" class="cfg-back">ZURÜCK</a>
  <div class="cfg-title">PS5<span class="cfg-title-dot"> · </span>KONFIGURATOR</div>
</header>

<div class="ctrl-wrap">
  <div class="ctrl-toggle">
    <button class="active" id="view-front-btn" onclick="setView('front')">VORDERSEITE</button>
    <button id="view-back-btn" onclick="setView('back')">RÜCKSEITE</button>
  </div>

  <div class="ctrl-stage">
    <!-- ECHTE BILDER -->
    <img id="img-front" src="VorderseiteIMG_0611.jpeg" alt="Front">
    <img id="img-back" src="Photoroom_20260501_090821.png" alt="Back" class="hidden">

    <!-- FRONT SVG OVERLAY -->
    <svg id="svg-front" class="ctrl-svg" viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="frontShellGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff" id="grad-frontshell-1"/>
            <stop offset="100%" stop-color="#e0e0e3" id="grad-frontshell-2"/>
          </linearGradient>
        </defs>
        <!-- Wir nutzen fill-opacity, damit man das echte Foto darunter sieht -->
        <path id="shape-frontshell" d="M 90 130 Q 90 90 130 80 L 230 70 Q 280 65 300 80 Q 320 65 370 70 L 470 80 Q 510 90 510 130 L 510 220 Q 510 280 460 330 L 420 365 Q 380 395 340 380 L 320 370 Q 300 360 280 370 L 260 380 Q 220 395 180 365 L 140 330 Q 90 280 90 220 Z" 
        fill="url(#frontShellGrad)" fill-opacity="0.4" stroke="rgba(0,242,255,0.2)" stroke-width="1"/>
        
        <!-- Sticks (Beispiel) -->
        <circle id="stickcap-l" cx="225" cy="265" r="22" fill="#0a0a0c" fill-opacity="0.5"/>
        <circle id="stickcap-r" cx="375" cy="265" r="22" fill="#0a0a0c" fill-opacity="0.5"/>
    </svg>

    <!-- BACK SVG OVERLAY -->
    <svg id="svg-back" class="ctrl-svg hidden" viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
        <path id="shape-back-main" d="M 90 130 Q 90 90 130 80 L 230 70 Q 280 65 300 80 Q 320 65 370 70 L 470 80 Q 510 90 510 130 L 510 220 Q 510 280 460 330 L 420 365 Q 380 395 340 380 L 320 370 Q 300 360 280 370 L 260 380 Q 220 395 180 365 L 140 330 Q 90 280 90 220 Z" 
        fill="#ffffff" fill-opacity="0.4" />
    </svg>
  </div>
</div>

<div class="cfg-sections">
  <div class="cfg-acc open">
    <div class="cfg-acc-hd" onclick="toggleAcc(this)">🎨 FRONTGEHÄUSE</div>
    <div class="cfg-acc-body">
      <div class="cfg-acc-content">
        <div class="cfg-color-grid" id="grid-frontshell"></div>
      </div>
    </div>
  </div>
</div>

<div class="cfg-bottom">
  <div style="flex:1">
    <div style="font-size:10px;color:#666">SUMME</div>
    <div id="total-price" style="font-family:'Orbitron';font-weight:900;font-size:20px">79,00 €</div>
  </div>
  <button class="cfg-add-cart">WARENKORB</button>
</div>

<script>
const COLORS = [
  {name:'Weiß', color:'#ffffff'},
  {name:'Schwarz', color:'#1a1a1c'},
  {name:'Cyan', color:'#00f2ff'},
  {name:'Rot', color:'#dc143c'},
  {name:'Gold', color:'#d4af37'}
];

function toggleAcc(hd){
  hd.parentElement.classList.toggle('open');
}

function buildGrid(){
  const grid = document.getElementById('grid-frontshell');
  grid.innerHTML = COLORS.map(c => `
    <div class="cfg-color-item" style="background:${c.color}" onclick="selectColor('${c.color}', this)"></div>
  `).join('');
}

function selectColor(hex, el){
  document.querySelectorAll('.cfg-color-item').forEach(i=>i.classList.remove('sel'));
  el.classList.add('sel');
  
  // SVG Farbe anpassen
  document.getElementById('grad-frontshell-1').setAttribute('stop-color', hex);
  document.getElementById('grad-frontshell-2').setAttribute('stop-color', hex);
  document.getElementById('shape-back-main').setAttribute('fill', hex);
}

function setView(view){
  const isFront = view === 'front';
  document.getElementById('view-front-btn').classList.toggle('active', isFront);
  document.getElementById('view-back-btn').classList.toggle('active', !isFront);
  
  document.getElementById('img-front').classList.toggle('hidden', !isFront);
  document.getElementById('svg-front').classList.toggle('hidden', !isFront);
  
  document.getElementById('img-back').classList.toggle('hidden', isFront);
  document.getElementById('svg-back').classList.toggle('hidden', isFront);
}

window.onload = () => {
  buildGrid();
  setTimeout(() => document.getElementById('cfg-loading').classList.add('hidden'), 800);
};

@keyframes spin { to { transform: rotate(360deg); } }
</script>

</body>
</html>
