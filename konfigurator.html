<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
<title>PS5 Konfigurator | LEXORD®</title>
<link rel="icon" type="image/png" href="IMG_7023.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--neon:#00f2ff;--neon2:#bc13fe;--green:#00b67a;--err:#ff4d4f}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:120px}

/* AURORA BACKGROUND */
.aurora{position:fixed;inset:0;z-index:-3;background:#000;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:.4;animation:af 25s ease-in-out infinite}
.ab:nth-child(1){width:55%;height:55%;background:radial-gradient(circle,rgba(0,242,255,.5),transparent 70%);top:-10%;left:-10%}
.ab:nth-child(2){width:50%;height:50%;background:radial-gradient(circle,rgba(188,19,254,.4),transparent 70%);bottom:-10%;right:-10%;animation-delay:-8s}
.ab:nth-child(3){width:40%;height:40%;background:radial-gradient(circle,rgba(255,46,110,.25),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-15s}
@keyframes af{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(15%,-10%) scale(1.1)}}
.grid-overlay{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(0,242,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}

/* HEADER */
.cfg-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:10px 4%;background:rgba(0,0,0,.92);backdrop-filter:blur(22px);border-bottom:1px solid rgba(0,242,255,.15)}
.cfg-back{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron';font-size:9px;letter-spacing:1.5px;font-weight:700;color:#aaa;text-decoration:none;padding:9px 12px;border:1px solid #1a1a1e;border-radius:8px;background:rgba(10,10,12,.7)}
.cfg-back:active{color:var(--neon);border-color:var(--neon)}
.cfg-title{font-family:'Orbitron';font-weight:900;font-size:10px;letter-spacing:2px;color:#ddd;text-align:center;flex:1}
.cfg-live{font-family:'Orbitron';font-size:8px;letter-spacing:1.5px;color:var(--neon);background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.25);padding:6px 10px;border-radius:7px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.cfg-live::before{content:'';width:5px;height:5px;background:var(--neon);border-radius:50%;animation:ldot 1.5s infinite;box-shadow:0 0 8px var(--neon)}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.3}}

/* HERO */
.cfg-hero{text-align:center;padding:25px 5% 15px}
.cfg-hero-eyebrow{display:inline-block;padding:5px 12px;background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.25);border-radius:20px;font-family:'Orbitron';font-size:8px;color:var(--neon);letter-spacing:2px;margin-bottom:12px}
.cfg-hero-title{font-family:'Orbitron';font-weight:900;font-size:clamp(1.3rem,5vw,2.2rem);letter-spacing:-1px;line-height:1.1;margin-bottom:8px;background:linear-gradient(180deg,#fff,rgba(255,255,255,.5));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.cfg-hero-sub{font-family:'Orbitron';font-size:9px;letter-spacing:2px;color:#666}

/* TOGGLE & STAGE */
.ctrl-wrap{display:flex;flex-direction:column;align-items:center;padding:5px 4% 20px}
.ctrl-toggle{display:flex;gap:6px;margin-bottom:14px;background:rgba(12,12,14,.7);padding:4px;border-radius:11px;border:1px solid rgba(255,255,255,.06)}
.ctrl-toggle button{font-family:'Orbitron';font-size:9.5px;letter-spacing:1.5px;font-weight:700;background:transparent;border:none;color:#888;padding:10px 18px;border-radius:8px;cursor:pointer;transition:.25s}
.ctrl-toggle button.active{background:linear-gradient(135deg,rgba(0,242,255,.2),rgba(0,242,255,.08));color:var(--neon);box-shadow:0 0 12px rgba(0,242,255,.2)}

.ctrl-stage{position:relative;width:100%;max-width:540px;aspect-ratio:1.05/1}
.photo-stack{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;animation:floatY 5s ease-in-out infinite}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.photo-img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 25px 45px rgba(0,242,255,.18));position:absolute;inset:0;z-index:1}

/* TINTING & MASKING */
.tint-layer{position:absolute;inset:0;z-index:2;opacity:0;transition:opacity .4s ease;pointer-events:none;mix-blend-mode:multiply;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center}
.tint-layer.active{opacity:.85}
#tint-front{-webkit-mask-image:url('Photoroom_20260501_094506.png');mask-image:url('Photoroom_20260501_094506.png')}
#tint-back{-webkit-mask-image:url('Photoroom_20260501_090821.png');mask-image:url('Photoroom_20260501_090821.png')}

/* LIGHTBAR & ENGRAVE */
#lightbar-glow{position:absolute;top:42%;left:50%;transform:translateX(-50%);width:22%;height:5px;border-radius:5px;background:#4a90e2;filter:blur(5px);opacity:0;transition:.4s;z-index:5}
#lightbar-glow.on{opacity:.95;box-shadow:0 0 20px 7px currentColor}
.engrave-txt{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron';font-weight:900;font-size:clamp(11px,2.2vw,15px);letter-spacing:2px;z-index:6;opacity:0;transition:.3s;text-shadow:0 1px 2px rgba(0,0,0,.5);white-space:nowrap}
.engrave-txt.show{opacity:.95}

/* LABELS */
.part-label{position:absolute;background:rgba(8,8,12,.97);border:1px solid rgba(0,242,255,.5);color:#fff;padding:7px 11px;border-radius:9px;font-family:'Orbitron';font-size:8px;font-weight:800;opacity:0;transform:scale(.85);transition:.35s;z-index:7;pointer-events:none}
.part-label.show{opacity:1;transform:scale(1)}
.part-label small{display:block;color:var(--neon);font-size:9.5px;font-weight:700;margin-top:3px}

/* ACCORDIONS & GRIDS (Restliche UI-Stile übernommen aus deinem Code) */
.cfg-sections{padding:18px 4% 30px;max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.cfg-acc{background:rgba(12,12,16,.7);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
.cfg-acc.open{border-color:rgba(0,242,255,.3)}
.cfg-acc-hd{display:flex;align-items:center;gap:14px;padding:18px;cursor:pointer;font-family:'Orbitron';font-size:11px;font-weight:700}
.cfg-color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:10px;padding:15px}
.cfg-color-item{aspect-ratio:1/1;border-radius:11px;cursor:pointer;border:2px solid rgba(255,255,255,.05);position:relative}
.cfg-color-item.sel{border-color:var(--neon);transform:scale(1.05)}

/* PRESETS */
.preset-wrap{padding:15px 4%;max-width:780px;margin:0 auto}
.preset-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.preset-btn{flex-shrink:0;padding:10px 15px;background:rgba(255,255,255,.025);border:1.5px solid rgba(255,255,255,0.06);border-radius:10px;color:#bbb;font-family:'Orbitron';font-size:9px;cursor:pointer}
.preset-btn.active{border-color:var(--neon);color:var(--neon)}

/* BOTTOM BAR */
.cfg-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(4,4,8,.97);backdrop-filter:blur(28px);border-top:1px solid rgba(0,242,255,0.18);padding:11px 4%;display:flex;align-items:center;gap:10px}
.cfg-bottom-price{flex:1}
.cfg-bottom-price-lbl{font-family:'Orbitron';font-size:7.5px;color:#666}
.cfg-bottom-price-val{font-family:'Orbitron';font-size:20px;font-weight:900}
.cfg-bottom-price-val span{color:var(--neon)}
.cfg-add-cart{font-family:'Orbitron';font-size:10px;letter-spacing:1px;font-weight:900;color:#000;background:linear-gradient(135deg,var(--neon),#00bdd6);border:none;padding:14px 20px;border-radius:11px;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 6px 20px rgba(0,242,255,.45)}

/* TOAST & LOADING */
#toast{position:fixed;top:75px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:1000;background:#06060a;border:1px solid var(--neon);padding:13px 18px;border-radius:12px;color:var(--neon);transition:.4s}
#toast.show{transform:translateX(-50%) translateY(0)}
#cfg-loading{position:fixed;inset:0;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center;transition:opacity .6s}
#cfg-loading.hidden{opacity:0;pointer-events:none}
</style>
</head>
<body>

<div class="aurora"><div class="ab"></div><div class="ab"></div><div class="ab"></div></div>
<div class="grid-overlay"></div>

<div id="cfg-loading">
  <div style="font-family:'Orbitron'; color:var(--neon);">⟫ LÄDT... ⟪</div>
</div>

<header class="cfg-header">
  <a href="index.html" class="cfg-back">
    <!-- DEIN SVG ICON 1 (ZURÜCK) -->
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    ZURÜCK
  </a>
  <div class="cfg-title">PS5 KONFIGURATOR</div>
  <div class="cfg-live">LIVE</div>
</header>

<div class="cfg-hero">
  <div class="cfg-hero-eyebrow">⟫ MADE IN GERMANY ⟪</div>
  <h1 class="cfg-hero-title">BAUE DEINEN PERFEKTEN CONTROLLER</h1>
</div>

<div class="ctrl-wrap">
  <div class="ctrl-toggle">
    <button id="view-front-btn" class="active" data-view="front">VORDERSEITE</button>
    <button id="view-back-btn" data-view="back">RÜCKSEITE</button>
  </div>

  <div class="ctrl-stage">
    <div class="photo-stack" id="stack-front">
      <img src="Photoroom_20260501_094506.png" class="photo-img" id="img-front" onerror="this.src='IMG_0562.jpeg'">
      <div class="tint-layer" id="tint-front"></div>
      <div id="lightbar-glow"></div>
      <div class="engrave-txt" id="engrave-front"></div>
    </div>

    <div class="photo-stack" id="stack-back" style="display:none">
      <img src="Photoroom_20260501_090821.png" class="photo-img" id="img-back" onerror="this.src='IMG_0562.jpeg'">
      <div class="tint-layer" id="tint-back"></div>
      <div class="engrave-txt" id="engrave-back"></div>
    </div>

    <!-- LABELS -->
    <div class="part-label" id="label-frontshell" style="top:10%;left:5%" data-side="front">FRONT<small>–</small></div>
    <div class="part-label" id="label-lightbar" style="top:10%;right:5%" data-side="front">LIGHTBAR<small>–</small></div>
    <!-- ... weitere Labels hier möglich ... -->
  </div>
</div>

<div class="preset-wrap">
  <div class="preset-row" id="preset-row"></div>
</div>

<div class="cfg-sections" id="cfg-sections"></div>

<div class="cfg-bottom">
  <div class="cfg-bottom-price">
    <div class="cfg-bottom-price-lbl">⟫ DEIN PREIS</div>
    <div class="cfg-bottom-price-val">ab <span id="total-price">79,00 €</span></div>
  </div>
  <button class="cfg-add-cart" id="add-cart-btn">
    <!-- DEIN SVG ICON 2 (WARENKORB) -->
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    IN DEN WARENKORB
  </button>
</div>

<div id="toast"></div>

<script>
// DATEN-STRUKTUREN (Farben & Optionen)
const SHELL_COLORS=[{name:'Weiß',color:'#ffffff',premium:0,def:true},{name:'Schwarz',color:'#1a1a1c',premium:0},{name:'Mitternacht',color:'#0a1633',premium:8}];
const LB_COLORS=[{name:'Blau',color:'#4a90e2',premium:0,def:true},{name:'Cyan',color:'#00f2ff',premium:5}];
const CATS=[
    {id:'frontshell',icon:'🎨',name:'FRONTGEHÄUSE',colors:SHELL_COLORS,view:'front'},
    {id:'lightbar',icon:'💡',name:'LIGHT BAR',colors:LB_COLORS,view:'front'}
];

let state={
    colors:{frontshell:null,lightbar:null},
    options:{},
    engraving:''
};

// INITIALISIERUNG
function init(){
    const sections = document.getElementById('cfg-sections');
    CATS.forEach(cat => {
        const acc = document.createElement('div');
        acc.className = 'cfg-acc';
        acc.innerHTML = `<div class="cfg-acc-hd">${cat.icon} ${cat.name}</div><div class="cfg-acc-body"><div class="cfg-color-grid"></div></div>`;
        const grid = acc.querySelector('.cfg-color-grid');
        cat.colors.forEach(c => {
            const item = document.createElement('div');
            item.className = 'cfg-color-item';
            item.style.background = c.color;
            item.onclick = () => selectColor(cat.id, c);
            grid.appendChild(item);
            if(c.def) state.colors[cat.id] = c;
        });
        sections.appendChild(acc);
    });

    document.getElementById('view-front-btn').onclick = () => setView('front');
    document.getElementById('view-back-btn').onclick = () => setView('back');
    
    setTimeout(() => document.getElementById('cfg-loading').classList.add('hidden'), 500);
    updatePrice();
    applyTints();
}

function selectColor(catId, colorObj){
    state.colors[catId] = colorObj;
    applyTints();
    updatePrice();
    toast("Farbe gewählt: " + colorObj.name);
}

function applyTints(){
    const fs = state.colors.frontshell;
    if(fs){
        const tint = document.getElementById('tint-front');
        tint.style.background = fs.color;
        tint.classList.add('active');
        document.getElementById('label-frontshell').querySelector('small').innerText = fs.name;
        document.getElementById('label-frontshell').classList.add('show');
    }
}

function setView(v){
    document.getElementById('stack-front').style.display = v === 'front' ? 'flex' : 'none';
    document.getElementById('stack-back').style.display = v === 'back' ? 'flex' : 'none';
    document.getElementById('view-front-btn').classList.toggle('active', v==='front');
    document.getElementById('view-back-btn').classList.toggle('active', v==='back');
}

function updatePrice(){
    let p = 79;
    Object.values(state.colors).forEach(c => { if(c) p += (c.premium || 0); });
    document.getElementById('total-price').innerText = p.toFixed(2).replace('.',',') + " €";
}

function toast(m){
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

window.onload = init;
</script>

</body>
</html>
