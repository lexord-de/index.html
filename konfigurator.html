<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
    <title>LEXORD® PRO CANVAS</title>
    <style>
        :root{--neon:#00f2ff;--bg:#050505}
        body{background:var(--bg);color:#fff;font-family:'Orbitron',sans-serif;margin:0;overflow-x:hidden;padding-bottom:120px}
        
        .stage-container{display:flex;flex-direction:column;align-items:center;padding:20px}
        
        /* Der Master-Canvas */
        #mainCanvas{
            width:100%;max-width:650px;aspect-ratio:1/1;
            filter:drop-shadow(0 0 30px rgba(0,242,255,0.15));
            image-rendering: -webkit-optimize-contrast; /* Schärfe-Boost */
        }

        .view-toggle{display:flex;gap:15px;margin:20px 0}
        .view-toggle button{
            background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
            color:#fff;padding:12px 25px;cursor:pointer;border-radius:5px;font-family:'Orbitron'
        }
        .view-toggle button.active{background:var(--neon);color:#000;border-color:var(--neon);box-shadow:0 0 20px var(--neon)}

        /* UI Styling */
        .controls{max-width:800px;margin:0 auto;padding:20px}
        .category{background:#111;border:1px solid #222;border-radius:10px;margin-bottom:10px;overflow:hidden}
        .category-header{padding:15px;cursor:pointer;display:flex;justify-content:space-between;border-bottom:1px solid #222}
        .color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(45px,1fr));gap:10px;padding:15px}
        .color-dot{width:40px;height:40px;border-radius:50%;cursor:pointer;border:2px solid transparent}
        .color-dot.active{border-color:var(--neon);transform:scale(1.1)}

        .bottom-bar{position:fixed;bottom:0;width:100%;background:rgba(0,0,0,0.9);padding:20px;display:flex;justify-content:space-around;border-top:1px solid var(--neon)}
        #price-tag{font-size:24px;color:var(--neon)}
    </style>
</head>
<body>

<div class="stage-container">
    <div class="view-toggle">
        <button id="btn-front" class="active" onclick="changeView('front')">VORDERSEITE</button>
        <button id="btn-back" onclick="changeView('back')">RÜCKSEITE</button>
    </div>
    <canvas id="mainCanvas" width="1200" height="1200"></canvas>
</div>

<div class="controls" id="ui-container"></div>

<div class="bottom-bar">
    <div id="price-tag">89,00 €</div>
</div>

<script>
'use strict';

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d', { alpha: true });

// KONFIGURATION: Mapping der Bauteile zu deinen PNG-Dateien
const CONFIG = {
    front: {
        base: 'front_shadows.png', // Nur Schatten/Details
        parts: {
            frontshell: { mask: 'front_shell_mask.png', price: 0 },
            touchpad: { mask: 'touchpad_mask.png', price: 10 },
            buttons: { mask: 'buttons_mask.png', price: 5 },
            dpad: { mask: 'dpad_mask.png', price: 5 },
            sticks: { mask: 'sticks_mask.png', price: 5 }
        }
    },
    back: {
        base: 'back_shadows.png',
        parts: {
            backshell: { mask: 'back_shell_mask.png', price: 0 },
            paddles: { mask: 'paddles_mask.png', price: 39 }
        }
    }
};

const COLORS = [
    { name: 'Schwarz', hex: '#1a1a1a' },
    { name: 'Weiß', hex: '#ffffff' },
    { name: 'Lexord Cyan', hex: '#00f2ff' },
    { name: 'Purple', hex: '#bc13fe' }
];

let state = {
    view: 'front',
    selections: {
        frontshell: '#ffffff',
        touchpad: '#ffffff',
        buttons: '#1a1a1a',
        dpad: '#1a1a1a',
        sticks: '#1a1a1a',
        backshell: '#ffffff',
        paddles: '#1a1a1a'
    }
};

const imgCache = {};

// Alle Bilder laden
async function init() {
    const loader = [];
    // Front-Bilder
    loader.push(loadImg('front_base', CONFIG.front.base));
    for(let p in CONFIG.front.parts) loader.push(loadImg(`front_${p}`, CONFIG.front.parts[p].mask));
    
    // Back-Bilder
    loader.push(loadImg('back_base', CONFIG.back.base));
    for(let p in CONFIG.back.parts) loader.push(loadImg(`back_${p}`, CONFIG.back.parts[p].mask));

    await Promise.all(loader);
    render();
    buildUI();
}

function loadImg(key, src) {
    return new Promise(res => {
        const img = new Image();
        img.src = src;
        img.onload = () => { imgCache[key] = img; res(); };
    });
}

// DIE CORE RENDER ENGINE
function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const view = state.view;

    // 1. Die Schatten-Ebene (Grundlage für Realismus)
    // Wir nutzen "Multiply" damit die Farben unter die Schatten gerendert werden können
    // Oder wir zeichnen die Schatten ganz am Ende drüber. Letzteres ist oft sauberer:
    
    // 2. Jedes Bauteil zeichnen
    for (let partID in CONFIG[view].parts) {
        drawPart(view, partID, state.selections[partID]);
    }

    // 3. Die Schatten-Base drüberlegen (Source-Over mit Deckkraft)
    // Das sorgt dafür, dass Kanten und Wölbungen auf jeder Farbe sichtbar sind
    ctx.globalAlpha = 0.8; // Anpassbar je nach Dunkelheit deiner Base-Bilder
    ctx.drawImage(imgCache[`${view}_base`], 0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1.0;
}

function drawPart(view, partID, color) {
    const mask = imgCache[`${view}_${partID}`];
    if (!mask) return;

    // Offscreen Canvas für das Tinting (verhindert Flackern)
    const offCanvas = document.createElement('canvas');
    offCanvas.width = canvas.width;
    offCanvas.height = canvas.height;
    const offCtx = offCanvas.getContext('2d');

    // Farbe auf die Maske anwenden
    offCtx.fillStyle = color;
    offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
    offCtx.globalCompositeOperation = 'destination-in';
    offCtx.drawImage(mask, 0, 0, offCanvas.width, offCanvas.height);

    // Auf den Haupt-Canvas übertragen
    ctx.drawImage(offCanvas, 0, 0);
}

// UI LOGIK
function buildUI() {
    const container = document.getElementById('ui-container');
    const allParts = { ...CONFIG.front.parts, ...CONFIG.back.parts };
    
    for (let id in allParts) {
        const cat = document.createElement('div');
        cat.className = 'category';
        cat.innerHTML = `
            <div class="category-header">
                <span>${id.toUpperCase()}</span>
                <span id="label-${id}">${state.selections[id]}</span>
            </div>
            <div class="color-grid">
                ${COLORS.map(c => `
                    <div class="color-dot" 
                         style="background:${c.hex}" 
                         onclick="selectColor('${id}', '${c.hex}')">
                    </div>
                `).join('')}
            </div>
        `;
        container.appendChild(cat);
    }
}

function selectColor(part, hex) {
    state.selections[part] = hex;
    document.getElementById(`label-${part}`).innerText = hex;
    
    // Auto-Switch View
    if(part === 'backshell' || part === 'paddles') changeView('back');
    else changeView('front');
    
    render();
}

function changeView(v) {
    state.view = v;
    document.getElementById('btn-front').classList.toggle('active', v === 'front');
    document.getElementById('btn-back').classList.toggle('active', v === 'back');
    render();
}

// Start
init();

</script>
</body>
</html>
