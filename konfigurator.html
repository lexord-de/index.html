<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
    <title>PS5 Konfigurator | LEXORD®</title>
    <link rel="icon" type="image/png" href="IMG_7023.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{--neon:#00f2ff;--neon2:#bc13fe;--green:#00b67a;--err:#ff4d4f}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
        html,body{overflow-x:hidden}
        body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:120px}

        /* AURORA BACKGROUND */
        .aurora{position:fixed;inset:0;z-index:-3;background:#000;overflow:hidden}
        .ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:.4;animation:af 25s ease-in-out infinite}
        .ab:nth-child(1){width:55%;height:55%;background:radial-gradient(circle,rgba(0,242,255,.5),transparent 70%);top:-10%;left:-10%}
        .ab:nth-child(2){width:50%;height:50%;background:radial-gradient(circle,rgba(188,19,254,.4),transparent 70%);bottom:-10%;right:-10%;animation-delay:-8s}
        .ab:nth-child(3){width:40%;height:40%;background:radial-gradient(circle,rgba(255,46,110,.25),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-15s}
        @keyframes af{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(15%,-10%) scale(1.1)}}
        .grid-overlay{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(0,242,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,.025) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}

        /* HEADER */
        .cfg-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:10px 4%;background:rgba(0,0,0,.92);backdrop-filter:blur(22px);border-bottom:1px solid rgba(0,242,255,.15)}
        .cfg-back{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron';font-size:9px;letter-spacing:1.5px;font-weight:700;color:#aaa;text-decoration:none;padding:9px 12px;border:1px solid #1a1a1e;border-radius:8px;background:rgba(10,10,12,.7)}
        .cfg-title{font-family:'Orbitron';font-weight:900;font-size:10px;letter-spacing:2px;color:#ddd;text-align:center;flex:1}
        .cfg-live{font-family:'Orbitron';font-size:8px;letter-spacing:1.5px;color:var(--neon);background:rgba(0,242,255,.08);border:1px solid rgba(0,242,255,.25);padding:6px 10px;border-radius:7px;display:flex;align-items:center;gap:5px}

        /* STAGE & TINTS */
        .ctrl-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 4%}
        .ctrl-toggle{display:flex;gap:6px;margin-bottom:20px;background:rgba(12,12,14,.7);padding:4px;border-radius:11px}
        .ctrl-toggle button{font-family:'Orbitron';font-size:9.5px;background:transparent;border:none;color:#888;padding:10px 18px;cursor:pointer;transition:.25s}
        .ctrl-toggle button.active{background:linear-gradient(135deg,rgba(0,242,255,.2),rgba(0,242,255,.08));color:var(--neon)}

        .ctrl-stage{position:relative;width:100%;max-width:540px;aspect-ratio:1.05/1}
        .photo-stack{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2}
        .photo-img{width:100%;height:100%;object-fit:contain;position:absolute;z-index:1}

        /* TINT SYSTEM */
        .tint-layer{position:absolute;inset:0;z-index:2;opacity:0;transition:opacity .4s, background .4s;pointer-events:none;mix-blend-mode:multiply;-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center}
        .tint-layer.active{opacity:.9}

        /* MASKEN ZUWEISUNG */
        #tint-front{-webkit-mask-image:url('Photoroom_20260501_094506.png')}
        #tint-touchpad{-webkit-mask-image:url('mask-touchpad.png')}
        #tint-buttons{-webkit-mask-image:url('mask-buttons.png')}
        #tint-dpad{-webkit-mask-image:url('mask-dpad.png')}
        #tint-back{-webkit-mask-image:url('Photoroom_20260501_090821.png')}
        #tint-paddles{-webkit-mask-image:url('mask-paddles.png')}

        #lightbar-glow{position:absolute;top:42%;left:50%;transform:translateX(-50%);width:22%;height:5px;border-radius:5px;filter:blur(5px);opacity:0;transition:.4s;z-index:5}
        #lightbar-glow.on{opacity:1}

        /* UI ELEMENTS */
        .cfg-sections{padding:18px 4%;max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
        .cfg-acc{background:rgba(12,12,16,.7);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
        .cfg-acc-hd{display:flex;align-items:center;gap:14px;padding:18px;cursor:pointer;font-family:'Orbitron';font-size:11px}
        .cfg-acc-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
        .cfg-acc.open .cfg-acc-body{max-height:1000px}
        .cfg-acc-content{padding:0 16px 18px}
        .cfg-color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:10px}
        .cfg-color-item{aspect-ratio:1/1;border-radius:10px;cursor:pointer;border:2px solid rgba(255,255,255,.1)}
        .cfg-color-item.sel{border-color:var(--neon)}

        .cfg-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(4,4,8,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(0,242,255,0.2);padding:15px 4%;display:flex;justify-content:space-between;align-items:center}
        .cfg-add-cart{font-family:'Orbitron';font-weight:900;background:var(--neon);color:#000;border:none;padding:15px 25px;border-radius:10px;cursor:pointer}

        #toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--neon);color:#000;padding:10px 20px;border-radius:5px;font-family:'Orbitron';font-size:10px;display:none;z-index:1000}
    </style>
</head>
<body>

<div class="aurora"><div class="ab"></div><div class="ab"></div><div class="ab"></div></div>
<header class="cfg-header">
    <a href="index.html" class="cfg-back">ZURÜCK</a>
    <div class="cfg-title">LEXORD® CONFIG</div>
    <div class="cfg-live">LIVE</div>
</header>

<div class="ctrl-wrap">
    <div class="ctrl-toggle">
        <button id="v-front" class="active" onclick="setView('front')">VORDERSEITE</button>
        <button id="v-back" onclick="setView('back')">RÜCKSEITE</button>
    </div>

    <div class="ctrl-stage">
        <!-- FRONT -->
        <div class="photo-stack" id="stack-front">
            <img src="Photoroom_20260501_094506.png" class="photo-img">
            <div id="tint-front" class="tint-layer"></div>
            <div id="tint-touchpad" class="tint-layer"></div>
            <div id="tint-buttons" class="tint-layer"></div>
            <div id="tint-dpad" class="tint-layer"></div>
            <div id="lightbar-glow"></div>
        </div>
        <!-- BACK -->
        <div class="photo-stack" id="stack-back" style="display:none">
            <img src="Photoroom_20260501_090821.png" class="photo-img">
            <div id="tint-back" class="tint-layer"></div>
            <div id="tint-paddles" class="tint-layer"></div>
        </div>
    </div>
</div>

<div class="cfg-sections" id="cfg-root"></div>

<div class="cfg-bottom">
    <div style="font-family:'Orbitron'">PREIS: <span id="total-price" style="color:var(--neon)">79,00 €</span></div>
    <button class="cfg-add-cart" onclick="addToCart()">IN DEN WARENKORB</button>
</div>

<div id="toast">✔ KONFIGURATION GESPEICHERT</div>

<script>
    const COLORS = [
        {name:'Weiß', hex:'#ffffff', p:0},
        {name:'Schwarz', hex:'#1a1a1c', p:0},
        {name:'Neon Blau', hex:'#00f2ff', p:10},
        {name:'Lila', hex:'#bc13fe', p:10},
        {name:'Gold', hex:'#d4af37', p:15}
    ];

    const CATS = [
        {id:'front', name:'FRONTGEHÄUSE', layer:'tint-front', view:'front'},
        {id:'touchpad', name:'TOUCHPAD', layer:'tint-touchpad', view:'front'},
        {id:'buttons', name:'ACTION BUTTONS', layer:'tint-buttons', view:'front'},
        {id:'dpad', name:'D-PAD', layer:'tint-dpad', view:'front'},
        {id:'lightbar', name:'LIGHTBAR FARBE', layer:'lightbar-glow', view:'front'},
        {id:'back', name:'RÜCKSCHALE', layer:'tint-back', view:'back'},
        {id:'paddles', name:'4ER PADDLES FARBE', layer:'tint-paddles', view:'back'}
    ];

    let state = {};
    const basePrice = 79;

    function init() {
        const root = document.getElementById('cfg-root');
        CATS.forEach(cat => {
            state[cat.id] = COLORS[0];
            let html = `
                <div class="cfg-acc" id="acc-${cat.id}">
                    <div class="cfg-acc-hd" onclick="this.parentElement.classList.toggle('open')">
                        <span>${cat.name}</span>
                    </div>
                    <div class="cfg-acc-body">
                        <div class="cfg-acc-content">
                            <div class="cfg-color-grid">
                                ${COLORS.map(c => `<div class="cfg-color-item" style="background:${c.hex}" onclick="select('${cat.id}','${c.hex}',${c.p},'${cat.view}')"></div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>`;
            root.insertAdjacentHTML('beforeend', html);
        });
        update();
    }

    function select(id, hex, p, view) {
        state[id] = {hex, p};
        setView(view);
        update();
    }

    function update() {
        let total = basePrice;
        CATS.forEach(cat => {
            const s = state[cat.id];
            total += s.p;
            const el = document.getElementById(cat.layer);
            
            if(cat.id === 'lightbar') {
                el.style.background = s.hex;
                el.style.boxShadow = `0 0 15px ${s.hex}`;
                el.classList.add('on');
            } else {
                el.style.background = s.hex;
                el.classList.toggle('active', s.hex !== '#ffffff');
            }
        });
        document.getElementById('total-price').innerText = total.toFixed(2).replace('.', ',') + ' €';
    }

    function setView(v) {
        document.getElementById('stack-front').style.display = v === 'front' ? 'flex' : 'none';
        document.getElementById('stack-back').style.display = v === 'back' ? 'flex' : 'none';
        document.getElementById('v-front').classList.toggle('active', v === 'front');
        document.getElementById('v-back').classList.toggle('active', v === 'back');
    }

    function addToCart() {
        localStorage.setItem('lexord_config', JSON.stringify(state));
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => {
            window.location.href = "https://lexord.de/index.html?action=checkout";
        }, 1000);
    }

    init();
</script>
</body>
</html>
