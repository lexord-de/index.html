<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5">
<title>PS5 Konfigurator | LEXORD®</title>
<link rel="icon" type="image/png" href="IMG_7023.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--neon:#00f2ff;--neon2:#bc13fe;--green:#00b67a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:130px}

/* AURORA & GRID BACKGROUND */
.aurora{position:fixed;inset:0;z-index:-3;background:#000;overflow:hidden}
.ab{position:absolute;border-radius:50%;filter:blur(90px);opacity:.38;animation:af 26s ease-in-out infinite}
.ab:nth-child(1){width:55%;height:55%;background:radial-gradient(circle,rgba(0,242,255,.52),transparent 70%);top:-10%;left:-10%}
.ab:nth-child(2){width:50%;height:50%;background:radial-gradient(circle,rgba(188,19,254,.42),transparent 70%);bottom:-10%;right:-10%;animation-delay:-9s}
.ab:nth-child(3){width:42%;height:42%;background:radial-gradient(circle,rgba(255,46,110,.22),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-17s}
@keyframes af{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(13%,-9%) scale(1.09)}}
.grid-bg{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(0,242,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,255,.022) 1px,transparent 1px);background-size:50px 50px;pointer-events:none}

/* HEADER */
.cfg-header{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:10px;padding:10px 4%;background:rgba(0,0,0,.93);backdrop-filter:blur(24px);border-bottom:1px solid rgba(0,242,255,.14)}
.cfg-back{display:inline-flex;align-items:center;gap:6px;font-family:'Orbitron';font-size:9px;letter-spacing:1.5px;font-weight:700;color:#aaa;text-decoration:none;padding:9px 13px;border:1px solid #1c1c22;border-radius:9px;background:rgba(10,10,14,.8);transition:.2s}
.cfg-back:active{color:var(--neon);border-color:var(--neon)}
.cfg-title{font-family:'Orbitron';font-weight:900;font-size:10px;letter-spacing:2.5px;color:#ddd;text-align:center;flex:1}
.cfg-live{font-family:'Orbitron';font-size:8px;letter-spacing:1.5px;color:var(--neon);background:rgba(0,242,255,.07);border:1px solid rgba(0,242,255,.22);padding:7px 11px;border-radius:8px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.cfg-live::before{content:'';width:5px;height:5px;background:var(--neon);border-radius:50%;animation:blink 1.4s infinite;box-shadow:0 0 8px var(--neon)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* HERO */
.cfg-hero{text-align:center;padding:22px 5% 14px}
.cfg-hero-eyebrow{display:inline-block;padding:5px 14px;background:rgba(0,242,255,.07);border:1px solid rgba(0,242,255,.22);border-radius:20px;font-family:'Orbitron';font-size:8px;color:var(--neon);letter-spacing:2.5px;margin-bottom:12px}
.cfg-hero-title{font-family:'Orbitron';font-weight:900;font-size:clamp(1.2rem,4.5vw,2rem);letter-spacing:-1px;line-height:1.1;margin-bottom:7px;background:linear-gradient(175deg,#fff 30%,rgba(255,255,255,.4));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.cfg-hero-sub{font-family:'Orbitron';font-size:8.5px;letter-spacing:2px;color:#555}

/* VISUALIZER STAGE */
.ctrl-wrap{display:flex;flex-direction:column;align-items:center;padding:4px 4% 20px}
.ctrl-toggle{display:flex;gap:5px;margin-bottom:16px;background:rgba(10,10,14,.8);padding:4px;border-radius:12px;border:1px solid rgba(255,255,255,.06)}
.ctrl-toggle button{font-family:'Orbitron';font-size:9px;letter-spacing:1.5px;font-weight:700;background:transparent;border:none;color:#666;padding:10px 20px;border-radius:9px;cursor:pointer;transition:.22s}
.ctrl-toggle button.active{background:linear-gradient(135deg,rgba(0,242,255,.18),rgba(0,242,255,.06));color:var(--neon);box-shadow:0 0 14px rgba(0,242,255,.18)}

.ctrl-stage{position:relative;width:100%;max-width:520px;margin:0 auto}
.ctrl-view{position:relative;width:100%;padding-bottom:94%;display:none}
.ctrl-view.active{display:block}

.base-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:1;animation:floatY 5.2s ease-in-out infinite;pointer-events:none}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.part-overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;opacity:0;transition:background-color .32s, opacity .32s;animation:floatY 5.2s ease-in-out infinite}
.blend-mul{mix-blend-mode:multiply}
.blend-scr{mix-blend-mode:screen}

/* CLIP PATHS */
.p-frontshell-l{clip-path:polygon(2% 35%, 6% 22%, 42% 14%, 42% 22%, 37% 78%, 2% 62%)}
.p-frontshell-r{clip-path:polygon(98% 35%, 94% 22%, 58% 14%, 58% 22%, 63% 78%, 98% 62%)}
.p-frontshell-c{clip-path:polygon(38% 7%, 62% 7%, 65% 20%, 35% 20%)}
.p-dpad-h{clip-path:polygon(11% 52%, 27% 52%, 27% 60%, 11% 60%)}
.p-dpad-v{clip-path:polygon(16% 45%, 22% 45%, 22% 67%, 16% 67%)}
.p-btn-tri{clip-path:circle(5.5% at 72.5% 44%)}
.p-btn-cir{clip-path:circle(5.5% at 80% 51%)}
.p-btn-cro{clip-path:circle(5.5% at 72.5% 58%)}
.p-btn-sq {clip-path:circle(5.5% at 65% 51%)}
.p-stick-l{clip-path:circle(7.5% at 30% 63%)}
.p-stick-r{clip-path:circle(7.5% at 67% 69%)}
.p-trig-l1{clip-path:polygon(4% 17%, 30% 17%, 24% 11%, 8% 11%)}
.p-trig-r1{clip-path:polygon(96% 17%, 70% 17%, 76% 11%, 92% 11%)}
.p-lightbar{clip-path:polygon(36% 41%, 64% 41%, 64% 44.5%, 36% 44.5%)}
.p-backshell{clip-path:polygon(5% 26%, 50% 2%, 95% 26%, 95% 70%, 50% 88%, 5% 70%)}
.p-paddle-l1{clip-path:polygon(9% 72%, 25% 80%, 23% 72%)}
.p-paddle-r1{clip-path:polygon(91% 72%, 75% 80%, 77% 72%)}

/* LABELS & UI */
.part-label{position:absolute;background:rgba(7,7,11,.95);border:1px solid var(--neon);color:#fff;padding:6px 11px;border-radius:9px;font-family:'Orbitron';font-size:7.5px;font-weight:800;opacity:0;transition:.3s;z-index:8;pointer-events:none}
.part-label.show{opacity:1;transform:scale(1)}
.part-label small{display:block;color:var(--neon);font-size:8.5px}

/* PRESETS & ACCORDIONS */
.preset-wrap{padding:4px 4% 18px;max-width:800px;margin:0 auto}
.preset-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.preset-btn{flex-shrink:0;padding:10px 15px;border-radius:11px;background:rgba(255,255,255,.05);border:1px solid transparent;color:#aaa;cursor:pointer;font-family:'Orbitron';font-size:8.5px;display:flex;align-items:center;gap:7px}
.preset-btn.active{border-color:var(--neon);color:var(--neon);background:rgba(0,242,255,.1)}
.pdot{width:9px;height:9px;border-radius:50%}

.cfg-sects{padding:16px 4% 28px;max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:9px}
.acc{background:rgba(11,11,16,.8);border:1px solid rgba(255,255,255,.05);border-radius:14px;overflow:hidden}
.acc-hd{display:flex;align-items:center;gap:13px;padding:17px;cursor:pointer}
.acc-ico{width:42px;height:42px;border-radius:10px;background:rgba(0,242,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px}
.acc-name{font-family:'Orbitron';font-size:10.5px;font-weight:700}
.acc-cur{font-size:10px;color:#666}
.acc-cur strong{color:var(--neon)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease-out}
.acc.open .acc-body{max-height:1000px}
.acc-content{padding:0 16px 18px}

.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(55px,1fr));gap:10px}
.ci{aspect-ratio:1/1;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:.2s;position:relative}
.ci.sel{border-color:var(--neon);transform:scale(1.05)}

/* BOTTOM BAR */
.cfg-bottom{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(3,3,6,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(0,242,255,.2);padding:12px 4%;display:flex;align-items:center;gap:15px}
.cfg-price-val{font-family:'Orbitron';font-size:20px;font-weight:900}
.cfg-price-val span{color:var(--neon)}
.cart-btn{flex:1;background:linear-gradient(135deg,var(--neon),#00b4d8);border:none;padding:15px;border-radius:12px;font-family:'Orbitron';font-weight:900;cursor:pointer}

/* TOAST & LOADER */
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--neon);color:#000;padding:10px 20px;border-radius:8px;font-family:'Orbitron';font-size:10px;transition:.4s;z-index:1000}
#toast.show{transform:translateX(-50%) translateY(0)}

#cfg-loading{position:fixed;inset:0;background:#000;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
.spin{width:40px;height:40px;border:3px solid rgba(0,242,255,.2);border-top-color:var(--neon);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="cfg-loading"><div class="spin"></div><p style="font-family:'Orbitron';margin-top:15px;font-size:10px">LEXORD® CONFIGURATOR</p></div>
<div class="aurora"><div class="ab"></div><div class="ab"></div><div class="ab"></div></div>
<div class="grid-bg"></div>

<header class="cfg-header">
    <a href="index.html" class="cfg-back">ZURÜCK</a>
    <div class="cfg-title">PS5 KONFIGURATOR</div>
    <div class="cfg-live">LIVE</div>
</header>

<div class="cfg-hero">
    <div class="cfg-hero-eyebrow">MADE IN GERMANY</div>
    <h1 class="cfg-hero-title">DEIN DESIGN. DEIN GAME.</h1>
</div>

<div class="ctrl-wrap">
    <div class="ctrl-toggle">
        <button class="active" data-view="front">VORDERSEITE</button>
        <button data-view="back">RÜCKSEITE</button>
    </div>
    <div class="ctrl-stage">
        <!-- FRONT -->
        <div class="ctrl-view active" id="view-front">
            <img class="base-img" src="Photoroom_20260501_094506.png" onerror="this.src='https://via.placeholder.com/500?text=PS5+Front'">
            <div class="part-overlay blend-mul p-frontshell-l" id="ov-frontshell-l"></div>
            <div class="part-overlay blend-mul p-frontshell-r" id="ov-frontshell-r"></div>
            <div class="part-overlay blend-mul p-frontshell-c" id="ov-frontshell-c"></div>
            <div class="part-overlay blend-mul p-dpad-h" id="ov-dpad-h"></div>
            <div class="part-overlay blend-mul p-dpad-v" id="ov-dpad-v"></div>
            <div class="part-overlay blend-mul p-btn-tri" id="ov-btn-tri"></div>
            <div class="part-overlay blend-mul p-btn-cir" id="ov-btn-cir"></div>
            <div class="part-overlay blend-mul p-btn-cro" id="ov-btn-cro"></div>
            <div class="part-overlay blend-mul p-btn-sq"  id="ov-btn-sq"></div>
            <div class="part-overlay blend-mul p-stick-l" id="ov-stick-l"></div>
            <div class="part-overlay blend-mul p-stick-r" id="ov-stick-r"></div>
            <div class="part-overlay blend-scr p-lightbar" id="ov-lightbar"></div>
            
            <div class="part-label" id="lbl-frontshell" style="top:5%;left:5%">FRONT<small></small></div>
            <div class="part-label" id="lbl-buttons" style="top:40%;right:5%">BUTTONS<small></small></div>
        </div>
        <!-- BACK -->
        <div class="ctrl-view" id="view-back">
            <img class="base-img" src="Photoroom_20260501_090821.png" onerror="this.src='https://via.placeholder.com/500?text=PS5+Back'">
            <div class="part-overlay blend-mul p-backshell" id="ov-backshell"></div>
            <div class="part-overlay blend-mul p-paddle-l1" id="ov-paddle-l1"></div>
            <div class="part-overlay blend-mul p-paddle-r1" id="ov-paddle-r1"></div>
        </div>
    </div>
</div>

<div class="preset-wrap">
    <div class="preset-row" id="preset-row"></div>
</div>

<div class="cfg-sects" id="cfg-sects"></div>

<div class="cfg-bottom">
    <div class="cfg-price">
        <div class="cfg-price-val">ab <span id="total-price">79,00 €</span></div>
    </div>
    <button class="cart-btn" id="cart-btn">IN DEN WARENKORB</button>
</div>

<div id="toast"></div>

<script>
const SHELL=[{n:'Weiß',c:'#ffffff',p:0,def:true},{n:'Schwarz',c:'#1a1a1c',p:5},{n:'Cosmic Red',c:'#5c0d10',p:8},{n:'Cyan',c:'#00b4d8',p:10}];
const BTN=[{n:'Standard',c:'#e0e0e2',p:0,def:true},{n:'Schwarz',c:'#1e1e20',p:5},{n:'Gold',c:'#d4af37',p:10}];
const PRESETS=[
    {id:'white', n:'PURE WHITE', dot:'#fff', c:{frontshell:'#ffffff',backshell:'#ffffff',buttons:'#e0e0e2'}},
    {id:'dark', n:'DARK KNIGHT', dot:'#1a1a1c', c:{frontshell:'#1a1a1c',backshell:'#1a1a1c',buttons:'#1e1e20'}}
];

const CATS=[
    {id:'frontshell', name:'FRONTGEHÄUSE', col:SHELL, view:'front', lbl:'lbl-frontshell'},
    {id:'backshell', name:'RÜCKSCHALE', col:SHELL, view:'back', lbl:null},
    {id:'buttons', name:'BUTTONS', col:BTN, view:'front', lbl:'lbl-buttons'}
];

let ST={ colors:{frontshell:null,backshell:null,buttons:null}, qty:1 };

function updateVisuals(){
    Object.entries(ST.colors).forEach(([id,data])=>{
        if(!data)return;
        const overlays = id === 'frontshell' ? ['ov-frontshell-l','ov-frontshell-r','ov-frontshell-c'] : [`ov-${id}`];
        overlays.forEach(oid=>{
            const el=document.getElementById(oid);
            if(el){
                el.style.backgroundColor=data.c;
                el.style.opacity = (data.c === '#ffffff' && id !== 'buttons') ? '0' : '0.7';
            }
        });
        const lbl=document.getElementById(CATS.find(c=>c.id===id)?.lbl);
        if(lbl) lbl.querySelector('small').textContent = data.n;
    });
    document.getElementById('total-price').textContent = (79 + Object.values(ST.colors).reduce((a,b)=>a+(b?b.p:0),0)).toFixed(2).replace('.',',') + ' €';
}

function init(){
    const container = document.getElementById('cfg-sects');
    CATS.forEach(cat=>{
        const acc=document.createElement('div');
        acc.className='acc';
        acc.innerHTML=`<div class="acc-hd"><div class="acc-ico">🎨</div><div><div class="acc-name">${cat.name}</div><div class="acc-cur" id="cur-${cat.id}">Standard</div></div></div>
                       <div class="acc-body"><div class="acc-content"><div class="color-grid" id="grid-${cat.id}"></div></div></div>`;
        acc.onclick=()=>{acc.classList.toggle('open'); if(acc.classList.contains('open')) switchView(cat.view)};
        container.appendChild(acc);
        const grid=document.getElementById(`grid-${cat.id}`);
        cat.col.forEach(clr=>{
            const ci=document.createElement('div');
            ci.className='ci'; ci.style.background=clr.c;
            if(clr.def) { ST.colors[cat.id]=clr; ci.classList.add('sel'); }
            ci.onclick=(e)=>{
                e.stopPropagation();
                ST.colors[cat.id]=clr;
                grid.querySelectorAll('.ci').forEach(x=>x.classList.remove('sel'));
                ci.classList.add('sel');
                updateVisuals();
            };
            grid.appendChild(ci);
        });
    });

    PRESETS.forEach(p=>{
        const btn=document.createElement('button');
        btn.className='preset-btn';
        btn.innerHTML=`<span class="pdot" style="background:${p.dot}"></span>${p.n}`;
        btn.onclick=()=>{
            Object.entries(p.c).forEach(([id,hex])=>{
                const found = CATS.find(c=>c.id===id).col.find(cl=>cl.c===hex);
                if(found) ST.colors[id]=found;
            });
            updateVisuals();
        };
        document.getElementById('preset-row').appendChild(btn);
    });

    document.querySelectorAll('.ctrl-toggle button').forEach(b=>b.onclick=()=>switchView(b.dataset.view));
    setTimeout(()=>document.getElementById('cfg-loading').style.opacity='0',800);
    updateVisuals();
}

function switchView(v){
    document.querySelectorAll('.ctrl-view').forEach(el=>el.classList.remove('active'));
    document.getElementById(`view-${v}`).classList.add('active');
    document.querySelectorAll('.ctrl-toggle button').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
}

document.getElementById('cart-btn').onclick=()=>{
    const t=document.getElementById('toast');
    t.textContent="WIRD ZUM WARENKORB GEFÜGT...";
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2000);
};

init();
</script>
</body>
</html>
